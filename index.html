// Save checklist for a project+day to Firestore
async function fbSaveChecklist(projectId, dayNum, data) {
  try {
    const db = getFirestore();
    await db.collection('checklists')
      .doc(projectId + '_day' + dayNum)
      .set({ projectId, dayNum, data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
  } catch(e) { console.warn('FB save error:', e); }
}

// Load checklist for a project+day
async function fbLoadChecklist(projectId, dayNum) {
  try {
    const db = getFirestore();
    const doc = await db.collection('checklists').doc(projectId + '_day' + dayNum).get();
    return doc.exists ? doc.data().data : null;
  } catch(e) { console.warn('FB load error:', e); return null; }
}

// Subscribe to realtime updates for a project+day
function fbSubscribeChecklist(projectId, dayNum, callback) {
  try {
    const db = getFirestore();
    return db.collection('checklists')
      .doc(projectId + '_day' + dayNum)
      .onSnapshot(doc => {
        if(doc.exists) callback(doc.data().data);
      });
  } catch(e) { console.warn('FB subscribe error:', e); return ()=>{}; }
}

function Shell({initProj,onBack,lang,setLang,dark,setDark}){
  const t=LANGS[lang]||LANGS.en;
  const [proj,setProj]=useState(initProj);
  const [view,setView]=useState('dashboard');
  const [showMerge,setShowMerge]=useState(false);
  const [navTarget,setNavTarget]=useState(null); // {view, sceneId, subTab} for cross-view jumps
  const [navFrom,setNavFrom]=useState(null);    // {view, sceneId, label} — "where you jumped from"
  const mob=useMobile();

  // Jump to another view, optionally targeting a specific scene (e.g. Schedule -> Shot Board)
  const navigateTo=useCallback((targetView, opts={})=>{
    // If caller says where we're jumping FROM, store it so destination can show a Back button
    if(opts.fromView){
      setNavFrom({view:opts.fromView, sceneId:opts.fromSceneId||null, label:opts.fromLabel||opts.fromView});
    } else {
      // Navigating manually (sidebar/tab) clears the "came from" breadcrumb
      setNavFrom(null);
    }
    setNavTarget({view:targetView, ...opts});
    setView(targetView);
  },[]);
  // Also expose on window as a fallback path, in case Context lookup ever fails
  // to resolve in a particular render (defensive - does not change normal behavior)
  React.useEffect(()=>{ window.__sbNavigateTo = navigateTo; return ()=>{ delete window.__sbNavigateTo; }; },[navigateTo]);
  // Called by the destination view once it has consumed the nav target
  const clearNavTarget=useCallback(()=>setNavTarget(null),[]);
  // Go back to wherever we came from (navFrom), then clear it
  const navigateBack=useCallback(()=>{
    if(!navFrom) return;
    const {view:backView, sceneId:backScene}=navFrom;
    setNavFrom(null);
    setNavTarget({view:backView, returnSceneId:backScene});
    setView(backView);
  },[navFrom]);

  const updateProj=useCallback((updater)=>{
    setProj(p=>{
      const next=typeof updater==='function'?updater(p):{...p,...updater};
      const all=loadAll();
      const idx=all.findIndex(x=>x._id===next._id);
      if(idx>=0){all[idx]=next;saveAll(all);}
      return next;
    });
  },[]);

  const exportJSON=()=>{
    const blob=new Blob([JSON.stringify(proj,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=(proj.project?.title||'project').replace(/\s+/g,'_')+'_breakdown.json';
    a.click();
  };

  const VIEWS=[
    {id:'dashboard',label:t.dashboard,icon:'⊞'},
    {id:'script',label:t.script,icon:'☰'},
    {id:'shots',label:t.shots,icon:'▣'},
    {id:'breakdown',label:t.breakdown,icon:'◫'},
    {id:'continuity',label:t.continuity,icon:'⊡'},
    {id:'daily',label:t.daily,icon:'▤'},
    {id:'notes',label:t.notes||'On Set',icon:'📋'},
  ];

  const totalShots=proj.scenes?.reduce((a,s)=>a+(s.shots?.length||0),0)||0;
  const allPropsCount=[...new Set(proj.scenes?.flatMap(s=>s.props?.map(p=>p.name)||[])||[])].length;

  return(
    <LangCtx.Provider value={lang}>
      <Ctx.Provider value={{proj,updateProj,navTarget,navigateTo,clearNavTarget,navFrom,navigateBack}}>
        <div style={{display:'flex',height:mob?'100dvh':'100vh',overflow:'hidden',background:T.bg,flexDirection:mob?'column':'row'}}>

          {/* Sidebar - desktop only */}
          {!mob&&<div style={{width:236,flexShrink:0,background:T.panel,borderRight:`1px solid ${T.border}`,display:'flex',flexDirection:'column'}}>
            <div style={{padding:'14px 16px 0'}}>
              <button onClick={onBack} style={{color:T.textDim,fontSize:10,letterSpacing:'0.12em',fontFamily:"'Geist Mono',monospace",marginBottom:12,display:'flex',alignItems:'center',gap:4}}>← {t.cabinet.toUpperCase()}</button>
              <div style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:20,lineHeight:1.05,marginBottom:4,color:T.text}}>{proj.project?.title||'Untitled'}</div>
              <div style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,letterSpacing:'0.1em',marginBottom:12,paddingBottom:12,borderBottom:`1px solid ${T.rule}`}}>
                {(proj.project?.format||'FILM').toUpperCase()} · {proj.project?.status||'PRE-PRODUCTION'}
              </div>
            </div>
            <nav style={{padding:'6px 8px',flex:1}}>
              {VIEWS.map(v=>(
                <button key={v.id} onClick={()=>setView(v.id)} style={{display:'flex',alignItems:'center',gap:9,width:'100%',padding:'8px 10px',borderRadius:6,fontSize:13,background:view===v.id?T.chip:'transparent',color:view===v.id?T.text:T.textMute,fontWeight:view===v.id?500:400,marginBottom:1,textAlign:'left'}}>
                  <span style={{opacity:0.5,fontSize:11}}>{v.icon}</span>{v.label}
                  {view===v.id&&<div style={{marginLeft:'auto',width:5,height:5,borderRadius:'50%',background:T.accent}}/>}
                </button>
              ))}
            </nav>
            {/* Stats */}
            <div style={{padding:'10px 16px',borderTop:`1px solid ${T.rule}`,display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[[t.scenes,proj.scenes?.length],[t.characters,proj.characters?.length],[t.props,allPropsCount],[t.shots_,totalShots]].map(([l,v])=>(
                <div key={l}><div style={{fontFamily:"'Geist Mono',monospace",fontSize:18,fontWeight:500,color:T.text,lineHeight:1}}>{v||0}</div><div style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,letterSpacing:'0.08em',marginTop:2}}>{l}</div></div>
              ))}
            </div>
            {/* Actions */}
            <div style={{padding:'10px 12px',borderTop:`1px solid ${T.rule}`,display:'flex',flexDirection:'column',gap:8}}>
              <div style={{display:'flex',gap:6}}>
                <button onClick={exportJSON} style={{flex:1,padding:'7px 10px',border:`1px solid ${T.borderHi}`,borderRadius:6,color:T.textMute,fontSize:11,fontWeight:500,display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>{t.exportJson}</button>
                <button onClick={()=>setShowMerge(true)} style={{flex:1,padding:'7px 10px',background:T.info+'1e',border:`1px solid ${T.info}55`,borderRadius:6,color:T.info,fontSize:11,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>+ Merge</button>
              </div>
              <DriveSaveBtn proj={proj}/>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                {['en','zh','ja'].map(l=>(
                  <button key={l} onClick={()=>setLang(l)} style={{padding:'4px 9px',borderRadius:5,fontSize:11,fontFamily:"'Geist Mono',monospace",background:lang===l?T.chip:'transparent',color:lang===l?T.accent:T.textMute,border:`1px solid ${lang===l?T.borderHi:'transparent'}`}}>
                    {l==='en'?'EN':l==='zh'?'中':l==='ja'?'JA':l}
                  </button>
                ))}
                <div style={{flex:1}}/>
                <button onClick={()=>setDark&&setDark(!dark)} style={{width:28,height:28,borderRadius:6,border:`1px solid ${T.border}`,display:'grid',placeItems:'center',color:T.textMute,fontSize:13}}>{dark?'☀':'🌙'}</button>
              </div>
            </div>
          </div>}

          {/* Mobile top bar */}
          {mob&&<div style={{flexShrink:0,background:T.panel,borderBottom:`1px solid ${T.border}`,padding:'8px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <button onClick={onBack} style={{color:T.textDim,fontSize:11,fontFamily:"'Geist Mono',monospace",background:'transparent',border:'none',cursor:'pointer'}}>← Back</button>
              <div style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:15,color:T.text,maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{proj.project?.title||'Untitled'}</div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button onClick={()=>setDark&&setDark(!dark)} style={{width:28,height:28,borderRadius:6,border:`1px solid ${T.border}`,display:'grid',placeItems:'center',color:T.textMute,fontSize:13}}>{dark?'☀':'🌙'}</button>
              <DriveSaveBtn proj={proj}/>
            </div>
          </div>}

          {/* Content */}
          <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',minHeight:0}}>
            {!mob&&<div style={{padding:'12px 24px',borderBottom:`1px solid ${T.rule}`,display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
              <div style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:26,color:T.text,whiteSpace:'nowrap'}}>{VIEWS.find(v=>v.id===view)?.label}</div>
              <Mono s={{color:T.textDim,fontSize:10}}>{proj.project?.totalPages||'?'}p{proj.project?.estimatedRuntime?' · '+proj.project.estimatedRuntime:''}</Mono>
            </div>}
            <div style={{flex:1,overflow:'hidden'}}>
              {view==='dashboard'&&<DashView/>}
              {view==='script'&&<ScriptView/>}
              {view==='shots'&&<ShotBoard/>}
              {view==='breakdown'&&<BDView/>}
              {view==='continuity'&&<ContView/>}
              {view==='daily'&&<DailyView/>}
              {view==='notes'&&<OnSetNotes/>}
            </div>
          </div>

          {/* Mobile bottom nav */}
          {mob&&<div style={{flexShrink:0,background:T.panel,borderTop:`1px solid ${T.border}`,
            display:'flex',padding:'6px 0',paddingBottom:'calc(env(safe-area-inset-bottom) + 8px)',
            zIndex:1000,position:'relative'}}>
            {VIEWS.map(v=>(
              <button key={v.id} onClick={()=>setView(v.id)}
                style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,
                  padding:'4px 2px',background:'transparent',border:'none',cursor:'pointer',
                  color:view===v.id?T.accent:T.textDim}}>
                <span style={{fontSize:18,lineHeight:1}}>{v.icon}</span>
                <span style={{fontFamily:"'Geist Mono',monospace",fontSize:7,letterSpacing:'0.04em',
                  whiteSpace:'nowrap',marginTop:1}}>{v.label.slice(0,6)}</span>
                {view===v.id&&<div style={{width:18,height:2,borderRadius:1,background:T.accent,marginTop:1}}/>}
              </button>
            ))}
          </div>}
        </div>
      {showMerge&&<MergeModal proj={proj} onClose={()=>setShowMerge(false)} onMerge={(chunk,replace)=>{const merged=mergeProjectChunk(proj,chunk,replace);setProj(merged);const all=loadAll();const i=all.findIndex(x=>x._id===merged._id);if(i>=0){all[i]=merged;saveAll(all);}setShowMerge(false);}}/>}
      </Ctx.Provider>
    </LangCtx.Provider>
  );
}

/* ═══════════════════════════════════════════════════════════
   MOBILE DETECTION HOOK
═══════════════════════════════════════════════════════════ */
function useMobile(){ 
  const isMob=()=>window.innerWidth<=900||/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  const [mob,setMob]=React.useState(isMob);
  React.useEffect(()=>{
    const fn=()=>setMob(isMob());
    window.addEventListener('resize',fn);
    // Also fire on orientation change
    window.addEventListener('orientationchange',fn);
    return ()=>{ window.removeEventListener('resize',fn); window.removeEventListener('orientationchange',fn); };
  },[]);
  return mob;
}
function App(){
  const [proj,setProj]=useState(null);
  const [lang,setLang]=useState(()=>localStorage.getItem('nf10_lang')||'en');
  const [dark,setDark]=useState(()=>localStorage.getItem('nf10_dark')!=='false');
  const saveTheme=d=>{setDark(d);localStorage.setItem('nf10_dark',String(d));Object.assign(T,d?THEMES.dark:THEMES.light);};
  Object.assign(T,dark?THEMES.dark:THEMES.light);
  const saveLang=l=>{ setLang(l); localStorage.setItem('nf10_lang',l); };
  return proj
    ?<Shell initProj={proj} onBack={()=>setProj(null)} lang={lang} setLang={saveLang} dark={dark} setDark={saveTheme}/>
    :<Cabinet onOpen={setProj} lang={lang} setLang={saveLang} dark={dark} setDark={saveTheme}/>;
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
