function NoteModal({note, scenes, onSave, onClose, mob}){
  const [text, setText] = React.useState(note?.text||'');
  const [dept, setDept] = React.useState(note?.dept||'general');
  const [sceneId, setSceneId] = React.useState(note?.sceneId||'');
  const [urgent, setUrgent] = React.useState(note?.urgent||false);
  const [author, setAuthor] = React.useState(note?.author||'');
  const [imageUrl, setImageUrl] = React.useState(note?.imageUrl||'');

  // Speech recognition
  const [listening, setListening] = React.useState(false);
  const [interimText, setInterimText] = React.useState('');
  const [voiceLang, setVoiceLang] = React.useState(()=>localStorage.getItem('sb_voice_lang')||'en-AU');
  const recogRef = React.useRef(null);
  const speechSupported = typeof window !== 'undefined' && ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window);

  React.useEffect(()=>{ localStorage.setItem('sb_voice_lang', voiceLang); },[voiceLang]);

  // Cleanup on unmount
  React.useEffect(()=>{
    return ()=>{ if(recogRef.current){ try{ recogRef.current.stop(); }catch(e){} } };
  },[]);

  function toggleListening(){
    if(listening){
      try{ recogRef.current?.stop(); }catch(e){}
      setListening(false);
      setInterimText('');
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR) return;
    const recog = new SR();
    recog.lang = voiceLang;
    recog.continuous = true;
    recog.interimResults = true;
    recog.maxAlternatives = 1;
    recogRef.current = recog;

    recog.onresult = (e)=>{
      let interim = '';
      let final = '';
      for(let i = e.resultIndex; i < e.results.length; i++){
        const t = e.results[i][0].transcript;
        if(e.results[i].isFinal){ final += t + ' '; }
        else { interim += t; }
      }
      if(final) setText(prev => (prev + (prev&&!prev.endsWith(' ')?' ':'') + final.trim() + ' ').trimStart());
      setInterimText(interim);
    };

    recog.onerror = (e)=>{
      console.warn('Speech error:', e.error);
      if(e.error === 'not-allowed'){
        alert('Microphone access denied. Please allow microphone in browser settings.');
      }
      setListening(false);
      setInterimText('');
    };

    recog.onend = ()=>{
      // Auto-restart if still in listening mode (iOS sometimes stops early)
      if(recogRef.current && listening){
        try{ recogRef.current.start(); }catch(e){ setListening(false); }
      }
    };

    try{
      recog.start();
      setListening(true);
      setInterimText('');
    } catch(e){
      console.warn('Speech start error:', e);
    }
  }

  function handleSubmit(){
    if(listening){ try{ recogRef.current?.stop(); }catch(e){} setListening(false); }
    if(!text.trim()) return;
    onSave({text:text.trim(),dept,sceneId:sceneId||null,urgent,author:author.trim(),imageUrl});
  }

  function handleClose(){
    if(listening){ try{ recogRef.current?.stop(); }catch(e){} setListening(false); }
    onClose();
  }

  const deptObj = NOTE_DEPTS.find(d=>d.id===dept)||NOTE_DEPTS[8];

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:8000,
      display:'flex',alignItems:mob?'flex-end':'center',justifyContent:'center'}}

      <div style={{
        background:T.panel,border:`1px solid ${T.borderHi}`,
        borderRadius:mob?'14px 14px 0 0':14,
        width:mob?'100%':520,maxHeight:mob?'92vh':'85vh',
        display:'flex',flexDirection:'column',
        boxShadow:'0 8px 40px rgba(0,0,0,0.4)',
        overflow:'hidden',
      }}>
        {/* Modal header */}
        <div style={{padding:'14px 16px',borderBottom:`1px solid ${T.rule}`,
          display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
          <span style={{fontSize:16}}>{deptObj.icon}</span>
          <span style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',
            fontSize:16,color:T.text,flex:1}}>
            {note?'Edit Note':'New Note'}
          </span>
          <button onClick={handleClose}
            style={{color:T.textDim,fontSize:18,background:'transparent',border:'none',cursor:'pointer'}}>x</button>
        </div>

        <div style={{flex:1,overflow:'auto',padding:'14px 16px',display:'flex',flexDirection:'column',gap:12}}>

          {/* Dept selector */}
          <div>
            <div style={{fontFamily:"'Geist Mono',monospace",fontSize:8,color:T.textDim,
              letterSpacing:'0.1em',marginBottom:6}}>DEPARTMENT</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {NOTE_DEPTS.map(d=>(
                <button key={d.id} onClick={()=>setDept(d.id)}
                  style={{padding:'4px 10px',borderRadius:99,fontSize:10,cursor:'pointer',
                    fontFamily:"'Geist Mono',monospace",
                    background:dept===d.id?d.color+'33':'transparent',
                    border:`1px solid ${dept===d.id?d.color:T.border}`,
                    color:dept===d.id?d.color:T.textMute}}>
                  {d.icon} {d.label}
                </button>
              ))}
            </div>
          </div>

          {/* Note text + voice input */}
          <div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:5}}>
              <div style={{fontFamily:"'Geist Mono',monospace",fontSize:8,color:T.textDim,letterSpacing:'0.1em'}}>NOTE *</div>
              <div style={{display:'flex',alignItems:'center',gap:5}}>
                {/* Language selector */}

function DailyView(){
  const {proj,updateProj}=useProj();
  const t=useT();
  const [dlTab,setDlTab]=React.useState('schedule');

  const initSchedule=()=>{
    const days={};
    (proj.shootDays||[]).forEach(d=>{
      days[d.day]={day:d.day,scenes:[...(d.scenes||[])],note:d.note||'',dayOff:d.dayOff||false};
    });
    const scheduled=new Set(Object.values(days).flatMap(d=>d.scenes));
    const unscheduled=(proj.scenes||[]).filter(s=>!scheduled.has(s.id)).map(s=>s.id);
    return{days,unscheduled};
  };

  const [schedule,setSchedule]=React.useState(initSchedule);
  const [startDate,setStartDate]=React.useState(proj.project?.startDate||'');
  const [endDate,setEndDate]=React.useState(proj.project?.endDate||'');
  const [dragScene,setDragScene]=React.useState(null);
  const [dragFrom,setDragFrom]=React.useState(null);
  const [leftWidth,setLeftWidth]=React.useState(200);
  const resizing=React.useRef(false);
  const onResizeStart=(e)=>{
    resizing.current=true;
    const startX=e.clientX,startW=leftWidth;
    const onMove=(ev)=>{if(!resizing.current)return;setLeftWidth(Math.max(140,Math.min(380,startW+(ev.clientX-startX))));};
    const onUp=()=>{resizing.current=false;window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
  };

  const dayNumbers=Object.keys(schedule.days).map(Number).sort((a,b)=>a-b);
  const maxDay=dayNumbers.length>0?Math.max(...dayNumbers):0;

  const getScene=(id)=>proj.scenes?.find(s=>s.id===id);
  const getLoc=(id)=>proj.locations?.find(l=>l.id===id);
  const getChar=(id)=>proj.characters?.find(c=>c.id===id);

  const dayDate=(n)=>{
    if(!startDate)return null;
    try{
      const s=new Date(startDate+'T00:00:00');
      let d=new Date(s),count=0;
      while(count<n-1){d=new Date(d.getTime()+86400000);if(d.getDay()!==0&&d.getDay()!==6)count++;}
      return d;
    }catch{return null;}
  };
  const fmtDate=(d)=>d?d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}):'';

  const addDay=()=>{const n=maxDay+1;setSchedule(s=>({...s,days:{...s.days,[n]:{day:n,scenes:[],note:'',dayOff:false}}}));};

  const removeDay=(dayNum)=>{
    setSchedule(prev=>{
      const next={days:{},unscheduled:[...prev.unscheduled]};
      const scenes=prev.days[dayNum]?.scenes||[];
      next.unscheduled=[...next.unscheduled,...scenes];
      const remaining=Object.keys(prev.days).map(Number).sort((a,b)=>a-b).filter(n=>n!==dayNum);
      remaining.forEach((oldNum,i)=>{next.days[i+1]={...prev.days[oldNum],day:i+1,scenes:[...prev.days[oldNum].scenes]};});
      return next;
    });
  };

  const toggleDayOff=(dayNum)=>{
    setSchedule(prev=>{
      const d=prev.days[dayNum];
      const nowOff=!d.dayOff;
      // Release scenes back to unscheduled when marking as day off
      const released=nowOff?d.scenes:[];
      return{...prev,
        unscheduled:[...prev.unscheduled,...released],
        days:{...prev.days,[dayNum]:{...d,dayOff:nowOff,scenes:nowOff?[]:d.scenes}}
      };
    });
  };

  const moveScene=(sceneId,fromKey,toKey)=>{
    setSchedule(prev=>{
      const next={days:{},unscheduled:[...prev.unscheduled]};
      Object.keys(prev.days).forEach(k=>{next.days[k]={...prev.days[k],scenes:[...prev.days[k].scenes]};});
      if(fromKey==='pool')next.unscheduled=next.unscheduled.filter(id=>id!==sceneId);
      else if(next.days[Number(fromKey)])next.days[Number(fromKey)].scenes=next.days[Number(fromKey)].scenes.filter(id=>id!==sceneId);
      if(toKey==='pool')next.unscheduled=[...next.unscheduled,sceneId];
      else if(next.days[Number(toKey)]&&!next.days[Number(toKey)].scenes.includes(sceneId))next.days[Number(toKey)].scenes=[...next.days[Number(toKey)].scenes,sceneId];
      return next;
    });
  };

  const saveSchedule=()=>{
    updateProj(p=>{
      const newShootDays=Object.values(schedule.days).map(d=>({
        day:d.day,scenes:d.scenes,note:d.note||'',dayOff:d.dayOff||false,
        locations:[...new Set(d.scenes.map(id=>getScene(id)?.locationId).filter(Boolean))],
        characters:[...new Set(d.scenes.flatMap(id=>getScene(id)?.characters||[]))],
        estimatedPages:d.scenes.reduce((a,id)=>a+(getScene(id)?.pages||0),0),
      }));
      const sceneDay={};
      Object.values(schedule.days).forEach(d=>d.scenes.forEach(id=>{sceneDay[id]=d.day;}));
      return{...p,
        scenes:p.scenes?.map(s=>sceneDay[s.id]?{...s,shootDay:sceneDay[s.id]}:s)||[],
        shootDays:newShootDays,
        project:{...p.project,startDate,endDate}
      };
    });
  };

  const sharedProps={schedule,setSchedule,startDate,setStartDate,endDate,setEndDate,
    dayNumbers,maxDay,addDay,removeDay,toggleDayOff,moveScene,
    dragScene,setDragScene,dragFrom,setDragFrom,
    leftWidth,onResizeStart,getScene,getLoc,getChar,dayDate,fmtDate};

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'0 20px',borderBottom:`1px solid ${T.rule}`,display:'flex',alignItems:'center',gap:2,flexShrink:0}}>
        {[{id:'schedule',label:'Schedule'},{id:'callsheet',label:'Call Sheet'},{id:'checklist',label:'Checklist'}].map(tb=>(
          <button key={tb.id} onClick={()=>setDlTab(tb.id)}
            style={{padding:'10px 16px',fontSize:12,background:'transparent',border:'none',
              borderBottom:`2px solid ${dlTab===tb.id?T.accent:'transparent'}`,
              color:dlTab===tb.id?T.text:T.textMute,fontWeight:dlTab===tb.id?600:400,cursor:'pointer'}}>
            {tb.label}
          </button>
        ))}
        <div style={{flex:1}}/>
        <button onClick={saveSchedule} style={{padding:'5px 14px',background:T.accent,border:'none',
          borderRadius:5,color:'#0e0d0b',fontSize:11,fontWeight:600,margin:'4px 0',cursor:'pointer'}}>
          Save Schedule
        </button>
      </div>
      {dlTab==='schedule'&&<ScheduleTab {...sharedProps}/>}
      {dlTab==='callsheet'&&<CallSheetTab {...sharedProps}/>}
      {dlTab==='checklist'&&<ChecklistTab {...sharedProps}/>}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   SCHEDULE TAB
═══════════════════════════════════════════════════════════ */
function ScheduleTab({schedule,setSchedule,startDate,setStartDate,endDate,setEndDate,
  dayNumbers,maxDay,addDay,removeDay,toggleDayOff,moveScene,
  dragScene,setDragScene,dragFrom,setDragFrom,
  leftWidth,onResizeStart,getScene,getLoc,getChar,dayDate,fmtDate}){

  const mob=useMobile();
  const {navTarget,clearNavTarget}=useProj();
  const [showPool,setShowPool]=React.useState(false);
  const [selDay,setSelDay]=React.useState(null);
  const [selScene,setSelScene]=React.useState(null);
  const [dragOverDay,setDragOverDay]=React.useState(null);
  const [reorderDrag,setReorderDrag]=React.useState(null);
  const [dragOverIdx,setDragOverIdx]=React.useState(null);

  // Consume "return from jump" — e.g. user pressed ← Daily from Script/Breakdown/Shots
  React.useEffect(()=>{
    if(navTarget && navTarget.view==='daily' && navTarget.returnSceneId){
      const sid=navTarget.returnSceneId;
      // Find which day this scene is scheduled on
      const dayEntry=Object.values(schedule.days||{}).find(d=>(d.scenes||[]).includes(sid));
      if(dayEntry){
        setSelDay(dayEntry.day);
        setSelScene(sid);
      }
      clearNavTarget();
    }
  },[navTarget, clearNavTarget, schedule]);

  const reorderScene=(dayNum,fromIdx,toIdx)=>{
    if(fromIdx===toIdx)return;
    setSchedule(prev=>{
      const next={...prev,days:{...prev.days}};
      const scenes=[...next.days[dayNum].scenes];
      const [moved]=scenes.splice(fromIdx,1);
      scenes.splice(toIdx,0,moved);
      next.days[dayNum]={...next.days[dayNum],scenes};
      return next;
    });
  };

  const addWeekendDay=(dateKey)=>{
    const n=maxDay+1;
    setSchedule(s=>({...s,days:{...s.days,[n]:{day:n,scenes:[],note:'',dayOff:false,weekendDate:dateKey}}}));
    setSelDay(n);
  };
  const dropOnWeekend=(dateKey,sceneId,fromKey)=>{
    const n=maxDay+1;
    setSchedule(prev=>{
      const next={days:{},unscheduled:[...prev.unscheduled]};
      Object.keys(prev.days).forEach(k=>{next.days[k]={...prev.days[k],scenes:[...prev.days[k].scenes]};});
      next.days[n]={day:n,scenes:[],note:'',dayOff:false,weekendDate:dateKey};
      if(sceneId){
        if(fromKey==='pool')next.unscheduled=next.unscheduled.filter(id=>id!==sceneId);
        else if(next.days[Number(fromKey)])next.days[Number(fromKey)].scenes=next.days[Number(fromKey)].scenes.filter(id=>id!==sceneId);
        next.days[n].scenes=[sceneId];
      }
      return next;
    });
    setSelDay(n);
  };

  // ── Calendar ──────────────────────────────────────────────────
  const buildWeeks=()=>{
    if(!startDate)return[];
    try{
      const s=new Date(startDate+'T00:00:00');
      const dow=s.getDay();
      const mondayOff=dow===0?-6:1-dow;
      const monday=new Date(s.getTime()+mondayOff*86400000);
      const dateToDay={};
      let scan=new Date(s),dayIdx=1;
      while(dayIdx<=maxDay+2){
        const k=scan.toISOString().slice(0,10);
        if(scan.getDay()!==0&&scan.getDay()!==6){dateToDay[k]=dayIdx;dayIdx++;}
        scan=new Date(scan.getTime()+86400000);
      }
      const totalWeeks=Math.max(2,Math.ceil((maxDay+4)/5)+1);
      const weeks=[];
      let cur=new Date(monday);
      for(let w=0;w<totalWeeks;w++){
        const week=[];
        for(let d=0;d<7;d++){
          const date=new Date(cur.getTime()+d*86400000);
          const k=date.toISOString().slice(0,10);
          week.push({date,key:k,dayNum:dateToDay[k]||null,isWeekend:date.getDay()===0||date.getDay()===6});
        }
        weeks.push(week);
        cur=new Date(cur.getTime()+7*86400000);
        if(w>=1&&weeks[weeks.length-1].every(c=>!c.dayNum))break;
      }
      return weeks;
    }catch{return[];}
  };
  const weeks=React.useMemo(buildWeeks,[startDate,maxDay]);
  const [calPage,setCalPage]=React.useState(0);
  const WEEKS_PER_PAGE=2;
  const visWeeks=weeks.slice(calPage*WEEKS_PER_PAGE,(calPage+1)*WEEKS_PER_PAGE);
  const totalPages=Math.ceil(weeks.length/WEEKS_PER_PAGE);

  // ── Helpers ───────────────────────────────────────────────────
  function SectionH({label}){
    return<div style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,
      letterSpacing:'0.1em',marginBottom:6,marginTop:12}}>{label}</div>;
  }
  function InfoRow({label,labelColor,text,accent,suffix}){
    return(
      <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 0',borderBottom:`1px solid ${T.rule}`}}>
        {label&&<span style={{fontSize:10,color:labelColor||T.accent,flexShrink:0,minWidth:52}}>{label}</span>}
        <span style={{fontSize:11,color:accent||T.text,flex:1}}>{text}</span>
        {suffix&&<span style={{fontSize:10,color:accent||T.textDim,fontFamily:"'Geist Mono',monospace"}}>{suffix}</span>}
      </div>
    );
  }

  // ── Detail panel ──────────────────────────────────────────────
  const selDayData=selDay?schedule.days[selDay]:null;
  const selSceneData=selScene?getScene(selScene):null;

  const renderDetail=()=>{
    if(selScene&&selSceneData){
      const s=selSceneData;
      const loc=getLoc(s.locationId);
      const chars=(s.characters||[]).map(id=>getChar(id)).filter(Boolean);
      return(
        <div style={{height:'100%',overflow:'auto',padding:'14px 18px'}}>
          <button onClick={()=>setSelScene(null)}
            style={{display:'flex',alignItems:'center',gap:5,color:T.accent,fontSize:11,
              fontFamily:"'Geist Mono',monospace",marginBottom:12,background:'transparent',
              border:'none',cursor:'pointer',padding:0}}>
            ← DAY {String(selDay).padStart(2,'0')}
          </button>
          <div style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,marginBottom:3}}>{s.id} · {s.timeOfDay}</div>
          <div style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:20,color:T.text,marginBottom:10,lineHeight:1.3}}>{s.slug}</div>
          <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
            <button onClick={()=>window.__sbNavigateTo?.('script',{sceneId:s.id,fromView:'daily',fromSceneId:s.id,fromLabel:`Daily\u00B7${s.id}`})}
              style={{display:'inline-flex',alignItems:'center',gap:5,padding:'4px 10px',borderRadius:5,background:T.chip,border:`1px solid ${T.border}`,color:T.textMute,fontSize:11,fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}
              onMouseEnter={e=>{e.currentTarget.style.color=T.text;}} onMouseLeave={e=>{e.currentTarget.style.color=T.textMute;}}>
              {'\u2630'} Script
            </button>
            <button onClick={()=>window.__sbNavigateTo?.('breakdown',{sceneId:s.id,tab:'scenes',fromView:'daily',fromSceneId:s.id,fromLabel:`Daily\u00B7${s.id}`})}
              style={{display:'inline-flex',alignItems:'center',gap:5,padding:'4px 10px',borderRadius:5,background:T.chip,border:`1px solid ${T.border}`,color:T.textMute,fontSize:11,fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}
              onMouseEnter={e=>{e.currentTarget.style.color=T.text;}} onMouseLeave={e=>{e.currentTarget.style.color=T.textMute;}}>
              {'\u25EB'} Breakdown
            </button>
            <button onClick={()=>window.__sbNavigateTo?.('shots',{sceneId:s.id,fromView:'daily',fromSceneId:s.id,fromLabel:`Daily\u00B7${s.id}`})}
              style={{display:'inline-flex',alignItems:'center',gap:5,padding:'4px 10px',borderRadius:5,background:T.accent+'18',border:`1px solid ${T.accent}44`,color:T.accent,fontSize:11,fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}
              onMouseEnter={e=>{e.currentTarget.style.background=T.accent+'33';}} onMouseLeave={e=>{e.currentTarget.style.background=T.accent+'18';}}>
              {'\uD83C\uDFAC'} Shots
            </button>
          </div>
          {loc&&<div style={{display:'flex',alignItems:'center',gap:7,marginBottom:10,padding:'6px 10px',background:T.chip,borderRadius:6}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:loc.color,flexShrink:0}}/>
            <span style={{fontSize:12,color:T.text,flex:1}}>{loc.name}</span>
            <span style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim}}>{loc.type}</span>
          </div>}
          {chars.length>0&&<><SectionH label="CAST"/>
            <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:4}}>
              {chars.map(c=><span key={c.id} style={{padding:'3px 10px',borderRadius:99,background:c.color+'22',border:`1px solid ${c.color}44`,fontSize:11,color:c.color}}>{c.name}</span>)}
            </div></>}
          {(s.props||[]).length>0&&<><SectionH label={`PROPS ×${s.props.length}`}/>
            {s.props.map((p,i)=><InfoRow key={i} text={p.name} accent={p.critical?T.danger:null} suffix={p.critical?'★':null}/>)}</>}
          {(s.wardrobe||[]).length>0&&<><SectionH label="COSTUME"/>
            {s.wardrobe.map((w,i)=>{const c=getChar(w.characterId);return<InfoRow key={i} label={c?.name} labelColor={c?.color} text={w.description}/>;})}</>}
          {(s.makeup||[]).length>0&&<><SectionH label="MAKEUP"/>
            {s.makeup.map((m,i)=>{const c=getChar(m.characterId);return<InfoRow key={i} label={c?.name} labelColor={c?.color} text={m.description}/>;})}</>}
          {s.synopsis&&<><SectionH label="SYNOPSIS"/>
            <div style={{fontSize:12,color:T.textMute,lineHeight:1.6}}>{s.synopsis}</div></>}
        </div>
      );
    }

    if(selDay&&selDayData){
      const d=selDayData;
      const dt=dayDate(selDay);
      const allLocs=[...new Set(d.scenes.map(id=>getScene(id)?.locationId).filter(Boolean))].map(l=>getLoc(l)).filter(Boolean);
      const allChars=[...new Set(d.scenes.flatMap(id=>getScene(id)?.characters||[]))].map(id=>getChar(id)).filter(Boolean);
      const allProps=[...new Set(d.scenes.flatMap(id=>(getScene(id)?.props||[]).map(p=>p.name)))];
      const pages=d.scenes.reduce((a,id)=>a+(getScene(id)?.pages||0),0);
      return(
        <div style={{height:'100%',overflow:'auto',padding:'14px 18px'}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,flexWrap:'wrap'}}>
            <span style={{fontFamily:"'Geist Mono',monospace",fontSize:11,color:T.accent,fontWeight:700}}>
              DAY {String(selDay).padStart(2,'0')}
            </span>
            {dt&&<span style={{fontSize:12,color:T.textMute}}>{fmtDate(dt)}</span>}
            <div style={{marginLeft:'auto',display:'flex',gap:6}}>
              <button onClick={()=>toggleDayOff(selDay)}
                style={{padding:'3px 9px',borderRadius:4,fontSize:10,cursor:'pointer',
                  background:d.dayOff?T.warn+'22':'transparent',
                  border:`1px solid ${d.dayOff?T.warn:T.border}`,
                  color:d.dayOff?T.warn:T.textDim}}>
                {d.dayOff?'▶ Resume':'⏸ Day Off'}
              </button>
              <button onClick={()=>{
                  if(confirm(`Remove Day ${selDay} entirely? Its ${d.scenes.length} scene(s) will go back to Unscheduled. This cannot be undone.`)){
                    removeDay(selDay);setSelDay(null);
                  }
                }}
                style={{padding:'3px 9px',borderRadius:4,fontSize:10,cursor:'pointer',
                  background:T.danger+'10',border:`1px solid ${T.danger}44`,color:T.danger}}>
                × Remove
              </button>
            </div>
          </div>
          <div style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,marginBottom:10}}>
            {d.scenes.length} scenes · {pages.toFixed(1)}p
          </div>
          {/* Note */}
          <SectionH label="NOTE"/>
          <textarea value={d.note||''} rows={2}
            onChange={e=>setSchedule(prev=>({...prev,days:{...prev.days,[selDay]:{...prev.days[selDay],note:e.target.value}}}))}
            placeholder="Add note for this day..."
            style={{width:'100%',background:T.surface2,border:`1px solid ${T.border}`,borderRadius:4,
              padding:'5px 8px',fontSize:11,color:T.text,resize:'vertical',boxSizing:'border-box',marginBottom:8}}/>
          {/* Scene list with reorder */}
          <SectionH label="SCENES  -  drag to reorder"/>
          <div onDragOver={e=>e.preventDefault()}
            onDrop={e=>{e.preventDefault();
              if(reorderDrag&&reorderDrag.dayNum===selDay){}
              else if(dragScene&&dragFrom!==String(selDay))moveScene(dragScene,dragFrom,String(selDay));
            }}>
            {d.scenes.length===0&&(
              <div style={{padding:'12px',textAlign:'center',fontSize:11,color:T.textDim,
                border:`2px dashed ${T.border}`,borderRadius:6}}>Drag scenes here</div>
            )}
            {d.scenes.map((id,idx)=>{
              const s=getScene(id);const loc=getLoc(s?.locationId);if(!s)return null;
              return(
                <div key={id} draggable
                  onDragStart={e=>{setDragScene(id);setDragFrom(''+selDay);setReorderDrag({dayNum:selDay,idx});e.stopPropagation();}}
                  onDragEnd={()=>{setDragScene(null);setDragFrom(null);setReorderDrag(null);setDragOverIdx(null);}}
                  onDragOver={e=>{e.preventDefault();e.stopPropagation();setDragOverIdx(idx);}}
                  onDrop={e=>{e.preventDefault();e.stopPropagation();
                    if(reorderDrag?.dayNum===selDay)reorderScene(selDay,reorderDrag.idx,idx);
                    setDragOverIdx(null);setReorderDrag(null);}}
                  style={{padding:'5px 8px',marginBottom:2,borderRadius:5,cursor:'grab',
                    background:T.panelHi,userSelect:'none',display:'flex',alignItems:'center',gap:6,
                    border:`1px solid ${dragOverIdx===idx?T.accent:T.border}`,
                    borderTop:dragOverIdx===idx?`2px solid ${T.accent}`:undefined}}>
                  <span style={{color:T.textDim,fontSize:10}}>⠿</span>
                  <div style={{width:6,height:6,borderRadius:'50%',background:loc?.color||T.textDim,flexShrink:0}}/>
                  <span style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,flexShrink:0}}>{s.id}</span>
                  <span onClick={()=>setSelScene(id)}
                    style={{fontSize:11,color:T.text,flex:1,overflow:'hidden',textOverflow:'ellipsis',
                      whiteSpace:'nowrap',cursor:'pointer',textDecoration:'underline',
                      textDecorationColor:T.border}}>
                    {s.slug?.replace(/^(INT|EXT)[./\s]*/i,'').slice(0,32)}
                  </span>
                  <span style={{fontSize:10,color:T.textDim,flexShrink:0}}>{s.pages}p</span>
                  <button onClick={(e)=>{e.stopPropagation();window.__sbNavigateTo?.('script',{sceneId:id,fromView:'daily',fromSceneId:id,fromLabel:`Daily\u00B7${s.id}`});}}
                    title="View this scene in the Script"
                    style={{color:T.textMute,fontSize:11,lineHeight:1,padding:'2px 6px',
                      background:T.chip,border:`1px solid ${T.border}`,borderRadius:4,
                      cursor:'pointer',flexShrink:0,fontFamily:"'Geist Mono',monospace"}}
                    onMouseEnter={e=>{e.currentTarget.style.background=T.panelHi;e.currentTarget.style.color=T.text;}}
                    onMouseLeave={e=>{e.currentTarget.style.background=T.chip;e.currentTarget.style.color=T.textMute;}}>
                    {'\u2630\u2192'}
                  </button>
                  <button onClick={(e)=>{e.stopPropagation();window.__sbNavigateTo?.('breakdown',{sceneId:id,tab:'scenes',fromView:'daily',fromSceneId:id,fromLabel:`Daily\u00B7${s.id}`});}}
                    title="View this scene's Breakdown"
                    style={{color:T.textMute,fontSize:11,lineHeight:1,padding:'2px 6px',
                      background:T.chip,border:`1px solid ${T.border}`,borderRadius:4,
                      cursor:'pointer',flexShrink:0,fontFamily:"'Geist Mono',monospace"}}
                    onMouseEnter={e=>{e.currentTarget.style.background=T.panelHi;e.currentTarget.style.color=T.text;}}
                    onMouseLeave={e=>{e.currentTarget.style.background=T.chip;e.currentTarget.style.color=T.textMute;}}>
                    {'\u25EB\u2192'}
                  </button>
                  <button onClick={(e)=>{e.stopPropagation();window.__sbNavigateTo?.('shots',{sceneId:id,fromView:'daily',fromSceneId:id,fromLabel:`Daily\u00B7${s.id}`});}}
                    title="Jump to Shot Board for this scene"
                    style={{color:T.accent,fontSize:11,lineHeight:1,padding:'2px 6px',
                      background:T.accent+'18',border:`1px solid ${T.accent}44`,borderRadius:4,
                      cursor:'pointer',flexShrink:0,fontFamily:"'Geist Mono',monospace"}}
                    onMouseEnter={e=>e.currentTarget.style.background=T.accent+'33'}
                    onMouseLeave={e=>e.currentTarget.style.background=T.accent+'18'}>
                    🎬→
                  </button>
                  <button onClick={()=>{ if(confirm(`Remove scene ${s.id} from Day ${selDay}? It will go back to Unscheduled.`)) moveScene(id,String(selDay),'pool'); }}
                    style={{color:T.textDim,fontSize:14,lineHeight:1,padding:'0 3px',background:'transparent',
                      border:'none',cursor:'pointer',flexShrink:0}}
                    onMouseEnter={e=>e.currentTarget.style.color=T.danger}
                    onMouseLeave={e=>e.currentTarget.style.color=T.textDim}>×</button>
                </div>
              );
            })}
          </div>
          {allLocs.length>0&&<><SectionH label="LOCATIONS"/>
            {allLocs.map(l=><div key={l.id} style={{display:'flex',alignItems:'center',gap:7,padding:'3px 0',borderBottom:`1px solid ${T.rule}`}}>
              <div style={{width:7,height:7,borderRadius:'50%',background:l.color,flexShrink:0}}/>
              <span style={{fontSize:12,color:T.text,flex:1}}>{l.name}</span>
              <span style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim}}>{l.type}</span>
            </div>)}</>}
          {allChars.length>0&&<><SectionH label="CAST"/>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {allChars.map(c=><span key={c.id} style={{padding:'3px 10px',borderRadius:99,
                background:c.color+'22',border:`1px solid ${c.color}44`,fontSize:11,color:c.color}}>{c.name}</span>)}
            </div></>}
          {allProps.length>0&&<><SectionH label={`PROPS ×${allProps.length}`}/>
            {allProps.map((p,i)=><InfoRow key={i} text={p}/>)}</>}
        </div>
      );
    }

    return(
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
        height:'100%',gap:12,color:T.textMute,padding:32,textAlign:'center'}}>
        <div style={{fontSize:32,opacity:0.25}}>▤</div>
        <div style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:20,color:T.textMute,whiteSpace:'nowrap'}}>No day selected</div>
        <div style={{fontSize:13,lineHeight:1.7,maxWidth:300,color:T.textDim}}>
          Pick a shoot day from the calendar to see its scenes, cast and props  -  or drag a scene from <b style={{color:T.textMute}}>Unscheduled</b> onto a day.
        </div>
      </div>
    );
  };

  // ── Calendar cell ─────────────────────────────────────────────
  const CalCell=({date,dayNum,isWeekend,cellKey})=>{
    const dayData=dayNum?schedule.days[dayNum]:null;
    const isSelected=selDay===dayNum;
    const isDragOver=dragOverDay===cellKey;
    const locs=dayData?[...new Set(dayData.scenes.map(id=>getScene(id)?.locationId).filter(Boolean))].map(l=>getLoc(l)).filter(Boolean):[];
    const pages=dayData?dayData.scenes.reduce((a,id)=>a+(getScene(id)?.pages||0),0):0;
    return(
      <div
        onDragOver={e=>{if((dayNum&&!dayData?.dayOff)||isWeekend){e.preventDefault();setDragOverDay(cellKey);}}}
        onDragLeave={()=>setDragOverDay(null)}
        onDrop={e=>{e.preventDefault();setDragOverDay(null);
          if(dragScene){
            if(dayNum&&!dayData?.dayOff)moveScene(dragScene,''+dragFrom,''+dayNum);
            else if(isWeekend&&!dayNum)dropOnWeekend(cellKey,dragScene,''+dragFrom);
          }}}
        onClick={()=>{
          if(dayNum){setSelDay(isSelected?null:dayNum);setSelScene(null);}
          else if(isWeekend){addWeekendDay(cellKey);}
        }}
        style={{minHeight:90,borderRadius:7,padding:'6px 7px',
          cursor:dayNum?'pointer':isWeekend?'pointer':'default',
          background:isSelected?T.accent+'18':dayData?.dayOff?T.warn+'08':dayNum?T.panel:isWeekend?T.panel+'cc':T.surface2+'40',
          border:`1px solid ${isSelected?T.accent+'66':isDragOver?T.accent+'99':dayNum?T.border:isWeekend?T.border+'88':T.rule}`,
          transition:'border-color 0.1s,background 0.1s',position:'relative'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:3}}>
          <span style={{fontFamily:"'Geist Mono',monospace",fontSize:10,
            color:T.text,fontWeight:isSelected?700:400}}>
            {date.getDate()}
          </span>
          {dayNum&&<span style={{fontFamily:"'Geist Mono',monospace",fontSize:10,
            color:isSelected?T.accent:T.info,fontWeight:600}}>D{dayNum}</span>}
          {isWeekend&&!dayNum&&<span style={{fontFamily:"'Geist Mono',monospace",fontSize:9,color:T.textDim,opacity:0.6}}>WKD</span>}
        </div>
        {dayData&&!dayData.dayOff&&dayData.scenes.length>0&&(
          <>
            <div style={{display:'flex',alignItems:'baseline',gap:4,marginBottom:3}}>
              <span style={{fontFamily:"'Geist Mono',monospace",fontSize:15,color:T.text,fontWeight:700,letterSpacing:'-0.03em',lineHeight:1}}>
                {dayData.scenes.length}sc
              </span>
              <span style={{fontFamily:"'Geist Mono',monospace",fontSize:9,color:T.textDim}}>
                {pages.toFixed(1)}p
              </span>
            </div>
            {locs.slice(0,3).map(l=>(
              <div key={l.id} style={{display:'flex',alignItems:'center',gap:4,marginBottom:2}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:l.color,flexShrink:0}}/>
                <span style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.text,fontWeight:500,
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:80}}>
                  {l.name.slice(0,11)}
                </span>
              </div>
            ))}
            {locs.length>3&&<span style={{fontSize:9,color:T.textDim,fontFamily:"'Geist Mono',monospace"}}>+{locs.length-3}</span>}
          </>
        )}
        {dayNum&&dayData?.dayOff&&<div style={{fontSize:10,color:T.warn,fontFamily:"'Geist Mono',monospace",marginTop:2}}>DAY OFF</div>}
        {dayNum&&dayData&&!dayData.dayOff&&dayData.scenes.length===0&&(
          <div style={{fontSize:10,color:T.textDim,fontFamily:"'Geist Mono',monospace",fontStyle:'italic',marginTop:2}}>empty</div>
        )}
        {isWeekend&&!dayNum&&(
          <div style={{position:'absolute',bottom:4,left:0,right:0,textAlign:'center',
            fontFamily:"'Geist Mono',monospace",fontSize:9,color:T.textDim,opacity:0.4}}>+ shoot</div>
        )}
        {isDragOver&&<div style={{position:'absolute',inset:0,borderRadius:7,
          background:T.accent+'14',border:`2px solid ${T.accent}77`,pointerEvents:'none'}}/>}
      </div>
    );
  };

  return(
    <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
      {/* Top bar */}
      <div style={{padding:'5px 14px',borderBottom:`1px solid ${T.rule}`,display:'flex',
        alignItems:'center',gap:10,flexShrink:0,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:5}}>
          <span style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,letterSpacing:'0.1em'}}>START</span>
          <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}
            style={{background:T.surface2,border:`1px solid ${T.border}`,borderRadius:4,
              padding:'3px 7px',fontSize:10,color:T.text,fontFamily:"'Geist Mono',monospace"}}/>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:5}}>
          <span style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,letterSpacing:'0.1em'}}>END</span>
          <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)}
            style={{background:T.surface2,border:`1px solid ${T.border}`,borderRadius:4,
              padding:'3px 7px',fontSize:10,color:T.text,fontFamily:"'Geist Mono',monospace"}}/>
        </div>

/* ═══════════════════════════════════════════════════════════
   CHECKLIST TAB
═══════════════════════════════════════════════════════════ */
function ChecklistTab({schedule,dayNumbers,getScene,getLoc,getChar,dayDate,fmtDate}){
  const {proj,updateProj}=useProj();
  const mob=useMobile();
  const [selDay,setSelDay]=React.useState(dayNumbers[0]||null);
  const [editItem,setEditItem]=React.useState(null);
  const [newText,setNewText]=React.useState('');
  const [addingCat,setAddingCat]=React.useState(null);
  const [addText,setAddText]=React.useState('');
  const [fbData,setFbData]=React.useState({}); // realtime data from Firestore
  const [syncStatus,setSyncStatus]=React.useState(''); // '' | 'saving' | 'saved' | 'live'
  const unsubRef=React.useRef({});

  React.useEffect(()=>{if(dayNumbers.length>0&&!selDay)setSelDay(dayNumbers[0]);},[dayNumbers]);

  // Subscribe to Firestore realtime updates when day changes
  React.useEffect(()=>{
    if(!selDay||!proj._id)return;
    const key=proj._id+'_'+selDay;
    // Unsubscribe previous
    if(unsubRef.current[key]){ /* already subscribed */ return; }
    const unsub=fbSubscribeChecklist(proj._id, selDay, (data)=>{
      setFbData(prev=>({...prev,[selDay]:data}));
      setSyncStatus('live');
    });
    unsubRef.current[key]=unsub;
    return ()=>{ unsub && unsub(); delete unsubRef.current[key]; };
  },[selDay,proj._id]);

  const dayData=selDay?schedule.days[selDay]:null;
  const dt=selDay?dayDate(selDay):null;

  // Get checklist: prefer Firestore realtime data, fallback to proj._checklists
  const getChecklist=(dayNum)=>fbData[dayNum]||proj._checklists?.[dayNum]||{};

  // Save to both Firestore (realtime) and proj (export)
  const saveChecklist=(dayNum,data)=>{
    setSyncStatus('saving');
    // Save to Firestore for realtime sync
    fbSaveChecklist(proj._id||'default', dayNum, data).then(()=>{
      setSyncStatus('saved');
      setTimeout(()=>setSyncStatus('live'),1500);
    });
    // Also save to proj for Export JSON
    updateProj(p=>({...p,_checklists:{...(p._checklists||{}),[dayNum]:data}}));
    // Update local fbData immediately for instant UI response
    setFbData(prev=>({...prev,[dayNum]:data}));
  };

  const toggleItem=(cat,idx)=>{
    const cl={...getChecklist(selDay)};
    if(!cl[cat])return;
    cl[cat]=cl[cat].map((item,i)=>i===idx?{...item,checked:!item.checked}:item);
    saveChecklist(selDay,cl);
  };

  const deleteItem=(cat,idx)=>{
    const cl={...getChecklist(selDay)};
    cl[cat]=cl[cat].filter((_,i)=>i!==idx);
    saveChecklist(selDay,cl);
  };

  const saveEdit=(cat,idx)=>{
    const cl={...getChecklist(selDay)};
    cl[cat]=cl[cat].map((item,i)=>i===idx?{...item,text:newText}:item);
    saveChecklist(selDay,cl);
    setEditItem(null);setNewText('');
  };

  const addItem=(cat)=>{
    if(!addText.trim())return;
    const cl={...getChecklist(selDay)};
    cl[cat]=[...(cl[cat]||[]),{text:addText.trim(),checked:false,custom:true}];
    saveChecklist(selDay,cl);
    setAddingCat(null);setAddText('');
  };

  // Build auto checklist from scene data
  const buildAutoItems=()=>{
    if(!dayData)return{};
    const scenes=dayData.scenes.map(id=>getScene(id)).filter(Boolean);
    const chars=[...new Map(scenes.flatMap(s=>(s.characters||[]).map(id=>getChar(id)).filter(Boolean)).map(c=>[c.id,c])).values()];
    const props=[...new Set(scenes.flatMap(s=>(s.props||[]).map(p=>p.name)))];
    const costumes=[...new Map(scenes.flatMap(s=>(s.wardrobe||[]).map(w=>{const c=getChar(w.characterId);return c?[c.id+'::'+w.description,`${c.name}  -  ${w.description}`]:null;}).filter(Boolean)).values())];
    const makeup=[...new Map(scenes.flatMap(s=>(s.makeup||[]).map(m=>{const c=getChar(m.characterId);return c?[c.id+'::'+m.description,`${c.name}  -  ${m.description}`]:null;}).filter(Boolean)).values())];
    const locs=[...new Map(scenes.map(s=>getLoc(s.locationId)).filter(Boolean).map(l=>[l.id,l])).values()];
    return{
      'CAST':chars.map(c=>c.name),
      'PROPS':props,
      'COSTUME':costumes,
      'MAKEUP':makeup,
      'LOCATIONS':locs.map(l=>l.name),
      'EQUIPMENT':['Camera body','Lenses','Tripod / head','Sound recorder','Boom mic','Slate','Extra batteries','Memory cards'],
    };
  };

  // Merge auto items with saved checklist (auto items first, custom appended)
  const getMergedList=()=>{
    const auto=buildAutoItems();
    const saved=getChecklist(selDay);
    const merged={};
    Object.entries(auto).forEach(([cat,names])=>{
      const savedCat=saved[cat]||[];
      const savedMap=Object.fromEntries(savedCat.map(item=>[item.text,item]));
      merged[cat]=[
        ...names.map(name=>savedMap[name]||{text:name,checked:false}),
        ...(savedCat.filter(item=>item.custom)||[])
      ];
    });
    // custom categories
    Object.keys(saved).forEach(cat=>{
      if(!merged[cat])merged[cat]=saved[cat];
    });
    return merged;
  };

  const checklist=selDay?getMergedList():{};
  const cats=Object.keys(checklist);
  const totalItems=cats.reduce((a,c)=>a+(checklist[c]||[]).length,0);
  const checkedItems=cats.reduce((a,c)=>a+(checklist[c]||[]).filter(i=>i.checked).length,0);
  const pct=totalItems>0?Math.round(checkedItems/totalItems*100):0;

  const CAT_ICONS={'CAST':'👤','PROPS':'🎭','COSTUME':'👗','MAKEUP':'💄','LOCATIONS':'📍','EQUIPMENT':'🎬'};

  return(
    <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:mob?'column':'row'}}>
      {/* Day nav */}
      <div style={{width:mob?'100%':78,flexShrink:0,borderRight:mob?'none':`1px solid ${T.border}`,borderBottom:mob?`1px solid ${T.border}`:'none',overflow:'auto',padding:mob?'4px':'4px 0',background:T.panel,display:'flex',flexDirection:mob?'row':'column'}}>
        {dayNumbers.map(dayNum=>{
          const d=schedule.days[dayNum];
          const dt2=dayDate(dayNum);
          const isSel=selDay===dayNum;
          const cl=proj._checklists?.[dayNum]||{};
          const tot=Object.values(cl).flat().length;
          const chk=Object.values(cl).flat().filter(i=>i.checked).length;
          return(
            <div key={dayNum} onClick={()=>setSelDay(dayNum)}
              style={{padding:'7px 5px',cursor:'pointer',textAlign:'center',marginBottom:1,
                borderLeft:`2px solid ${isSel?T.accent:'transparent'}`,
                background:isSel?T.chip:'transparent'}}>
              <div style={{fontFamily:"'Geist Mono',monospace",fontSize:9,color:isSel?T.accent:T.textDim}}>D{String(dayNum).padStart(2,'0')}</div>
              {dt2&&<div style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:12,
                color:isSel?T.text:T.textMute,lineHeight:1.1}}>
                {dt2.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
              </div>}
              {tot>0&&<div style={{fontFamily:"'Geist Mono',monospace",fontSize:9,marginTop:2,
                color:chk===tot?T.success:T.warn}}>{chk}/{tot}</div>}
            </div>
          );
        })}
      </div>

      {selDay?(
        <div style={{flex:1,overflow:'auto',padding:'14px 18px'}}>
          {/* Header + progress */}
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4,flexWrap:'wrap'}}>
            <div style={{fontFamily:"'Geist Mono',monospace",fontSize:11,color:T.accent,fontWeight:700}}>
              DAY {String(selDay).padStart(2,'0')}
            </div>
            {dt&&<div style={{fontSize:12,color:T.textMute}}>{fmtDate(dt)}</div>}
            {/* Realtime sync status */}
            <div style={{display:'flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:99,
              background:syncStatus==='live'?T.success+'18':syncStatus==='saving'?T.warn+'18':T.surface2,
              border:`1px solid ${syncStatus==='live'?T.success+'44':syncStatus==='saving'?T.warn+'44':T.border}`}}>
              <div style={{width:5,height:5,borderRadius:'50%',
                background:syncStatus==='live'?T.success:syncStatus==='saving'?T.warn:T.textDim,
                animation:syncStatus==='live'?'pulse 2s infinite':undefined}}/>
              <span style={{fontFamily:"'Geist Mono',monospace",fontSize:8,
                color:syncStatus==='live'?T.success:syncStatus==='saving'?T.warn:T.textDim}}>
                {syncStatus==='live'?'LIVE':syncStatus==='saving'?'SYNCING...':'OFFLINE'}
              </span>
            </div>
            <div style={{marginLeft:'auto',fontFamily:"'Geist Mono',monospace",fontSize:10,
              color:pct===100?T.success:T.textDim}}>
              {checkedItems}/{totalItems} · {pct}%
            </div>
          </div>
          {/* Progress bar */}
          <div style={{height:4,background:T.surface2,borderRadius:2,marginBottom:16,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${pct}%`,background:pct===100?T.success:T.accent,
              borderRadius:2,transition:'width 0.3s'}}/>
          </div>

          {/* Checklist categories */}
          {cats.map(cat=>{
            const items=checklist[cat]||[];
            if(items.length===0&&!addingCat)return null;
            const checkedCount=items.filter(i=>i.checked).length;
            return(
              <div key={cat} style={{marginBottom:16}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                  <span style={{fontSize:13}}>{CAT_ICONS[cat]||'✦'}</span>
                  <span style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,
                    letterSpacing:'0.1em',flex:1}}>{cat}</span>
                  <span style={{fontFamily:"'Geist Mono',monospace",fontSize:10,
                    color:checkedCount===items.length&&items.length>0?T.success:T.textDim}}>
                    {checkedCount}/{items.length}
                  </span>
                  <button onClick={()=>{setAddingCat(cat);setAddText('');}}
                    style={{fontSize:11,color:T.info,background:'transparent',border:'none',
                      cursor:'pointer',padding:'0 4px'}}>+ add</button>
                </div>
                {items.map((item,idx)=>(
                  <div key={idx} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 8px',
                    marginBottom:2,borderRadius:5,background:item.checked?T.success+'08':T.chip,
                    border:`1px solid ${item.checked?T.success+'22':T.border}`}}>
                    {/* Checkbox */}
                    <div onClick={()=>toggleItem(cat,idx)}
                      style={{width:16,height:16,borderRadius:4,flexShrink:0,cursor:'pointer',
                        background:item.checked?T.success:'transparent',
                        border:`1.5px solid ${item.checked?T.success:T.border}`,
                        display:'grid',placeItems:'center'}}>
                      {item.checked&&<span style={{fontSize:10,color:'#0e0d0b',fontWeight:700}}>✓</span>}
                    </div>
                    {editItem?.cat===cat&&editItem?.idx===idx?(
                      <>
                        <input autoFocus value={newText} onChange={e=>setNewText(e.target.value)}
                          onKeyDown={e=>{if(e.key==='Enter')saveEdit(cat,idx);if(e.key==='Escape'){setEditItem(null);setNewText('');}}}
                          style={{flex:1,background:T.surface2,border:`1px solid ${T.accent}`,borderRadius:4,
                            padding:'2px 6px',fontSize:11,color:T.text}}/>
                        <button onClick={()=>saveEdit(cat,idx)}
                          style={{fontSize:10,color:T.success,background:'transparent',border:'none',cursor:'pointer'}}>✓</button>
                        <button onClick={()=>{setEditItem(null);setNewText('');}}
                          style={{fontSize:12,color:T.textDim,background:'transparent',border:'none',cursor:'pointer'}}>✕</button>
                      </>
                    ):(
                      <>
                        <span style={{flex:1,fontSize:12,color:item.checked?T.textDim:T.text,
                          textDecoration:item.checked?'line-through':'none'}}>{item.text}</span>
                        <button onClick={()=>{setEditItem({cat,idx});setNewText(item.text);}}
                          style={{fontSize:10,color:T.textDim,background:'transparent',border:'none',
                            cursor:'pointer',opacity:0.5,padding:'0 2px'}}
                          onMouseEnter={e=>e.currentTarget.style.opacity='1'}
                          onMouseLeave={e=>e.currentTarget.style.opacity='0.5'}>✎</button>
                        {item.custom&&<button onClick={()=>deleteItem(cat,idx)}
                          style={{fontSize:11,color:T.textDim,background:'transparent',border:'none',
                            cursor:'pointer',opacity:0.4,padding:'0 2px'}}
                          onMouseEnter={e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.color=T.danger;}}
                          onMouseLeave={e=>{e.currentTarget.style.opacity='0.4';e.currentTarget.style.color=T.textDim;}}>×</button>}
                      </>
                    )}
                  </div>
                ))}
                {addingCat===cat&&(
                  <div style={{display:'flex',gap:6,marginTop:4,padding:'4px 6px',
                    background:T.info+'08',borderRadius:5,border:`1px solid ${T.info}22`}}>
                    <input autoFocus value={addText} onChange={e=>setAddText(e.target.value)}
                      onKeyDown={e=>{if(e.key==='Enter')addItem(cat);if(e.key==='Escape'){setAddingCat(null);setAddText('');}}}
                      placeholder="New item..." style={{flex:1,background:T.surface2,
                        border:`1px solid ${T.border}`,borderRadius:4,padding:'3px 7px',
                        fontSize:11,color:T.text}}/>
                    <button onClick={()=>addItem(cat)}
                      style={{padding:'3px 10px',background:T.info+'22',border:`1px solid ${T.info}44`,
                        borderRadius:4,color:T.info,fontSize:11,cursor:'pointer'}}>Add</button>
                    <button onClick={()=>{setAddingCat(null);setAddText('');}}
                      style={{padding:'3px 8px',border:`1px solid ${T.border}`,borderRadius:4,
                        color:T.textDim,fontSize:11,background:'transparent',cursor:'pointer'}}>✕</button>
                  </div>
                )}
              </div>
            );
          })}

          {/* Add custom category */}
          <button onClick={()=>{setAddingCat('CUSTOM');setAddText('');}}
            style={{padding:'5px 14px',background:'transparent',border:`1px dashed ${T.border}`,
              borderRadius:5,color:T.textDim,fontSize:11,cursor:'pointer',marginTop:4}}>
            + Add category
          </button>
          {addingCat==='CUSTOM'&&(
            <div style={{marginTop:8,display:'flex',gap:6}}>
              <input autoFocus value={addText} onChange={e=>setAddText(e.target.value)}
                placeholder="Category name..." style={{flex:1,background:T.surface2,
                  border:`1px solid ${T.border}`,borderRadius:4,padding:'4px 8px',
                  fontSize:11,color:T.text}}/>
              <button onClick={()=>{
                if(addText.trim()){
                  const cl={...getChecklist(selDay),[addText.trim().toUpperCase()]:[]};
                  saveChecklist(selDay,cl);setAddingCat(null);setAddText('');
                }
              }} style={{padding:'4px 12px',background:T.accent,border:'none',borderRadius:4,
                color:'#0e0d0b',fontSize:11,fontWeight:600,cursor:'pointer'}}>Create</button>
              <button onClick={()=>{setAddingCat(null);setAddText('');}}
                style={{padding:'4px 10px',border:`1px solid ${T.border}`,borderRadius:4,
                  color:T.textDim,fontSize:11,background:'transparent',cursor:'pointer'}}>✕</button>
            </div>
          )}
        </div>
      ):(
        <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:T.textDim,fontSize:13}}>
          Select a shoot day to view checklist
        </div>
      )}
    </div>
  );
}

        <Card>
          <SHdr title={t.alerts}/>
          <div style={{padding:16,display:'grid',gap:8}}>

            {proj.continuityAlerts?.slice(0,4).map((a,i)=>(

        {/* Characters */}
        <Card>
          <SHdr title={t.characters.toUpperCase()} count={proj.characters?.length}/>
          <div style={{padding:16,display:'grid',gap:8,maxHeight:'none',overflowY:'visible'}}>
            {proj.characters?.map(c=>{
              const sc=proj.scenes?.filter(s=>s.characters?.includes(c.id)).length||0;
              return(
                <div key={c.id} style={{display:'flex',alignItems:'center',gap:10}}>

                  <div style={{flex:1}}>
                    <div style={{fontSize:12,color:T.text}}>{c.name}</div>
                    {c.role&&<div style={{fontSize:10,color:T.textDim}}>{c.role}</div>}
                  </div>
                  <Tag>{sc} sc</Tag>
                </div>
              );
            })}
          </div>
        </Card>

        {/* Props */}
        <Card>
          <SHdr title={t.criticalProps} count={critProps.length}/>
          <div style={{padding:'10px 14px',display:'flex',flexWrap:'wrap',gap:5}}>
            {critProps.length===0&&<div style={{fontSize:12,color:T.textDim}}>None marked critical</div>}
            {critProps.map(n=><Tag key={n} col={T.danger}>{n} ★</Tag>)}
          </div>
          {allProps.length>0&&<>
            <div style={{padding:'6px 14px 0',fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,letterSpacing:'0.1em'}}>{t.allProps}</div>
            <div style={{padding:'6px 14px 14px',display:'flex',flexWrap:'wrap',gap:5,maxHeight:120,overflowY:'auto'}}>
              {allProps.filter(n=>!critProps.includes(n)).slice(0,20).map(n=><Tag key={n} col={T.warn}>{n}</Tag>)}
            </div>
          </>}
        </Card>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   SCRIPT VIEW  -  proper screenplay formatting
═══════════════════════════════════════════════════════════ */
function ScriptView(){
  const {proj,navTarget,clearNavTarget}=useProj();
  const mob=useMobile(); const t=useT();
  const [search,setSearch]=useState('');
  const [selScene,setSelScene]=useState(null);
  const bodyRefs=useRef({});

  // Consume cross-view jump (e.g. Daily -> "View Script" for a scene)
  React.useEffect(()=>{
    if(navTarget && navTarget.view==='script' && navTarget.sceneId){
      const sid=navTarget.sceneId;
      setSearch('');
      setSelScene(sid);
      clearNavTarget();
      setTimeout(()=>{ if(bodyRefs.current[sid]) bodyRefs.current[sid].scrollIntoView({behavior:'smooth',block:'start'}); }, 60);
    }
  },[navTarget, clearNavTarget]);

  const hlProps=useMemo(()=>{
    const s=new Set();
    proj.scenes?.forEach(sc=>sc.props?.forEach(p=>p.name.toLowerCase().split(/\s+/).forEach(w=>{if(w.length>3)s.add(w);})));
    return s;
  },[proj]);

  const hlChars=useMemo(()=>{
    const s=new Set();
    proj.characters?.forEach(c=>{s.add(c.name.toLowerCase());c.name.split(/\s+/).forEach(w=>{if(w.length>2)s.add(w.toLowerCase());});});
    return s;
  },[proj]);

  // Render screenplay text with PDF-like spacing. Keep JSON clean; layout is handled here.
  function classifyLine(line){
    const trim=line.trim();
    if(!trim) return 'blank';
    if(/^(INT|EXT|INT\.EXT|EXT\.INT)\b/i.test(trim)) return 'sceneHeading';
    if(/^(FADE|CUT TO|DISSOLVE|SMASH CUT|MATCH CUT|HARD CUT|SOUND CUT TO|GLITCH|SWIPE CUT)/i.test(trim)) return 'transition';
    if(trim.startsWith('(')&&trim.endsWith(')')) return 'parenthetical';

    // Character cue: ALL CAPS, short, alone on the line. Allows (CONT'D), (V.O.), hyphen and apostrophe.
    const noParen=trim.replace(/\([^)]*\)/g,'').trim();
    const isChar=trim===trim.toUpperCase() && trim.length>1 && trim.length<42 && /^[A-Z]/.test(trim) && !/[.!?,;:"""]/.test(noParen);
    if(isChar) return 'character';
    return 'action';
  }

  function renderLine(line,idx,lines){
    const trim=line.trim();
    const type=classifyLine(line);
    if(type==='blank') return <div key={idx} style={{height:10}}/>;

    const prevType = idx>0 ? classifyLine(lines[idx-1]) : 'blank';
    const prevPrevType = idx>1 ? classifyLine(lines[idx-2]) : 'blank';
    const dialogueByIndent = /^\s{3,}\S/.test(line) || line.startsWith('\t');
    const isDialogue = type==='action' && (dialogueByIndent || prevType==='character' || prevType==='parenthetical' || (prevType==='blank' && (prevPrevType==='character' || prevPrevType==='parenthetical')));

    const baseFont={fontFamily:"'Courier Prime',monospace",fontSize:13.5,color:T.text,letterSpacing:'0.01em'};

    if(type==='sceneHeading'){
      return <div key={idx} style={{...baseFont,fontWeight:700,margin:'18px 0 8px',lineHeight:1.45}}>{trim}</div>;
    }
    if(type==='transition'){
      return <div key={idx} style={{...baseFont,fontSize:12.5,color:T.textDim,textAlign:'right',margin:'10px 0',letterSpacing:'0.04em'}}>{trim}</div>;
    }
    if(type==='character'){
      return <div key={idx} style={{...baseFont,color:T.text,fontWeight:700,marginTop:14,marginBottom:1,marginLeft:'41%',width:'26%',textAlign:'left'}}>{highlight(trim)}</div>;
    }
    if(type==='parenthetical'){
      return <div key={idx} style={{...baseFont,fontSize:12.5,color:T.textMute,fontStyle:'italic',marginLeft:'34%',width:'30%',lineHeight:1.35}}>{trim}</div>;
    }
    if(isDialogue){
      return <div key={idx} style={{...baseFont,lineHeight:1.45,marginLeft:'26%',width:'48%',marginBottom:1}}>{highlight(trim)}</div>;
    }
    return <div key={idx} style={{...baseFont,lineHeight:1.55,marginBottom:1,width:'100%'}}>{highlight(trim)}</div>;
  }

  function highlight(text){
    const words=text.split(/(\b\w+\b|\s+|[^\w\s]+)/);
    return words.map((w,i)=>{
      const lw=w.toLowerCase();
      if(search&&search.length>1&&lw.includes(search.toLowerCase()))
        return <span key={i} style={{background:T.accent+'44',color:T.text,borderRadius:2,padding:'0 1px'}}>{w}</span>;
      if(hlChars.has(lw)) return <span key={i} style={{color:T.info,borderBottom:`1px solid ${T.info}44`}}>{w}</span>;
      if(hlProps.has(lw)&&lw.length>3) return <span key={i} style={{color:T.warn,borderBottom:`1px solid ${T.warn}44`}}>{w}</span>;
      return w;
    });
  }

  const filteredScenes=proj.scenes?.filter(s=>!search||s.slug?.toLowerCase().includes(search.toLowerCase())||s.scriptBody?.toLowerCase().includes(search.toLowerCase()))||[];

  const [drawerOpen,setDrawerOpen]=React.useState(false);

            style={{width:'100%',background:T.surface2,border:`1px solid ${T.border}`,borderRadius:5,padding:'5px 8px',fontSize:11,color:T.text}}/>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'4px 0'}}>
          {proj.scenes?.map(s=>{

              <button key={s.id} onClick={()=>{setSelScene(s.id);bodyRefs.current[s.id]?.scrollIntoView({behavior:'smooth',block:'start'});if(mob)setDrawerOpen(false);}}

                  {s.timeOfDay} · {s.pages}p · ACT {s.act}

              </button>
            );
          })}
        </div>
      </div>

      {/* Script body */}
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {mob&&(
          <div style={{padding:'8px 12px',borderBottom:`1px solid ${T.rule}`,display:'flex',alignItems:'center',gap:8,flexShrink:0,background:T.panel}}>
            <button onClick={()=>setDrawerOpen(true)}
              style={{display:'flex',alignItems:'center',gap:5,padding:'5px 12px',
                background:T.chip,border:`1px solid ${T.border}`,borderRadius:6,
                color:T.text,fontSize:11,fontFamily:"'Geist Mono',monospace",cursor:'pointer',flexShrink:0}}>

        <div style={{maxWidth:mob?'100%':760,margin:'0 auto',padding:mob?'0 14px':'0 42px'}}>
          {filteredScenes.map((scene,si)=>{

            const prevAct=si>0?proj.scenes?.[proj.scenes.indexOf(scene)-1]?.act:null;

            const actCol=ACT_COLORS[(scene.act||1)-1];

                  <div style={{flex:1,fontFamily:"'Courier Prime',monospace",fontSize:13,fontWeight:700,color:T.text,letterSpacing:'0.02em'}}>{scene.slug}</div>
                  <Mono s={{color:T.textDim,fontSize:10}}>{scene.pages}p</Mono>
                </div>
                {/* Body lines */}
                <div style={{paddingLeft:0}}>
                  {lines.slice(1).map((line,li)=>renderLine(line,li,lines.slice(1)))}
                </div>
                {/* Footer tags */}
                <div style={{marginTop:10,paddingTop:8,borderTop:`1px solid ${T.rule}`,display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>

                  {(scene.equipment||[]).map(eq=><Tag key={eq} col={T.info}>{eq}</Tag>)}
                </div>
              </div>
            );
          })}
        </div>
        </div>
      </div>
    </div>
  );
}

function ImportModal({onClose,onImport,lang}){
  const t=LANGS[lang]||LANGS.en;
  const [text,setText]=useState('');
  const [err,setErr]=useState('');
  const fileRef=useRef();

  const SAMPLE=`{

  "characters":[{"id":"c_alex","name":"ALEX","role":"Protagonist","description":"30s, determined","color":"#d49a5c"}],
  "locations":[{"id":"l_apt","name":"ALEX'S APARTMENT","type":"INT","address":"Downtown","color":"#7ab6c4","sceneCount":4,"estimatedDays":2}],
  "scenes":[{
    "id":"S01","sceneNo":1,"act":1,"slug":"INT. ALEX'S APARTMENT  -  DAY",
    "locationId":"l_apt","timeOfDay":"DAY","pages":2.5,"shootDay":1,
    "characters":["c_alex"],"synopsis":"Alex discovers the letter.",
    "scriptBody":"INT. ALEX'S APARTMENT  -  DAY\\n\\nSunlight streams through dirty blinds. ALEX, 30s, sits at a cluttered desk, opening mail.\\n\\nALEX\\nWhat the...\\n\\nA letter drops from the envelope. Alex picks it up slowly.",
    "props":[{"name":"letter","critical":true},{"name":"desk lamp","critical":false}],
    "wardrobe":[{"characterId":"c_alex","description":"White t-shirt, jeans, barefoot"}],
    "makeup":[{"characterId":"c_alex","description":"Natural, slight stubble"}],
    "equipment":[],"notes":"Key reveal scene. Light from window.",
    "shots":[
      {"id":"sh1","shotNo":"1A","size":"WIDE","move":"Static","lens":"24mm","duration":"0:08","description":"Establish apartment. Alex at desk.","dialogue":""},
      {"id":"sh2","shotNo":"1B","size":"CLOSE","move":"Rack focus","lens":"85mm","duration":"0:06","description":"Letter in focus, Alex's hands tremble.","dialogue":"ALEX: What the..."}
    ]

  "continuityAlerts":[],
  "shootDays":[{"day":1,"scenes":["S01"],"locations":["l_apt"],"characters":["c_alex"],"estimatedPages":2.5}]
}`;

  const tryImport=(raw)=>{
    try{
      const parsed=JSON.parse(raw.trim());
      if(!parsed.scenes||!Array.isArray(parsed.scenes)){
        const ALIASES=['scenesPartOne','scenesPartTwo','scenesPartThree','scenesPartFour','scenes_1','scenes_2','scenes_3','scenes_4','scenesBatch1','scenesBatch2','scenesBatch3','scenesBatch4','act1Scenes','act2Scenes','act3Scenes'];
        for(const k of ALIASES){if(Array.isArray(parsed[k])&&parsed[k].length>0){parsed.scenes=parsed[k];delete parsed[k];break;}}
        if(!parsed.scenes){
          for(const [k,v] of Object.entries(parsed)){
            if(['project','characters','locations','shootDays','continuityAlerts'].includes(k))continue;
            if(Array.isArray(v)&&v.length>0&&(v[0].id||v[0].sceneNo||v[0].slug)){parsed.scenes=v;delete parsed[k];break;}
          }
          // Also handle single-scene objects: {"sceneSupplement_S73":{id,slug,...}}
          if(!parsed.scenes){
            const objs=[];
            for(const [k,v] of Object.entries(parsed)){
              if(['project','characters','locations','shootDays','continuityAlerts'].includes(k))continue;
              if(v&&typeof v==='object'&&!Array.isArray(v)&&(v.id||v.sceneNo||v.slug)){objs.push(v);delete parsed[k];}
            }
            if(objs.length>0)parsed.scenes=objs;
          }
        }
      }
      if(!parsed.scenes||!Array.isArray(parsed.scenes)||parsed.scenes.length===0){
        // Allow project-only import (characters + locations without scenes)
        if(parsed.project&&(parsed.characters||parsed.locations)){
          parsed.scenes=[];
        } else {
          throw new Error('No scenes found. Keys: '+Object.keys(parsed).join(', '));
        }
      }
      if(!parsed.project)parsed.project={title:parsed.title||'Untitled',logline:'',format:'Feature'};
      onImport(parsed);
    }catch(e){setErr('Invalid JSON: '+e.message);}

Output ONLY valid JSON, no other text, no markdown fences.

Required schema:

      "description": "age, key physical traits", "color": "#hexcolor" }
  ],
  "locations": [

  ],
  "scenes": [
    {
      "id": "S01", "sceneNo": 1, "act": 1,
      "slug": "INT. LOCATION  -  TIME",

      "pages": 2.5,
      "shootDay": 1,
      "characters": ["c_name"],
      "synopsis": "one sentence what happens",
      "scriptBody": "FULL SCENE TEXT verbatim from screenplay  -  include all action lines, character names, dialogue",
      "notes": "director/production note",
      "equipment": ["Dolly","Drone","Crane","Steadicam","Handheld"],
      "props": [
        { "name": "prop name", "critical": true }
      ],
      "wardrobe": [
        { "characterId": "c_name", "description": "full wardrobe description" }
      ],
      "makeup": [
        { "characterId": "c_name", "description": "hair and makeup state" }
      ],
      "shots": [
        { "id": "sh_S01_1", "shotNo": "1A",
          "size": "WIDE/MEDIUM/CLOSE/INSERT/TWO-SHOT/OTS/POV/AERIAL",
          "move": "Static/Dolly in/Dolly out/Pan L/Pan R/Tilt up/Tilt down/Handheld/Crane up/Steadicam/Rack focus",
          "lens": "24mm", "duration": "0:08",
          "description": "shot description",
          "dialogue": "CHARACTER: key line if any",
          "equipment": [] }
      ]
    }
  ],
  "continuityAlerts": [
    { "severity": "high/med/low", "type": "wardrobe/prop/makeup",
      "characters": ["c_name"], "scenes": ["S01","S07"], "note": "description" }
  ],
  "shootDays": [
    { "day": 1, "scenes": ["S01","S03"], "locations": ["l_name"],
      "characters": ["c_name"], "estimatedPages": 4.5 }
  ]
}

IMPORTANT RULES:
- scriptBody: copy the FULL verbatim text. Format MUST be:
- Action lines: no indent (e.g. "Harry walks to the window.")
- Character names: ALL CAPS no indent alone on line (e.g. "HARRY")
- Dialogue: 4-space indent (e.g. "    You never told me the truth.")
- Parentheticals: no indent in parentheses (e.g. "(quietly)")
- Transitions: no indent all caps (e.g. "CUT TO:")
- props: list EVERY physical object mentioned  -  aim for 8-15+ per scene
- wardrobe: record EVERY character in EVERY scene they appear, even if outfit unchanged
- shots: generate a professional shot list, 3-6 shots per scene minimum
- shootDay: group scenes by location to minimise company moves
- For a feature film, recommendedShootDays = total pages / 4 (roughly)

Output ONLY the JSON.`;

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.82)',display:'grid',placeItems:'center',zIndex:1000,backdropFilter:'blur(4px)'}}>
      <div style={{background:T.panel,border:`1px solid ${T.borderHi}`,borderRadius:14,padding:30,width:'min(660px,92vw)',position:'relative',animation:'fadeIn 0.18s ease',maxHeight:'92vh',overflowY:'auto'}}>

          style={{width:'100%',height:200,background:T.surface2,border:`1px solid ${T.border}`,borderRadius:8,padding:'12px 14px',fontSize:11,color:T.text,resize:'vertical',fontFamily:"'Geist Mono',monospace",lineHeight:1.5}}/>

          <div style={{marginTop:10,background:T.surface2,border:`1px solid ${T.border}`,borderRadius:8,padding:'12px 14px',fontSize:10,color:T.textMute,fontFamily:"'Geist Mono',monospace",lineHeight:1.6,whiteSpace:'pre-wrap',maxHeight:300,overflowY:'auto'}}>{CLAUDE_PROMPT}</div>

        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:20}}>

  );
}

function MergeModal({proj,onClose,onMerge}){
  const [text,setText]=useState('');
  const [err,setErr]=useState('');
  const [preview,setPreview]=useState(null);
  const [replaceMode,setReplaceMode]=useState(false);
  const fileRef=useRef();
  const check=(raw)=>{
    try{
      const p=JSON.parse(raw.trim());
      if(!p.scenes||!Array.isArray(p.scenes)){
        // Array format: {"scenesPartOne": [...]}
        for(const [k,v] of Object.entries(p)){
          if(['project','characters','locations','shootDays','continuityAlerts'].includes(k))continue;
          if(Array.isArray(v)&&v.length>0&&(v[0].id||v[0].sceneNo||v[0].slug)){p.scenes=v;delete p[k];break;}
        }
        // Single-scene object format: {"sceneSupplement_S73": {id, slug, ...}}
        if(!p.scenes){
          const objs=[];
          for(const [k,v] of Object.entries(p)){
            if(['project','characters','locations','shootDays','continuityAlerts'].includes(k))continue;
            if(v&&typeof v==='object'&&!Array.isArray(v)&&(v.id||v.sceneNo||v.slug)){objs.push(v);}
          }
          if(objs.length>0)p.scenes=objs;
        }
      }
      const existing=proj.scenes||[];
      const allIn=p.scenes||[];
      const fresh=allIn.filter(s=>!existing.find(x=>x.id===s.id));
      const dupes=allIn.filter(s=>existing.find(x=>x.id===s.id));
      const newAlerts=(p.continuityAlerts||[]).length;
      const newDays=(p.shootDays||[]).length;
      if(allIn.length===0&&newAlerts===0&&newDays===0){setErr('No content found in JSON.');setPreview(null);return null;}
      setPreview({count:fresh.length,dupes:dupes.length,chars:(p.characters||[]).length,locs:(p.locations||[]).length,alerts:newAlerts,days:newDays});
      setErr('');return p;
    }catch(e){setErr('Invalid JSON: '+e.message);setPreview(null);return null;}
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',display:'grid',placeItems:'center',zIndex:1000}}>
      <div style={{background:T.panel,border:`1px solid ${T.borderHi}`,borderRadius:12,padding:28,width:'min(540px,92vw)',position:'relative'}}>
        <button onClick={onClose} style={{position:'absolute',top:12,right:16,color:T.textMute,fontSize:20}}>x</button>
        <div style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:22,marginBottom:8}}>Merge JSON Chunk</div>
        <div style={{fontSize:12,color:T.textDim,marginBottom:14}}>Adding to <strong style={{color:T.accent}}>{proj.project?.title}</strong> ({proj.scenes?.length} scenes imported)</div>
        <div style={{display:'flex',gap:8,marginBottom:10}}>
          <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{setText(ev.target.result);check(ev.target.result);};r.readAsText(f);}}/>
          <button onClick={()=>fileRef.current.click()} style={{padding:'5px 12px',border:`1px solid ${T.border}`,borderRadius:5,color:T.textMute,fontSize:12}}>Upload .json</button>
          <span style={{fontSize:12,color:T.textDim,alignSelf:'center'}}>or paste below</span>
        </div>
        <textarea value={text} onChange={e=>{setText(e.target.value);if(e.target.value.trim())check(e.target.value);}} placeholder="Paste next batch JSON..."
          style={{width:'100%',height:130,background:T.surface2,border:`1px solid ${preview?T.success:err?T.danger:T.border}`,borderRadius:6,padding:'10px 12px',fontSize:11,color:T.text,resize:'vertical',fontFamily:"'Geist Mono',monospace"}}/>
        {preview&&(
          <div style={{marginTop:8,padding:'10px 14px',background:T.success+'12',border:'1px solid '+T.success+'30',borderRadius:8}}>
            <div style={{fontSize:12,color:T.success,marginBottom:preview.dupes>0?8:0}}>
              {preview.count>0&&<span>+{preview.count} new scenes </span>}
              {preview.alerts>0&&<span>+{preview.alerts} alerts </span>}
              {preview.days>0&&<span>+{preview.days} shoot days </span>}
              <span style={{color:T.textDim,fontSize:11}}>total: {(proj.scenes?.length||0)+preview.count+(replaceMode?preview.dupes:0)} scenes</span>
            </div>
            {preview.dupes>0&&(
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingTop:8,borderTop:'1px solid '+T.rule}}>
                <span style={{fontSize:12,color:replaceMode?T.warn:T.textDim}}>{preview.dupes} scenes already exist</span>
                <button onClick={function(){setReplaceMode(function(r){return !r;});}}
                  style={{padding:'4px 12px',borderRadius:5,fontSize:11,fontWeight:500,cursor:'pointer',
                    background:replaceMode?T.warn+'22':'transparent',
                    border:'1px solid '+(replaceMode?T.warn:T.border),
                    color:replaceMode?T.warn:T.textDim}}>
                  {replaceMode?'⚠ Replace ON':'Replace OFF'}
                </button>
              </div>
            )}
          </div>
        )}
        {err&&<div style={{marginTop:8,padding:'8px 12px',background:T.danger+'12',borderRadius:6,fontSize:12,color:T.danger}}>{err}</div>}
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
          <button onClick={onClose} style={{padding:'7px 18px',border:`1px solid ${T.border}`,borderRadius:5,color:T.textMute,fontSize:13}}>Cancel</button>
          <button onClick={()=>{const p=check(text);if(p)onMerge(p);}} disabled={!preview||(preview.count===0&&(!preview.dupes||!replaceMode)&&!preview.alerts&&!preview.days)}
            style={{padding:'7px 20px',background:preview&&preview.count>0?T.accent:'#555',borderRadius:5,color:preview&&preview.count>0?'#0e0d0b':T.textDim,fontSize:13,fontWeight:500}}>
            {preview&&(preview.count>0||preview.alerts>0||preview.days>0)?'Merge':'Paste JSON first'}
          </button>
        </div>
      </div>
    </div>
  );
}

function DrivePanel({ onImport, onClose, lang }) {
  const t = LANGS[lang] || LANGS.en;
  const [status, setStatus] = React.useState('idle'); // idle | signing | loading | ready | saving | error
  const [user, setUser] = React.useState(getDriveUser);
  const [files, setFiles] = React.useState([]);
  const [msg, setMsg] = React.useState('');
  const [selFiles, setSelFiles] = React.useState(new Set());
  const [merging, setMerging] = React.useState(false);

  React.useEffect(() => {
    if(getDriveToken()) loadFiles();
    else if(getDriveUser()) setUser(getDriveUser());
  }, []);

  async function signIn() {
    setStatus('signing'); setMsg('');
    try {
      const { user } = await driveSignIn();
      setUser(user);
      await loadFiles();
    } catch(e) {
      setStatus('error'); setMsg('Sign-in failed: ' + e.message);
    }
  }

  async function loadFiles() {
    setStatus('loading'); setMsg('');
    try {
      const list = await listDriveFiles();
      setFiles(list);
      setStatus('ready');
    } catch(e) {
      setStatus('error'); setMsg('Failed to list files: ' + e.message);
    }
  }

  function signOut() {
    driveSignOut();
    setUser(null); setFiles([]); setStatus('idle');
  }

  async function importSelected() {
    if(selFiles.size === 0) return;
    setMerging(true); setMsg('');
    try {
      const fileIds = Array.from(selFiles);
      let merged = null;
      for(const fid of fileIds) {
        const data = await readDriveFile(fid);
        if(!merged) {
          // normalise first file
          merged = data;
        } else {
          // merge subsequent files
          merged = mergeProjectChunk(merged, data, false);
        }
      }
      if(merged) {
        onImport(merged);
        onClose();
      }
    } catch(e) {
      setMsg('Import failed: ' + e.message);
    }
    setMerging(false);
  }

  function toggleSel(id) {
    setSelFiles(prev => {
      const n = new Set(prev);
      n.has(id) ? n.delete(id) : n.add(id);
      return n;
    });
  }

  function fmtSize(bytes) {
    if(!bytes) return '';
    const kb = parseInt(bytes) / 1024;
    return kb < 1024 ? kb.toFixed(0) + ' KB' : (kb/1024).toFixed(1) + ' MB';
  }

  function fmtDate(iso) {
    if(!iso) return '';
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',zIndex:8000,display:'grid',placeItems:'center'}}

              <path d="M43.65 25L29.9 1.2C28.55 2 27.4 3.1 26.6 4.5L1.2 48.55A9 9 0 000 53.05h27.5z" fill="#00ac47"/>
              <path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5H59.8l5.85 11.2z" fill="#ea4335"/>

              <path d="M59.8 53.05H27.5L13.75 76.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.1-.45 4.5-1.2z" fill="#2684fc"/>
              <path d="M73.4 26.5l-12.65-21.8C59.95 3.3 58.8 2.2 57.4 1.4L43.65 25l16.15 28.05H87.3c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/>
            </svg>

          <div style={{flex:1}}>

/* Drive Save Button for Shell header */
function DriveSaveBtn({ proj }) {
  const [status, setStatus] = React.useState('idle'); // idle | saving | saved | error
  const [fileId, setFileId] = React.useState(proj._driveFileId || null);

  async function saveToGDrive() {
    if(!getDriveToken()) {
      try { await driveSignIn(); } catch(e) { setStatus('error'); return; }
    }
    setStatus('saving');
    try {
      const filename = (proj.project?.title || 'project').replace(/\s+/g,'_') + '_breakdown.json';
      const result = await saveDriveFile(fileId, filename, proj);
      const newId = result.id || fileId;
      setFileId(newId);
      // store fileId in proj
      const all = loadAll();
      const i = all.findIndex(p => p._id === proj._id);
      if(i >= 0) { all[i]._driveFileId = newId; saveAll(all); }
      setStatus('saved');
      setTimeout(() => setStatus('idle'), 2500);
    } catch(e) {
      setStatus('error');
      setTimeout(() => setStatus('idle'), 3000);
    }
  }

  const label = status === 'saving' ? 'Saving...' : status === 'saved' ? 'Saved to Drive!' : status === 'error' ? 'Save failed' : '☁ Save to Drive';
  const bg = status === 'saved' ? T.success : status === 'error' ? T.danger : T.info;

  return (
    <button onClick={saveToGDrive} disabled={status === 'saving'}
      style={{padding:'5px 12px',background:bg+'22',border:`1px solid ${bg}55`,borderRadius:5,
        color:bg,fontSize:11,fontFamily:"'Geist Mono',monospace",cursor:'pointer',
        opacity:status==='saving'?0.7:1,transition:'all 0.2s',whiteSpace:'nowrap'}}>
      {label}
    </button>
  );
}
