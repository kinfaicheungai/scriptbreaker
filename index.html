function ShotListSubTab({focusScene}){
  const {proj,updateProj}=useProj();
  const mob=useMobile(); const t=useT();

  const [filterLoc,setFilterLoc]=useState('all');
  const [filterAct,setFilterAct]=useState('all');
  const scenes=useMemo(()=>{
    let s=proj.scenes||[];
    if(filterLoc!=='all') s=s.filter(sc=>sc.locationId===filterLoc);
    if(filterAct!=='all') s=s.filter(sc=>String(sc.act)===filterAct);
    return s;
  },[proj,filterLoc,filterAct]);

  const addShot=(sceneId)=>{
    updateProj(p=>{
      const sc=p.scenes?.find(s=>s.id===sceneId);
      const shots=sc?.shots||[];
      const base=sceneId.replace(/\D/g,'');
      const newShot={id:'sh_'+Date.now(),shotNo:base+String.fromCharCode(65+shots.length),size:'MEDIUM',move:'Static',lens:'',duration:'',description:'',dialogue:'',equipment:[],refImageUrl:'',refVideoUrl:''};
      return{...p,scenes:p.scenes?.map(s=>s.id===sceneId?{...s,shots:[...(s.shots||[]),newShot]}:s)};
    });
  };
  const updateShot=(sceneId,shotId,ch)=>{updateProj(p=>({...p,scenes:p.scenes?.map(s=>s.id===sceneId?{...s,shots:(s.shots||[]).map(sh=>sh.id===shotId?{...sh,...ch}:sh)}:s)}));};
  const delShot=(sceneId,shotId)=>{updateProj(p=>({...p,scenes:p.scenes?.map(s=>s.id===sceneId?{...s,shots:(s.shots||[]).filter(sh=>sh.id!==shotId)}:s)}));};
  const onPaste=(sceneId,shotId,e)=>{const item=[...e.clipboardData.items].find(i=>i.type.startsWith('image/'));if(!item)return;readAndResize(item.getAsFile()).then(url=>updateShot(sceneId,shotId,{refImageUrl:url})).catch(()=>{});};
  const onDrop=(sceneId,shotId,e)=>{e.preventDefault();const f=e.dataTransfer.files[0];if(!f||!f.type.startsWith('image/'))return;readAndResize(f).then(url=>updateShot(sceneId,shotId,{refImageUrl:url})).catch(()=>{});};

  const sceneRefs=useRef({});
  const contentRef=React.useRef();
  const jumpTo=(id)=>{
    const container=contentRef.current;
    const el=document.getElementById('scene-'+id);
    if(el&&container){
      const top=el.offsetTop-container.offsetTop-20;
      container.scrollTo({top:top,behavior:'smooth'});
    } else if(el){
      el.scrollIntoView({behavior:'smooth',block:'start'});
    }
  };

  // When arriving from another view with a focus scene, clear filters so it's
  // visible, then scroll to it
  React.useEffect(()=>{
    if(focusScene){
      setFilterLoc('all'); setFilterAct('all');
      const timer=setTimeout(()=>jumpTo(focusScene), 150);
      return ()=>clearTimeout(timer);
    }
  },[focusScene]);

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <NavBackBadge/>
      <div style={{padding:'6px 20px',borderBottom:`1px solid ${T.rule}`,display:'flex',gap:8,alignItems:'center',flexShrink:0,justifyContent:'space-between'}}>
        <div style={{display:'flex',gap:8,alignItems:'center',overflowX:'auto',flex:1}}>
        {[{id:'all',name:'All'},...(proj.locations||[])].map(l=>(
          <button key={l.id} onClick={()=>setFilterLoc(l.id)} style={{padding:'3px 10px',borderRadius:4,fontSize:10,fontFamily:"'Geist Mono',monospace",background:filterLoc===l.id?T.accent+'22':T.chip,color:filterLoc===l.id?T.accent:T.textMute,border:`1px solid ${filterLoc===l.id?T.accent+'44':T.border}`,whiteSpace:'nowrap'}}>
            {(l.name||'All').toUpperCase()}
          </button>
        ))}
        <div style={{width:1,height:14,background:T.border}}/>
        {['all','1','2','3'].map(a=>(
          <button key={a} onClick={()=>setFilterAct(a)} style={{padding:'3px 10px',borderRadius:4,fontSize:10,fontFamily:"'Geist Mono',monospace",background:filterAct===a?T.purple+'22':T.chip,color:filterAct===a?T.purple:T.textMute,border:`1px solid ${filterAct===a?T.purple+'44':T.border}`}}>
            {a==='all'?'ALL':'ACT '+a}
          </button>
        ))}
        </div>
      </div>
      <div style={{padding:'4px 20px 8px',borderBottom:`1px solid ${T.rule}`,display:'flex',alignItems:'center',justifyContent:'flex-end',flexShrink:0}}>
        <select onChange={e=>{if(e.target.value)jumpTo(e.target.value);}} defaultValue=""
          style={{background:T.chip,border:`1px solid ${T.accent}44`,borderRadius:5,padding:'5px 12px',fontSize:11,color:T.accent,fontFamily:"'Geist Mono',monospace",cursor:'pointer',fontWeight:500}}>
          <option value="">↓ Jump to scene...</option>
          {(proj.scenes||[]).filter(s=>filterLoc==='all'||s.locationId===filterLoc).map(s=>(
            <option key={s.id} value={s.id}>{s.id}  -  {s.slug?s.slug.slice(0,35):''}</option>
          ))}
        </select>
      </div>
      <div ref={contentRef} style={{flex:1,overflow:'auto',padding:'12px 20px'}}>
        {scenes.map((scene,si)=>{
          const loc=findLoc(proj,scene.locationId);
          const shots=scene.shots||[];
          const actCol=ACT_COLORS[(scene.act||1)-1];
          const prevScene=scenes[si-1];
          const showDivider=!prevScene||prevScene.act!==scene.act;
          return(
            <div key={scene.id} id={`scene-${scene.id}`}>
              {showDivider&&<div style={{display:'flex',alignItems:'center',gap:10,margin:'10px 0 8px',paddingTop:si>0?10:0,borderTop:si>0?`1px solid ${actCol}33`:'none'}}><Mono s={{color:actCol,letterSpacing:'0.14em'}}>ACT {scene.act}</Mono><div style={{flex:1,height:1,background:actCol+'22'}}/></div>}
              <div style={{marginBottom:10,border:`${focusScene===scene.id?2:1}px solid ${focusScene===scene.id?T.accent:T.border}`,borderRadius:10,overflow:'hidden',boxShadow:focusScene===scene.id?`0 0 0 3px ${T.accent}22`:'none'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 14px',background:T.panel,borderLeft:`3px solid ${loc?.color||actCol}`}}>
                  <Mono s={{color:T.textDim,background:T.chip,padding:'1px 6px',borderRadius:3,fontSize:10}}>{scene.id}</Mono>
                  <div style={{flex:1,fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textMute,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{scene.slug}</div>
                  <Tag col={T.textDim}>{scene.timeOfDay}</Tag>
                  <Tag>{shots.length} shots</Tag>
                  <Mono s={{color:T.textDim}}>{scene.pages}p</Mono>
                </div>
                <div style={{background:T.surface2,padding:'10px 12px'}}>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:10}}>
                    {shots.map(sh=>(
                      <ShotCard key={sh.id} shot={sh} sceneId={scene.id} onUpdate={ch=>updateShot(scene.id,sh.id,ch)} onDelete={()=>delShot(scene.id,sh.id)} onPaste={e=>onPaste(scene.id,sh.id,e)} onDrop={e=>onDrop(scene.id,sh.id,e)}/>
                    ))}
                    <button onClick={()=>addShot(scene.id)} style={{minHeight:150,border:`2px dashed ${T.border}`,borderRadius:8,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,color:T.textDim,fontSize:12,transition:'all 0.15s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=T.accent;e.currentTarget.style.color=T.accent}} onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.textDim}}>
                      <span style={{fontSize:22}}>+</span><span>Add Shot</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
        {scenes.length===0&&<Empty icon="▣" title="No scenes" sub="Adjust filter or import a JSON breakdown"/>}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   MAKEUP / HAIR profile per character. Text entries (area +
   description) live in proj._bd.makeupProfile[charId] so they
   Export. Reference images live in IndexedDB (sb_makeup) and
   are loaded on demand. Used editable in Breakdown > Characters
   and read-only as a baseline reference in Continuity > Cards.
═══════════════════════════════════════════════════════════ */
function MakeupSection(props){
  const charId = props.charId;
  const projId = props.projId;
  const readOnly = !!props.readOnly;
  const ctx = useProj();
  const proj = ctx.proj;
  const updateProj = ctx.updateProj;
  const entries = (proj._bd && proj._bd.makeupProfile && proj._bd.makeupProfile[charId]) || [];
  const imgMapState = React.useState({});
  const imgMap = imgMapState[0];
  const setImgMap = imgMapState[1];
  const fileRefs = React.useRef({});
  const camRefs = React.useRef({});

  React.useEffect(function(){
    let alive = true;
    if(!projId || !charId){ setImgMap({}); return; }
    makeupGetForChar(projId, charId).then(function(rows){
      if(!alive) return;
      const m = {};
      rows.forEach(function(r){ m[r.imgId] = r.dataUrl; });
      setImgMap(m);
    }).catch(function(){});
    return function(){ alive = false; };
  }, [projId, charId, entries.length]);

  function mutate(fn){
    updateProj(function(p){
      const bd = Object.assign({}, p._bd || {});
      const mp = Object.assign({}, bd.makeupProfile || {});
      const cur = (mp[charId] || []).slice();
      mp[charId] = fn(cur);
      bd.makeupProfile = mp;
      return Object.assign({}, p, {_bd: bd});
    });
  }
  function addEntry(){
    const id = 'mk' + Date.now() + Math.floor(Math.random()*1000);
    mutate(function(cur){ return cur.concat([{id:id, area:'', desc:'', imgs:[]}]); });
  }
  function setField(id, field, val){
    mutate(function(cur){ return cur.map(function(e){
      if(e.id!==id) return e;
      const o = Object.assign({}, e); o[field] = val; return o;
    }); });
  }
  function removeEntry(id){
    if(!confirm('Remove this makeup item?')) return;
    const ent = entries.find(function(e){ return e.id===id; });
    if(ent){ (ent.imgs||[]).forEach(function(iid){ makeupDeleteImage(projId, iid); }); }
    mutate(function(cur){ return cur.filter(function(e){ return e.id!==id; }); });
  }
  function addImage(entryId, file){
    if(!file || !file.type || file.type.indexOf('image/')!==0) return;
    readAndResize(file).then(function(dataUrl){
      const imgId = 'im' + Date.now() + Math.floor(Math.random()*1000);
      makeupPutImage(projId, {imgId:imgId, charId:charId, dataUrl:dataUrl}).then(function(){
        setImgMap(function(prev){ const n = Object.assign({}, prev); n[imgId] = dataUrl; return n; });
        mutate(function(cur){ return cur.map(function(e){
          return e.id===entryId ? Object.assign({}, e, {imgs:(e.imgs||[]).concat([imgId])}) : e;
        }); });
      });
    }).catch(function(err){ console.warn('MakeupSection resize error', err); });
  }
  function removeImage(entryId, imgId){
    makeupDeleteImage(projId, imgId);
    setImgMap(function(prev){ const n = Object.assign({}, prev); delete n[imgId]; return n; });
    mutate(function(cur){ return cur.map(function(e){
      return e.id===entryId ? Object.assign({}, e, {imgs:(e.imgs||[]).filter(function(x){ return x!==imgId; })}) : e;
    }); });
  }

  if(readOnly && entries.length===0){
    return React.createElement('div', {style:{fontSize:11, color:T.textDim, fontStyle:'italic'}}, 'No makeup profile yet.');
  }

  return (
    <div style={{display:'flex', flexDirection:'column', gap:10}}>
      {entries.map(function(e){
        const imgs = (e.imgs || []);
        return (
          <div key={e.id} style={{background:T.chip, border:'1px solid '+T.border, borderRadius:8, padding:'10px 12px'}}>
            {readOnly ? (
              <div style={{marginBottom: imgs.length? 8 : 0}}>
                {e.area ? <span style={{fontSize:12, color:T.text, fontWeight:600}}>{e.area}</span> : null}
                {e.area && e.desc ? <span style={{color:T.textDim}}> - </span> : null}
                {e.desc ? <span style={{fontSize:12, color:T.textMute}}>{e.desc}</span> : null}
                {!e.area && !e.desc ? <span style={{fontSize:12, color:T.textDim, fontStyle:'italic'}}>(no description)</span> : null}
              </div>
            ) : (
              <div style={{display:'flex', gap:8, alignItems:'flex-start', marginBottom:8}}>
                <div style={{flex:1, display:'flex', flexDirection:'column', gap:6}}>
                  <input value={e.area} onChange={function(ev){ setField(e.id, 'area', ev.target.value); }}
                    placeholder="Area / item  (e.g. Left forearm scar, Hair)"
                    style={{width:'100%', background:T.surface2, border:'1px solid '+T.border, borderRadius:5, padding:'6px 9px', fontSize:12, color:T.text}}/>
                  <textarea value={e.desc} onChange={function(ev){ setField(e.id, 'desc', ev.target.value); }}
                    placeholder="Description  (e.g. 3cm jagged scar, partly healed; hair slicked back)"
                    rows={2}
                    style={{width:'100%', background:T.surface2, border:'1px solid '+T.border, borderRadius:5, padding:'6px 9px', fontSize:12, color:T.text, resize:'vertical', fontFamily:'inherit', lineHeight:1.4}}/>
                </div>
                <button onClick={function(){ removeEntry(e.id); }} title="Remove item"
                  style={{color:T.textDim, fontSize:14, lineHeight:1, padding:'2px 6px', background:'transparent', border:'1px solid '+T.border, borderRadius:5, cursor:'pointer', flexShrink:0}}
                  onMouseEnter={function(ev){ ev.currentTarget.style.color=T.danger; }}
                  onMouseLeave={function(ev){ ev.currentTarget.style.color=T.textDim; }}>x</button>
              </div>
            )}
            <div style={{display:'flex', gap:8, flexWrap:'wrap', alignItems:'center'}}>
              {imgs.map(function(iid){
                const url = imgMap[iid];
                return (
                  <div key={iid} style={{width:72, height:54, borderRadius:6, overflow:'hidden', position:'relative', border:'1px solid '+T.border, background:T.surface2}}>
                    {url ? <img src={url} style={{width:'100%', height:'100%', objectFit:'cover'}}/> : <div style={{width:'100%', height:'100%', display:'grid', placeItems:'center', fontSize:9, color:T.textDim}}>...</div>}
                    {!readOnly && <button onClick={function(){ removeImage(e.id, iid); }}
                      style={{position:'absolute', top:2, right:2, background:'rgba(0,0,0,0.7)', borderRadius:99, width:16, height:16, color:'white', fontSize:10, display:'grid', placeItems:'center', border:'none', cursor:'pointer'}}>x</button>}
                  </div>
                );
              })}
              {!readOnly && (
                <>
                  <div
                    onPaste={function(ev){ const it=[...ev.clipboardData.items].find(function(i){ return i.type.indexOf('image/')===0; }); if(it){ addImage(e.id, it.getAsFile()); } }}
                    onDragOver={function(ev){ ev.preventDefault(); }}
                    onDrop={function(ev){ ev.preventDefault(); const f=ev.dataTransfer.files[0]; if(f){ addImage(e.id, f); } }}
                    onClick={function(){ if(fileRefs.current[e.id]) fileRefs.current[e.id].click(); }}
                    style={{width:72, height:54, borderRadius:6, border:'2px dashed '+T.border, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', cursor:'pointer', gap:2}}>
                    <input ref={function(el){ fileRefs.current[e.id]=el; }} type="file" accept="image/*" style={{display:'none'}}
                      onChange={function(ev){ const f=ev.target.files[0]; if(f){ addImage(e.id, f); } ev.target.value=''; }}/>
                    <span style={{fontSize:16, opacity:0.5}}>+</span>
                    <span style={{fontSize:8, fontFamily:"'Geist Mono',monospace", color:T.textDim}}>REF</span>
                  </div>
                  <button onClick={function(){ if(camRefs.current[e.id]) camRefs.current[e.id].click(); }}
                    title="Take a photo"
                    style={{width:72, height:54, borderRadius:6, border:'2px dashed '+T.accent+'66', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', cursor:'pointer', gap:2, background:T.accent+'10'}}>
                    <input ref={function(el){ camRefs.current[e.id]=el; }} type="file" accept="image/*" capture="environment" style={{display:'none'}}
                      onChange={function(ev){ const f=ev.target.files[0]; if(f){ addImage(e.id, f); } ev.target.value=''; }}/>
                    <span style={{fontSize:15}}>{'\uD83D\uDCF7'}</span>
                    <span style={{fontSize:8, fontFamily:"'Geist Mono',monospace", color:T.accent}}>PHOTO</span>
                  </button>
                </>
              )}
            </div>
          </div>
        );
      })}
      {!readOnly && (
        <button onClick={addEntry}
          style={{alignSelf:'flex-start', padding:'6px 12px', borderRadius:6, border:'1px dashed '+T.border, color:T.textMute, fontSize:12, fontFamily:"'Geist Mono',monospace", cursor:'pointer', background:'transparent'}}
          onMouseEnter={function(ev){ ev.currentTarget.style.color=T.text; ev.currentTarget.style.borderColor=T.accent; }}
          onMouseLeave={function(ev){ ev.currentTarget.style.color=T.textMute; ev.currentTarget.style.borderColor=T.border; }}>
          + Add makeup item
        </button>
      )}
    </div>
  );
}

function BDView(){
  const {proj,updateProj,navTarget,clearNavTarget}=useProj();
  const mob=useMobile();
  const t=useT();
  function RefImage(riProps) {
    var images = riProps.images || [];
    var onAdd = riProps.onAdd;
    var inputRef = React.useRef();
    var camRef = React.useRef();
    function handleFile(f) {
      if(!f||!f.type.startsWith('image/'))return;
      readAndResize(f).then(function(url){ onAdd(url); }).catch(function(err){ console.warn('RefImage resize error',err); });
    }
    function addFile(e) { handleFile(e.target.files[0]); e.target.value=''; }
    function addPaste(e) { var item=[...e.clipboardData.items].find(function(i){return i.type.startsWith('image/');}); if(!item)return; handleFile(item.getAsFile()); }
    function addDrop(e) { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }
    return (
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        {images.map(function(img,i){ return (
          <div key={i} style={{width:80,height:60,borderRadius:6,overflow:'hidden',position:'relative',border:'1px solid '+T.border}}>
            <img src={img} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
            <button onClick={function(){onAdd(null,i);}} style={{position:'absolute',top:2,right:2,background:'rgba(0,0,0,0.7)',borderRadius:99,width:16,height:16,color:'white',fontSize:10,display:'grid',placeItems:'center',border:'none',cursor:'pointer'}}>x</button>
          </div>
        );})}
        <div onPaste={addPaste} onDragOver={function(e){e.preventDefault();}} onDrop={addDrop}
          onClick={function(){inputRef.current.click();}}
          style={{width:80,height:60,borderRadius:6,border:'2px dashed '+T.border,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',gap:3}}>
          <input ref={inputRef} type="file" accept="image/*" style={{display:'none'}} onChange={addFile}/>
          <span style={{fontSize:18,opacity:0.5}}>+</span>
          <span style={{fontSize:10,fontFamily:"'Geist Mono',monospace",color:T.textDim}}>REF</span>
        </div>
        <button onClick={function(){camRef.current.click();}} title="Take a photo"
          style={{width:80,height:60,borderRadius:6,border:'2px dashed '+T.accent+'66',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',gap:3,background:T.accent+'10'}}>
          <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={addFile}/>
          <span style={{fontSize:16}}>{'\uD83D\uDCF7'}</span>
          <span style={{fontSize:9,fontFamily:"'Geist Mono',monospace",color:T.accent}}>PHOTO</span>
        </button>
      </div>
    );
  }

  const [tab,setTab]=useState('locations');
  const [selLoc,setSelLoc]=useState(null);
  const [selProp,setSelProp]=useState(null);
  const [selCos,setSelCos]=useState(null);
  const [selChar,setSelChar]=useState(null);
  const [bdSearch,setBdSearch]=useState('');
  const [selProps,setSelProps]=useState(()=>new Set());
  const [selCosKeys,setSelCosKeys]=useState(()=>new Set());
  const [mergeModal,setMergeModal]=useState(null);
  const [bdLeftWidth,setBdLeftWidth]=useState(220);
  const [selSceneBD,setSelSceneBD]=useState(null);
  const bdResizing=React.useRef(false);

  // Load camera-report coverage (which scenes have been shot, how many shots/takes).
  const [camCoverage,setCamCoverage]=useState({});
  const [bdShotFilter,setBdShotFilter]=useState('all'); // 'all' | 'shot' | 'unshot'
  React.useEffect(()=>{
    const projId=proj._id||'default';
    let unsub=null;
    try{
      const db=getFirestore();
      unsub=db.collection('camera_reports').doc(projId).onSnapshot(doc=>{
        const rolls=(doc.exists&&doc.data().rolls)||[];
        setCamCoverage(computeSceneCoverage(rolls));
      },()=>{});
    }catch(e){}
    return ()=>{ if(unsub)unsub(); };
  },[proj._id]);

  // Consume cross-view jump (e.g. Daily -> "View Breakdown" for a scene)
  React.useEffect(()=>{
    if(navTarget && navTarget.view==='breakdown'){
      setTab(navTarget.tab || (navTarget.sceneId ? 'scenes' : 'locations'));
      if(navTarget.sceneId) setSelSceneBD(navTarget.sceneId);
      clearNavTarget();
    }
  },[navTarget, clearNavTarget]);
  const onBdResizeStart=(e)=>{
    bdResizing.current=true;
    const startX=e.clientX,startW=bdLeftWidth;
    const onMove=(ev)=>{if(!bdResizing.current)return;setBdLeftWidth(Math.max(150,Math.min(420,startW+(ev.clientX-startX))));};
    const onUp=()=>{bdResizing.current=false;window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
  };

  useEffect(()=>{if(proj.locations?.length>0&&!selLoc)setSelLoc(proj.locations[0].id);},[proj]);

  function doMergeProps(unified){
    if(!unified.trim()||selProps.size<2)return;
    const names=Array.from(selProps);
    const updatedScenes=(proj.scenes||[]).map(s=>({
      ...s,
      props:(s.props||[]).map(p=>names.includes(p.name)?{...p,name:unified.trim()}:p)
        .filter((p,i,arr)=>arr.findIndex(x=>x.name===p.name)===i)
    }));
    updateProj({scenes:updatedScenes});
    setSelProps(new Set());setMergeModal(null);setSelProp(unified.trim());
  }

  function doMergeCostumes(unified){
    if(!unified.trim()||selCosKeys.size<2)return;
    const keys=Array.from(selCosKeys);
    const charIds=keys.map(k=>k.split('::')[0]);
    const descs=keys.map(k=>k.split('::')[1]);
    const updatedScenes=(proj.scenes||[]).map(s=>({
      ...s,
      wardrobe:(s.wardrobe||[]).map(w=>{
        if(charIds.includes(w.characterId)&&descs.includes(w.description))return{...w,description:unified.trim()};
        return w;
      }).filter((w,i,arr)=>arr.findIndex(x=>x.characterId===w.characterId&&x.description===w.description)===i)
    }));
    updateProj({scenes:updatedScenes});
    setSelCosKeys(new Set());setMergeModal(null);
  }

  const allProps=useMemo(()=>{
    const map={};
    (proj.scenes||[]).forEach(s=>(s.props||[]).forEach(p=>{
      if(!map[p.name])map[p.name]={name:p.name,critical:p.critical,scenes:[],images:[]};
      if(!map[p.name].scenes.includes(s.id))map[p.name].scenes.push(s.id);
    }));
    return Object.values(map).sort((a,b)=>b.scenes.length-a.scenes.length);
  },[proj]);

  const allCostumes=useMemo(()=>{
    const map={};
    (proj.scenes||[]).forEach(s=>(s.wardrobe||[]).forEach(w=>{
      const char=proj.characters?.find(c=>c.id===w.characterId);
      if(!char)return;
      const key=char.id+'::'+w.description;
      if(!map[key])map[key]={charId:char.id,charName:char.name,charColor:char.color,desc:w.description,scenes:[],images:[]};
      if(!map[key].scenes.includes(s.id))map[key].scenes.push(s.id);
    }));
    return Object.values(map).sort((a,b)=>a.charName.localeCompare(b.charName));
  },[proj]);

  const grouped=useMemo(()=>(proj.locations||[]).map(loc=>({loc,scenes:(proj.scenes||[]).filter(s=>s.locationId===loc.id)})),[proj]);

  const q=bdSearch.trim().toLowerCase();
  const contains=(txt)=>(txt||'').toString().toLowerCase().includes(q);

  // --- Sequences tab: group scenes into continuity blocks (scene.seqGroup) ---
  const [seqSel,setSeqSel]=useState(null); // currently active group name (for assigning)
  const seqColors=['#6E91E8','#8B68D4','#D4689E','#D47E45','#6BAD8A','#7CC4C4','#B5AD5A','#A86BAD','#5A8FAD','#AD6B6B'];
  const seqGroupNames=useMemo(()=>{
    const names=[];(proj.scenes||[]).forEach(s=>{if(s.seqGroup&&!names.includes(s.seqGroup))names.push(s.seqGroup);});
    return names.sort();
  },[proj]);
  const seqColorFor=(name)=>{const i=seqGroupNames.indexOf(name);return i>=0?seqColors[i%seqColors.length]:T.border;};
  const setSceneSeq=(sceneId,group)=>{
    const v=(group||'').trim();
    updateProj(p=>({...p,scenes:(p.scenes||[]).map(s=>s.id===sceneId?{...s,seqGroup:v||undefined}:s)}));
  };
  const addSceneToSeq=(sceneId)=>{ if(seqSel)setSceneSeq(sceneId,seqSel); };
  const renameSeq=(oldName,newName)=>{
    const v=(newName||'').trim();
    updateProj(p=>({...p,scenes:(p.scenes||[]).map(s=>s.seqGroup===oldName?{...s,seqGroup:v||undefined}:s)}));
    if(seqSel===oldName)setSeqSel(v||null);
  };
  const clearSeq=(name)=>{
    if(!confirm('Remove sequence "'+name+'"? Scenes stay, only the grouping is cleared.'))return;
    updateProj(p=>({...p,scenes:(p.scenes||[]).map(s=>s.seqGroup===name?{...s,seqGroup:undefined}:s)}));
    if(seqSel===name)setSeqSel(null);
  };

  const filteredGrouped=useMemo(()=>!q?grouped:grouped.filter(({loc,scenes})=>
    contains(loc.name)||contains(loc.type)||contains(loc.address)||scenes.some(s=>contains(s.id)||contains(s.slug)||contains(s.timeOfDay))
  ),[grouped,q]);
  const filteredProps=useMemo(()=>!q?allProps:allProps.filter(p=>contains(p.name)||p.scenes.some(contains)),[allProps,q]);
  const filteredCostumes=useMemo(()=>allCostumes.map((c,i)=>({...c,_idx:i})).filter(c=>!q||contains(c.charName)||contains(c.desc)||c.scenes.some(contains)),[allCostumes,q]);
  const filteredChars=useMemo(()=>!q?(proj.characters||[]):(proj.characters||[]).filter(c=>contains(c.name)||contains(c.role)||contains(c.description)||((proj.scenes||[]).some(s=>(s.characters||[]).includes(c.id)&&(contains(s.id)||contains(s.slug))))),[proj,q]);

  const addBDImage=(category,key,img,rmIdx)=>{
    updateProj(p=>{
      const bd={...(p._bd||{})};
      if(!bd[category])bd[category]={};
      if(!bd[category][key])bd[category][key]=[];
      if(img===null)bd[category][key]=bd[category][key].filter((_,i)=>i!==rmIdx);
      else bd[category][key]=[...bd[category][key],img];
      return{...p,_bd:bd};
    });
  };
  const bdImgs=(cat,key)=>(proj._bd?.[cat]?.[key])||[];

  const sg=grouped.find(g=>g.loc.id===selLoc);

  const TABS=[{id:'scenes',label:'Scenes',icon:'🎬'},{id:'sequences',label:'Sequences',icon:'🔗'},{id:'locations',label:'Locations',icon:'📍'},{id:'props',label:'Props',icon:'🎭'},{id:'costumes',label:'Costumes',icon:'👗'},{id:'characters',label:'Characters',icon:'👤'}];

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <NavBackBadge/>
      <div style={{padding:mob?'6px 8px':'8px 20px',borderBottom:`1px solid ${T.rule}`,display:'flex',gap:mob?3:4,flexShrink:0,flexWrap:'wrap'}}>
        {TABS.map(tb=>(
          <button key={tb.id} onClick={()=>setTab(tb.id)} style={{padding:mob?'5px 10px':'6px 14px',borderRadius:6,fontSize:mob?11:12,display:'flex',alignItems:'center',gap:4,background:tab===tb.id?T.chip:'transparent',color:tab===tb.id?T.text:T.textMute,border:`1px solid ${tab===tb.id?T.border:'transparent'}`}}>
            <span>{tb.icon}</span>{mob?tb.label.slice(0,4):tb.label}
          </button>
        ))}
        <input value={bdSearch} onChange={e=>setBdSearch(e.target.value)} placeholder={`Search...`}
          style={{width:mob?'100%':220,background:T.surface2,border:`1px solid ${T.border}`,borderRadius:6,padding:'5px 10px',fontSize:12,color:T.text,marginTop:mob?2:0}}/>
      </div>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:mob?'column':'row'}}>

        {tab==='scenes'&&<>
          <div style={{width:mob?'100%':bdLeftWidth,flexShrink:0,overflow:'auto',padding:'8px 0',display:mob&&selSceneBD?'none':'block',maxHeight:mob?'45vh':undefined}}>
            {(()=>{
              const allScenes=proj.scenes||[];
              const shotCount=allScenes.filter(s=>camCoverage[s.id]).length;
              const total=allScenes.length;
              // Progress % is weighted by PAGE count (scenes vary in length),
              // so it reflects how much of the script has actually been shot.
              const pageOf=s=>{const p=parseFloat(s.pages);return isNaN(p)?0:p;};
              const totalPages=allScenes.reduce((sum,s)=>sum+pageOf(s),0);
              const shotPages=allScenes.filter(s=>camCoverage[s.id]).reduce((sum,s)=>sum+pageOf(s),0);
              const pct=totalPages>0?Math.round(shotPages/totalPages*100):(total?Math.round(shotCount/total*100):0);
              return(
                <div style={{padding:'4px 14px 10px',borderBottom:`1px solid ${T.rule}`,marginBottom:6}}>
                  <div style={{display:'flex',alignItems:'baseline',gap:6,marginBottom:6}}>
                    <span style={{fontSize:18,fontWeight:700,color:T.accent,fontFamily:"'Geist Mono',monospace"}}>{shotCount}</span>
                    <span style={{fontSize:11,color:T.textDim,fontFamily:"'Geist Mono',monospace"}}>/ {total} scenes shot</span>
                    <span style={{flex:1}}/>
                    <span style={{fontSize:11,color:T.textMute,fontFamily:"'Geist Mono',monospace"}} title={`${shotPages.toFixed(1)} / ${totalPages.toFixed(1)} pages`}>{pct}%</span>
                  </div>
                  <div style={{height:5,borderRadius:3,background:T.surface2,overflow:'hidden',marginBottom:8}}>
                    <div style={{height:'100%',width:pct+'%',background:T.accent,borderRadius:3,transition:'width 0.3s'}}/>
                  </div>
                  <div style={{display:'flex',gap:4}}>
                    {[{k:'all',l:'All'},{k:'shot',l:'\u2705 Shot'},{k:'unshot',l:'\u25CB Unshot'}].map(({k,l})=>(
                      <button key={k} onClick={()=>setBdShotFilter(k)}
                        style={{flex:1,padding:'4px 0',borderRadius:5,fontSize:9,fontFamily:"'Geist Mono',monospace",cursor:'pointer',
                          background:bdShotFilter===k?T.accent+'22':'transparent',
                          border:`1px solid ${bdShotFilter===k?T.accent+'55':T.border}`,
                          color:bdShotFilter===k?T.accent:T.textDim}}>{l}</button>
                    ))}
                  </div>
                </div>
              );
            })()}
            {(proj.scenes||[]).filter(s=>!q||contains(s.id)||contains(s.slug))
              .filter(s=>{
                if(bdShotFilter==='shot')return !!camCoverage[s.id];
                if(bdShotFilter==='unshot')return !camCoverage[s.id];
                return true;
              })
              .map(s=>{
              const loc=findLoc(proj,s.locationId);
              const nC=(s.characters||[]).length;
              const cov=camCoverage[s.id];
              const ie=sceneIntExt(s.slug);
              return(
                <button key={s.id} onClick={()=>setSelSceneBD(s.id)} style={{width:'100%',padding:'9px 14px',textAlign:'left',background:selSceneBD===s.id?T.chip:'transparent',borderLeft:selSceneBD===s.id?`2px solid ${loc?.color||T.accent}`:'2px solid transparent',marginBottom:2}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,flexShrink:0}}>{s.id}</span>
                    {ie&&<span style={{flexShrink:0,fontSize:7,fontWeight:600,padding:'1px 3px',borderRadius:2,
                      background:ie==='EXT'?'#3b82f622':ie==='INT'?'#f59e0b22':'#a78bfa22',
                      color:ie==='EXT'?'#60a5fa':ie==='INT'?'#fbbf24':'#c4b5fd'}}>{ie}</span>}
                    <div style={{flex:1,overflow:'hidden'}}>
                      <div style={{fontSize:12,color:selSceneBD===s.id?T.text:T.textMute,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{loc?.name||s.slug}</div>
                      <div style={{fontSize:10,color:T.textDim,fontFamily:"'Geist Mono',monospace"}}>{s.timeOfDay} - {nC} char - {s.pages}p</div>
                    </div>
                    {cov
                      ?<span title={`${cov.shots} shots, ${cov.takes} takes recorded`} style={{flexShrink:0,fontSize:9,color:T.success,fontFamily:"'Geist Mono',monospace"}}>{'\u2705'}{cov.takes}</span>
                      :<span title="Not yet shot" style={{flexShrink:0,fontSize:9,color:T.textDim}}>{'\u25CB'}</span>}
                  </div>
                </button>
              );
            })}
          </div>

          <div onMouseDown={onBdResizeStart}
            style={{width:5,flexShrink:0,cursor:'col-resize',background:'transparent',borderRight:`1px solid ${T.border}`,position:'relative',zIndex:10,transition:'background 0.15s',display:mob?'none':'block'}}
            onMouseEnter={e=>{e.currentTarget.style.background=T.accent+'44';}}
            onMouseLeave={e=>{e.currentTarget.style.background='transparent';}}>
            <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:3,height:32,borderRadius:2,background:T.border,opacity:0.7}}/>
          </div>

          <div style={{flex:1,overflow:'auto',padding:mob?12:24,minHeight:0}}>
            {selSceneBD?(()=>{
              const s=(proj.scenes||[]).find(x=>x.id===selSceneBD);
              if(!s)return <div style={{color:T.textDim,fontSize:13}}>Scene not found.</div>;
              const loc=findLoc(proj,s.locationId);
              const sChars=(s.characters||[]).map(id=>findChar(proj,id)).filter(Boolean);
              const sProps=s.props||[];
              const sWard=s.wardrobe||[];
              const sMu=s.makeup||[];
              const secStyle={fontSize:10,color:T.textDim,fontFamily:"'Geist Mono',monospace",letterSpacing:'0.1em',marginBottom:8};
              const cardStyle={background:T.panel,border:'1px solid '+T.border,borderRadius:8,padding:'12px 14px',marginBottom:12};
              return(
                <div>
                  {mob&&<button onClick={()=>setSelSceneBD(null)} style={{color:T.accent,fontSize:11,fontFamily:"'Geist Mono',monospace",background:'transparent',border:'none',cursor:'pointer',padding:'0 0 10px',display:'block'}}>{'\u2190'} Back</button>}
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16,flexWrap:'wrap'}}>
                    <div style={{background:(loc?.color||T.accent)+'20',border:'1px solid '+(loc?.color||T.accent)+'44',borderRadius:5,padding:'3px 10px',fontFamily:"'Geist Mono',monospace",fontSize:12,color:loc?.color||T.accent}}>{s.id}</div>
                    <div style={{fontFamily:"'Courier Prime',monospace",fontSize:mob?13:15,fontWeight:700,color:T.text}}>{s.slug}</div>
                    <Pill>{s.timeOfDay}</Pill>
                    <Pill>ACT {s.act}</Pill>
                    <Pill>{s.pages}p</Pill>
                    {(()=>{
                      const cov=camCoverage[s.id];
                      const jump=()=>{ const nav=window.__sbNavigateTo; if(nav) nav('notes',{camSearchScene:s.id, fromView:'breakdown', fromSceneId:s.id, fromLabel:'Breakdown'}); };
                      if(cov){
                        return(
                          <button onClick={jump} title="View in Camera Report"
                            style={{display:'inline-flex',alignItems:'center',gap:6,padding:'3px 10px',borderRadius:5,cursor:'pointer',
                              background:T.success+'18',border:`1px solid ${T.success}44`,color:T.success,fontSize:11,fontFamily:"'Geist Mono',monospace"}}>
                            {'\uD83D\uDCF7'} {cov.shots} shot{cov.shots!==1?'s':''} {'\u00B7'} {cov.takes} take{cov.takes!==1?'s':''} {'\u2192'}
                          </button>
                        );
                      }
                      return(
                        <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'3px 10px',borderRadius:5,
                          background:T.surface2,border:`1px solid ${T.border}`,color:T.textDim,fontSize:11,fontFamily:"'Geist Mono',monospace"}}>
                          {'\u25CB'} not shot yet
                        </span>
                      );
                    })()}
                  </div>

                  <div style={cardStyle}>
                    <div style={secStyle}>LOCATION</div>
                    {loc?(
                      <button onClick={()=>{setTab('locations');setSelLoc(loc.id);}} style={{display:'inline-flex',alignItems:'center',gap:8,padding:'6px 12px',borderRadius:7,background:T.chip,border:'1px solid '+T.border,cursor:'pointer'}}>
                        <span style={{width:8,height:8,borderRadius:'50%',background:loc.color}}/>
                        <span style={{fontSize:13,color:T.text}}>{loc.name}</span>
                        <span style={{fontSize:10,color:T.textDim,fontFamily:"'Geist Mono',monospace"}}>{loc.type} {'\u2192'}</span>
                      </button>
                    ):<div style={{fontSize:12,color:T.textDim}}>No location set</div>}
                  </div>

                  <div style={cardStyle}>
                    <div style={secStyle}>CHARACTERS ({sChars.length})</div>
                    {sChars.length?(
                      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>

/* ═══════════════════════════════════════════════════════════
   CONT SCENE CARD — one card per (scene × character).
   Shows script-extracted info + on-set editable record.
   Photos stored in sb_cont IDB; text in proj.contNotes.
   Includes LAST SEEN reference so crew can match on set.
═══════════════════════════════════════════════════════════ */
function ContSceneCard({projId, scene, char, related, initialExpanded}){
  const {proj, updateProj}=useProj();
  const note=(proj.contNotes?.[scene.id]?.[char.id])||{};
  const relatedList=related||[];

  const [myPhotos,setMyPhotos]=useState({});
  const [refScenes,setRefScenes]=useState([]); // [{scene, ward, photos:[{url}]}] only ones WITH photos
  const [uploading,setUploading]=useState({});
  const [expanded,setExpanded]=useState(!!initialExpanded);
  const fileRef=useRef();
  const camRef=useRef();

  useEffect(()=>{
    let alive=true;
    const ids=note.photoIds||[];
    const cloudMap=note.cloudMap||{};
    contGetPhotosForCell(projId,scene.id,char.id).then(rows=>{
      if(!alive)return;
      const m={};
      rows.forEach(r=>{m[r.imgId]={dataUrl:r.dataUrl,cloudUrl:r.cloudUrl||cloudMap[r.imgId]};});
      ids.forEach(iid=>{if(!m[iid]&&cloudMap[iid])m[iid]={dataUrl:null,cloudUrl:cloudMap[iid]};});
      setMyPhotos(m);
    }).catch(()=>{
      if(!alive)return;
      const m={};ids.forEach(iid=>{if(cloudMap[iid])m[iid]={dataUrl:null,cloudUrl:cloudMap[iid]};});setMyPhotos(m);
    });
    return ()=>{alive=false;};
  },[projId,scene.id,char.id,(note.photoIds||[]).length,JSON.stringify(note.cloudMap||{})]);

  // Load photos for ALL related candidate scenes; keep only those that actually have a photo.
  const relKey=relatedList.map(s=>s.id).join(',');
  useEffect(()=>{
    let alive=true;
    if(relatedList.length===0){setRefScenes([]);return;}
    Promise.all(relatedList.map(rs=>{
      const rnote=(proj.contNotes?.[rs.id]?.[char.id])||{};
      const cloudMap=rnote.cloudMap||{};
      const ids=rnote.photoIds||[];
      return contGetPhotosForCell(projId,rs.id,char.id).then(rows=>{
        const byId={};
        rows.forEach(r=>{byId[r.imgId]={dataUrl:r.dataUrl,cloudUrl:r.cloudUrl||cloudMap[r.imgId]};});
        ids.forEach(iid=>{if(!byId[iid]&&cloudMap[iid])byId[iid]={dataUrl:null,cloudUrl:cloudMap[iid]};});
        const photos=Object.keys(byId).map(k=>byId[k]).filter(p=>p.dataUrl||p.cloudUrl);
        const ward=rnote.ward||rs.wardrobe?.find(w=>w.characterId===char.id)?.description||'';
        return {scene:rs, ward, photos, group:rs.seqGroup===scene.seqGroup&&!!scene.seqGroup};
      }).catch(()=>({scene:rs,ward:'',photos:[],group:false}));
    })).then(results=>{
      if(!alive)return;
      setRefScenes(results.filter(r=>r.photos.length>0));
    });
    return ()=>{alive=false;};
  },[projId,relKey,char.id,scene.seqGroup]);

  function patch(obj){
    updateProj(p=>{
      const cn={...(p.contNotes||{})};
      cn[scene.id]={...(cn[scene.id]||{})};
      cn[scene.id][char.id]={...(cn[scene.id]?.[char.id]||{ward:'',makeup:'',status:'unset',notes:'',photoIds:[],cloudMap:{}}),...obj};
      return {...p,contNotes:cn};
    });
  }

  async function addPhoto(file){
    if(!file||!file.type.startsWith('image/'))return;
    const dataUrl=await readAndResize(file,1200,1200,0.85);
    const imgId='ct'+Date.now()+Math.floor(Math.random()*1000);
    await contPutPhoto(projId,{imgId,sceneId:scene.id,charId:char.id,dataUrl});
    setMyPhotos(p=>({...p,[imgId]:{dataUrl}}));
    patch({photoIds:[...(note.photoIds||[]),imgId]});
  }

  async function deletePhoto(imgId){
    if(!confirm('Remove this photo?'))return;
    await contDeletePhoto(projId,imgId);
    const cm={...(note.cloudMap||{})};delete cm[imgId];
    patch({photoIds:(note.photoIds||[]).filter(x=>x!==imgId),cloudMap:cm});
    setMyPhotos(p=>{const n={...p};delete n[imgId];return n;});
  }

  async function uploadPhoto(imgId){
    const entry=myPhotos[imgId];
    if(!entry||!entry.dataUrl||entry.cloudUrl)return;
    setUploading(u=>({...u,[imgId]:true}));
    try{
      const {url}=await uploadContPhoto(entry.dataUrl);
      await contSetCloudUrl(projId,imgId,url);
      setMyPhotos(p=>({...p,[imgId]:{...p[imgId],cloudUrl:url}}));
      patch({cloudMap:{...(note.cloudMap||{}),[imgId]:url}});
    }catch(e){console.warn('Cont cloud upload error',e);}
    setUploading(u=>({...u,[imgId]:false}));
  }

  const scriptWard=scene.wardrobe?.find(w=>w.characterId===char.id)?.description;
  const scriptMakeup=scene.makeup?.find(m=>m.characterId===char.id)?.description;
  const loc=findLoc(proj,scene.locationId);
  const STATUS=[
    {k:'unset',icon:'\u25A1',label:'Not confirmed',col:T.textDim},
    {k:'ok',icon:'\u2705',label:'Confirmed',col:T.success},
    {k:'check',icon:'\u26A0',label:'Needs check',col:T.warn},
  ];
  const curStatus=STATUS.find(s=>s.k===(note.status||'unset'))||STATUS[0];

  const sectionH={fontSize:9,fontFamily:"'Geist Mono',monospace",letterSpacing:'0.12em',color:T.textDim,marginBottom:5,display:'block'};
  const inputSty={width:'100%',background:T.surface2,border:'1px solid '+T.border,borderRadius:5,padding:'6px 9px',fontSize:12,color:T.text,fontFamily:'inherit',lineHeight:1.4,resize:'vertical'};

  return(
    <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:8,overflow:'hidden',marginBottom:8,borderLeft:`3px solid ${note.status==='ok'?T.success:note.status==='check'?T.warn:T.border}`}}>
      {/* Header */}
      <div onClick={()=>setExpanded(e=>!e)} style={{padding:'8px 14px',display:'flex',alignItems:'center',gap:10,cursor:'pointer',borderBottom:`1px solid ${T.rule}`}}>
        <span style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,background:T.chip,padding:'1px 6px',borderRadius:3,flexShrink:0}}>SC {String(scene.sceneNo).padStart(2,'0')}</span>
        <span style={{fontSize:11,color:T.textMute,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{scene.slug}</span>
        {loc&&<span style={{width:6,height:6,borderRadius:'50%',background:loc.color,flexShrink:0}}/>}
        <span style={{fontSize:10,color:curStatus.col,fontFamily:"'Geist Mono',monospace",flexShrink:0}}>{curStatus.icon}</span>
        <span style={{fontSize:10,color:T.textDim,flexShrink:0}}>{expanded?'\u25B2':'\u25BC'}</span>
      </div>

      {expanded&&(
        <div style={{padding:14}}>
          {/* Sequence group indicator (read-only; assign in Breakdown > Sequences) */}
          {scene.seqGroup&&(
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
              <span style={{fontSize:9,fontFamily:"'Geist Mono',monospace",letterSpacing:'0.1em',color:T.accent}}>{'\uD83D\uDD17'} SEQ {scene.seqGroup}</span>
              <span style={{fontSize:9,color:T.textDim}}>continuity refs limited to this sequence</span>
            </div>
          )}

          {/* Status bar */}
          <div style={{display:'flex',gap:6,marginBottom:12}}>
            {STATUS.map(s=>(
              <button key={s.k} onClick={()=>patch({status:s.k})}
                style={{flex:1,padding:'5px 4px',borderRadius:6,border:`1px solid ${(note.status||'unset')===s.k?s.col:T.border}`,
                  background:(note.status||'unset')===s.k?s.col+'18':'transparent',
                  color:(note.status||'unset')===s.k?s.col:T.textDim,
                  fontSize:10,fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}>
                {s.icon} {s.label}
              </button>
            ))}
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:12}}>
            {/* Wardrobe */}
            <div>
              <span style={sectionH}>WARDROBE</span>

function ContTimeline(){
  const {proj}=useProj(); const t=useT();
  const scenes=proj.scenes||[];
  const chars=proj.characters||[];

  // Build shoot-order columns grouped by shoot day
  const dayGroups=useMemo(()=>{
    const groups=[];
    const scheduled=new Set();
    (proj.shootDays||[]).slice().sort((a,b)=>a.day-b.day).forEach(d=>{
      const ds=(d.scenes||[]).map(id=>scenes.find(s=>s.id===id)).filter(Boolean);
      if(ds.length>0){groups.push({day:d.day,date:d.date||null,scenes:ds});ds.forEach(s=>scheduled.add(s.id));}
    });
    const unsc=scenes.filter(s=>!scheduled.has(s.id));
    if(unsc.length>0) groups.push({day:null,date:null,scenes:unsc,label:'Unscheduled'});
    return groups;
  },[proj]);

  // All columns in shoot order
  const allCols=useMemo(()=>dayGroups.flatMap(g=>g.scenes),[dayGroups]);

  // For each char × col, find continuity status vs prev col where char appeared (shoot order)
  function colStatus(char,s,colIdx){
    const inScene=(s.characters||[]).includes(char.id);
    if(!inScene)return null;
    const w=s.wardrobe?.find(ww=>ww.characterId===char.id);
    let prevW=null;
    for(let pi=colIdx-1;pi>=0;pi--){
      if((allCols[pi].characters||[]).includes(char.id)){prevW=allCols[pi].wardrobe?.find(ww=>ww.characterId===char.id);break;}
    }
    const missing=!w;
    const changed=!missing&&prevW&&w.description!==prevW.description;
    return{w,missing,changed};
  }

  const DAY_COLS=['#6E91E8','#8B68D4','#D4689E','#D47E45','#6BAD8A','#7CC4C4','#B5AD5A','#A86BAD','#5A8FAD','#AD6B6B'];
  const thBase={padding:'5px 6px',borderRight:'1px solid '+T.border,textAlign:'center',verticalAlign:'middle',fontFamily:"'Geist Mono',monospace",fontSize:10,whiteSpace:'nowrap'};

  return(
    <div style={{height:'100%',overflow:'auto',padding:'12px 0 12px 12px'}}>
      <div style={{marginBottom:8,fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,letterSpacing:'0.1em',paddingLeft:4}}>
        {t.changed?<><span style={{color:T.warn}}>● {t.changed}</span> <span style={{marginLeft:12,color:T.danger}}>● {t.missing}</span></>:null}
        {(proj.shootDays||[]).length>0&&<span style={{marginLeft:12}}>{(proj.shootDays||[]).length} SHOOT DAYS · {allCols.length} SCENES</span>}
      </div>
      <table style={{borderCollapse:'separate',borderSpacing:0,minWidth:'100%'}}>
        <thead>
          {/* Row 1: Day group headers */}
          <tr>
            <th style={{...thBase,position:'sticky',left:0,top:0,zIndex:4,background:T.panel,width:160,minWidth:160,textAlign:'left',borderBottom:'1px solid '+T.rule,borderRight:'1px solid '+T.border,padding:'6px 12px'}}><Mono s={{color:T.textDim}}>CHARACTER</Mono></th>
            {dayGroups.map((g,gi)=>{
              const col=DAY_COLS[gi%DAY_COLS.length];
              const label=g.day!=null?('DAY '+g.day+(g.date?' \u00B7 '+new Date(g.date+'T00:00:00').toLocaleDateString('en-AU',{month:'short',day:'numeric'}):'')):(g.label||'Unscheduled');
              return(
                <th key={g.day??'u'} colSpan={g.scenes.length}
                  style={{...thBase,position:'sticky',top:0,zIndex:3,background:T.panel,borderBottom:'1px solid '+T.rule,borderTop:'2px solid '+col,color:col,letterSpacing:'0.08em'}}>
                  {label}
                </th>
              );
            })}
          </tr>
          {/* Row 2: Scene IDs */}
          <tr>
            <th style={{...thBase,position:'sticky',left:0,top:28,zIndex:4,background:T.surface2,textAlign:'left',padding:'4px 12px',borderBottom:'1px solid '+T.rule}}><Mono s={{color:T.textDim}}>Scene</Mono></th>
            {allCols.map(s=>{
              const actCol=ACT_COLORS[(s.act||1)-1];
              return(
                <th key={s.id} style={{...thBase,position:'sticky',top:28,zIndex:2,background:T.surface2,borderBottom:'1px solid '+T.rule,color:actCol}}>
                  <div>{s.id}</div>
                  <div style={{fontSize:9,color:T.textDim,marginTop:1}}>{s.timeOfDay?.slice(0,2)}</div>
                </th>
              );
            })}
          </tr>
        </thead>
        <tbody>
          {chars.map((char,ci)=>(
            <tr key={char.id} style={{background:ci%2===0?T.bg:T.surface2+'88'}}>
              <td style={{...thBase,position:'sticky',left:0,zIndex:1,background:ci%2===0?T.bg:T.surface2+'88',textAlign:'left',padding:'7px 12px',borderBottom:'1px solid '+T.rule}}>
                <div style={{display:'flex',alignItems:'center',gap:7}}>
                  <div style={{width:20,height:20,borderRadius:4,background:char.color+'22',border:'1px solid '+char.color+'44',display:'grid',placeItems:'center',fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:11,color:char.color,flexShrink:0}}>{(char.name||'?')[0]}</div>
                  <span style={{fontSize:11,color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:110}}>{char.name}</span>
                </div>
              </td>
              {allCols.map((s,ci2)=>{
                const st=colStatus(char,s,ci2);
                if(!st)return <td key={s.id} style={{...thBase,borderBottom:'1px solid '+T.rule,background:'transparent'}}><span style={{color:T.textDim,opacity:0.3}}>-</span></td>;
                const bg=st.missing?T.danger:st.changed?T.warn:char.color;
                const tip=(st.w?.description||t.missing||'Missing')+(st.changed?' (changed)':'');
                return(
                  <td key={s.id} title={tip} style={{...thBase,borderBottom:'1px solid '+T.rule,padding:'5px 4px'}}>
                    <div style={{minWidth:32,height:30,borderRadius:4,background:bg+'22',border:'1px solid '+bg+'55',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:1}}>
                      <span style={{fontSize:10,color:bg,fontWeight:600}}>{st.missing?'!':st.changed?'\u21D5':'\u2713'}</span>
                      {st.changed&&<span style={{fontSize:8,color:T.warn}}>chg</span>}
                    </div>
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function ContCards(){
  const {proj}=useProj();
  const mob=useMobile();
  const [mode,setMode]=useState('char'); // 'char' | 'day'
  const [selChar,setSelChar]=useState(null);
  const [selDay,setSelDay]=useState(null);

  const scenes=proj.scenes||[];
  const chars=proj.characters||[];
  const shootDays=(proj.shootDays||[]).slice().sort((a,b)=>a.day-b.day);

  // Build shoot-order index: scenes sorted by (day, then position-within-day)
  const shootOrder=useMemo(()=>{
    const ordered=[];
    const seen=new Set();
    shootDays.forEach(d=>{(d.scenes||[]).forEach(id=>{const s=scenes.find(x=>x.id===id);if(s&&!seen.has(id)){ordered.push(s);seen.add(id);}});});
    scenes.forEach(s=>{if(!seen.has(s.id))ordered.push(s);});
    return ordered;
  },[proj]);

  // Candidate continuity-reference scenes for (char, scene).
  // Priority B: if scene has a seqGroup, use ALL other scenes in that group
  //   where the char appears (a continuous story block -> same look).
  // Fallback A: char's neighbouring scenes in story order (+/- 3),
  //   so an already-shot nearby beat can serve as reference.
  // The card itself filters these down to ones that actually have photos.
  function relatedScenesFor(charId, scn){
    const charInStory=scenes.filter(s=>(s.characters||[]).includes(charId));
    const idx=charInStory.findIndex(s=>s.id===scn.id);
    if(scn.seqGroup){
      const group=charInStory.filter(s=>s.id!==scn.id&&s.seqGroup===scn.seqGroup);
      // order: story-nearest first
      return group.sort((a,b)=>Math.abs(charInStory.indexOf(a)-idx)-Math.abs(charInStory.indexOf(b)-idx));
    }
    if(idx<0)return [];
    const out=[];
    for(let d=1;d<=3;d++){
      if(charInStory[idx-d])out.push(charInStory[idx-d]);
      if(charInStory[idx+d])out.push(charInStory[idx+d]);
    }
    return out;
  }

  function charShootCards(charId){
    const cs=shootOrder.filter(s=>(s.characters||[]).includes(charId));
    return cs.map(s=>({scene:s, related:relatedScenesFor(charId,s)}));
  }

  // For a day, return all (char,scene) pairs; related = candidate ref scenes
  function dayCards(dayNum){
    const day=shootDays.find(d=>d.day===dayNum);
    if(!day)return[];
    const sceneIds=day.scenes||[];
    const pairs=[];
    chars.forEach(ch=>{
      const charScenes=sceneIds.map(id=>scenes.find(s=>s.id===id)).filter(s=>s&&(s.characters||[]).includes(ch.id));
      if(charScenes.length===0)return;
      charScenes.forEach(s=>{
        pairs.push({char:ch, scene:s, related:relatedScenesFor(ch.id,s)});
      });
    });
    return pairs;
  }

  useEffect(()=>{if(chars.length&&!selChar)setSelChar(chars[0].id);},[chars]);
  useEffect(()=>{if(shootDays.length&&!selDay)setSelDay(shootDays[0].day);},[shootDays]);

  const btnSty=(active)=>({padding:'5px 14px',borderRadius:6,border:'1px solid '+(active?T.accent:T.border),background:active?T.accent+'18':'transparent',color:active?T.accent:T.textMute,fontSize:11,fontFamily:"'Geist Mono',monospace",cursor:'pointer'});

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      {/* Mode tab bar */}
      <div style={{padding:'8px 16px',borderBottom:'1px solid '+T.rule,display:'flex',gap:6,flexShrink:0}}>
        <button style={btnSty(mode==='char')} onClick={()=>setMode('char')}>{'\uD83D\uDC64'} By Character</button>
        <button style={btnSty(mode==='day')} onClick={()=>setMode('day')}>{'\uD83D\uDCC5'} By Shoot Day</button>
      </div>

      <div style={{flex:1,display:'flex',overflow:'hidden'}}>
        {/* Left panel — kept narrow so right panel gets maximum room */}
        <div style={{width:mob?'30%':130,flexShrink:0,borderRight:'1px solid '+T.border,overflow:'auto',padding:'4px 0'}}>
          {mode==='char'&&chars.map(c=>{
            const miss=shootOrder.filter(s=>(s.characters||[]).includes(c.id)&&!s.wardrobe?.find(w=>w.characterId===c.id)).length;
            return(
              <button key={c.id} onClick={()=>setSelChar(c.id)} style={{width:'100%',padding:'7px 8px',textAlign:'left',background:selChar===c.id?T.chip:'transparent',borderLeft:selChar===c.id?'2px solid '+c.color:'2px solid transparent'}}>
                <div style={{display:'flex',alignItems:'center',gap:5}}>
                  <div style={{width:18,height:18,borderRadius:3,background:c.color+'22',border:'1px solid '+c.color+'44',display:'grid',placeItems:'center',fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:10,color:c.color,flexShrink:0}}>{(c.name||'?')[0]}</div>
                  <span style={{flex:1,fontSize:10,color:selChar===c.id?T.text:T.textMute,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</span>
                  {miss>0&&<span style={{fontSize:9,color:T.danger,fontFamily:"'Geist Mono',monospace",flexShrink:0}}>!{miss}</span>}
                </div>
              </button>
            );
          })}
          {mode==='day'&&(shootDays.length===0
            ?<div style={{padding:16,fontSize:12,color:T.textDim}}>No shoot days scheduled yet.</div>
            :shootDays.map(d=>{
              const dayPairs=dayCards(d.day);
              const totalCards=dayPairs.length;
              const confirmed=dayPairs.filter(({char:ch,scene:s})=>(proj.contNotes?.[s.id]?.[ch.id]?.status)==='ok').length;
              return(

            const cards=charShootCards(char.id);

                    <div style={{fontSize:10,color:T.textDim,fontFamily:"'Geist Mono',monospace",marginTop:2}}>{cards.length} scenes in shoot order</div>
                  </div>
                </div>
                <div style={{background:T.panel,border:'1px solid '+T.border,borderRadius:8,padding:'10px 12px',marginBottom:14}}>
                  <div style={{fontSize:9,fontFamily:"'Geist Mono',monospace",letterSpacing:'0.12em',color:T.textDim,marginBottom:6}}>MAKEUP / HAIR \u00B7 BASELINE PROFILE</div>
                  <MakeupSection charId={selChar} projId={proj._id} readOnly={true}/>
                </div>
                {cards.length===0&&<div style={{color:T.textDim,fontSize:12}}>This character has no scenes in the schedule.</div>}
                {cards.map(({scene,related},i)=>{
                  const dayNum=scene.shootDay;
                  const showDayHdr=i===0||(cards[i-1]?.scene?.shootDay!==dayNum);
                  return(
                    <div key={scene.id}>
                      {showDayHdr&&dayNum&&<div style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.accent,letterSpacing:'0.12em',margin:'14px 0 6px',paddingLeft:2}}>{'--- DAY '+dayNum+' ---'}</div>}
                      <ContSceneCard projId={proj._id} scene={scene} char={char} related={related} initialExpanded={i===0}/>
                    </div>
                  );
                })}
              </div>
            );
          })()}

          {mode==='day'&&(()=>{
            const day=shootDays.find(d=>d.day===selDay);
            if(!day)return <div style={{color:T.textDim,fontSize:13,padding:20}}>Select a shoot day</div>;
            const pairs=dayCards(day.day);
            if(pairs.length===0)return <div style={{color:T.textDim,fontSize:13,padding:20}}>No scenes scheduled for Day {day.day}.</div>;
            // Group by character
            const byChar={};
            pairs.forEach(p=>{(byChar[p.char.id]=byChar[p.char.id]||{char:p.char,pairs:[]}).pairs.push(p);});
            return(
              <div>
                <div style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.accent,letterSpacing:'0.12em',marginBottom:14}}>DAY {day.day} \u00B7 {pairs.length} SCENES \u00B7 {Object.keys(byChar).length} CHARACTERS</div>
                {Object.values(byChar).map(({char,pairs:cps})=>(
                  <div key={char.id} style={{marginBottom:20}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,paddingBottom:6,borderBottom:'1px solid '+T.rule}}>
                      <div style={{width:18,height:18,borderRadius:3,background:char.color+'22',border:'1px solid '+char.color+'44',display:'grid',placeItems:'center',fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:10,color:char.color}}>{(char.name||'?')[0]}</div>
                      <span style={{fontSize:12,color:T.text,fontWeight:500}}>{char.name}</span>
                      <span style={{fontSize:10,color:T.textDim,fontFamily:"'Geist Mono',monospace"}}>{cps.length} scene{cps.length>1?'s':''}</span>
                    </div>
                    {cps.map(({scene,related})=>(
                      <ContSceneCard key={scene.id} projId={proj._id} scene={scene} char={char} related={related}/>
                    ))}
                  </div>
                ))}
              </div>
            );
          })()}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   SHARED: Clock Picker
═══════════════════════════════════════════════════════════ */
function ClockPicker({value,onChange,onClose}){
  const [h,m]=(value||'07:00').split(':').map(Number);
  const [selH,setSelH]=React.useState(h);
  const [selM,setSelM]=React.useState(m);
  const [mode,setMode]=React.useState('h'); // 'h' or 'm'
  const clockRef=React.useRef(null);

  const cx=120,cy=120,r=90,rDot=10;
  const hourAngle=(selH%12)/12*360-90;
  const minAngle=selM/60*360-90;
  const angle=mode==='h'?hourAngle:minAngle;
  const rad=angle*Math.PI/180;
  const dotX=cx+r*Math.cos(rad);
  const dotY=cy+r*Math.sin(rad);

  const handleClick=(e)=>{
    const rect=clockRef.current.getBoundingClientRect();
    const x=e.clientX-rect.left-cx;
    const y=e.clientY-rect.top-cy;
    const a=Math.atan2(y,x)*180/Math.PI+90;
    const norm=(a+360)%360;
    if(mode==='h'){
      const hv=Math.round(norm/30)%12||(selH>=12?0:0);
      const newH=selH>=12?hv+12:hv;
      setSelH(newH);setMode('m');
    } else {
      const mv=Math.round(norm/6)%60;
      setSelM(mv);
      onChange(`${String(selH).padStart(2,'0')}:${String(mv).padStart(2,'0')}`);
      onClose();
    }
  };

  const hours=Array.from({length:12},(_,i)=>i);
  const mins=[0,5,10,15,20,25,30,35,40,45,50,55];

  return(
    <div style={{position:'fixed',inset:0,zIndex:9000,display:'grid',placeItems:'center'}}
      onClick={e=>{if(e.target===e.currentTarget)handleClose();}}>
      <div style={{background:T.panel,border:`1px solid ${T.borderHi}`,borderRadius:14,
        padding:'16px 20px',boxShadow:'0 8px 40px rgba(0,0,0,0.4)',width:280}}>
        {/* Display */}
        <div style={{display:'flex',alignItems:'baseline',justifyContent:'center',gap:2,marginBottom:14}}>
          <button onClick={()=>setMode('h')} style={{fontSize:36,fontFamily:"'Instrument Serif',serif",
            fontStyle:'italic',color:mode==='h'?T.accent:T.textMute,background:'transparent',border:'none',cursor:'pointer'}}>
            {String(selH).padStart(2,'0')}
          </button>
          <span style={{fontSize:28,color:T.textDim,fontFamily:"'Instrument Serif',serif"}}>:</span>
          <button onClick={()=>setMode('m')} style={{fontSize:36,fontFamily:"'Instrument Serif',serif",
            fontStyle:'italic',color:mode==='m'?T.accent:T.textMute,background:'transparent',border:'none',cursor:'pointer'}}>
            {String(selM).padStart(2,'0')}
          </button>
          <div style={{display:'flex',flexDirection:'column',gap:3,marginLeft:6}}>
            {['AM','PM'].map(p=>(
              <button key={p} onClick={()=>{
                if(p==='AM'&&selH>=12)setSelH(selH-12);
                if(p==='PM'&&selH<12)setSelH(selH+12);
              }} style={{fontSize:10,padding:'2px 6px',borderRadius:3,cursor:'pointer',
                background:(p==='AM'&&selH<12)||(p==='PM'&&selH>=12)?T.accent+'33':'transparent',
                border:`1px solid ${(p==='AM'&&selH<12)||(p==='PM'&&selH>=12)?T.accent:T.border}`,
                color:(p==='AM'&&selH<12)||(p==='PM'&&selH>=12)?T.accent:T.textMute,
                fontFamily:"'Geist Mono',monospace"}}>
                {p}
              </button>
            ))}
          </div>
        </div>
        {/* Clock face */}
        <svg width={240} height={240} style={{display:'block',margin:'0 auto',cursor:'pointer'}}
          ref={clockRef} onClick={handleClick}>
          <circle cx={cx} cy={cy} r={cx-4} fill={T.surface2} stroke={T.border} strokeWidth={1}/>
          <line x1={cx} y1={cy} x2={dotX} y2={dotY} stroke={T.accent} strokeWidth={2} strokeLinecap="round"/>
          <circle cx={cx} cy={cy} r={4} fill={T.accent}/>
          <circle cx={dotX} cy={dotY} r={rDot} fill={T.accent}/>
          {(mode==='h'?hours:mins).map((v,i)=>{
            const items=mode==='h'?hours:mins;
            const a=(i/items.length)*360-90;
            const rd=a*Math.PI/180;
            const tx=cx+(r-2)*Math.cos(rd);
            const ty=cy+(r-2)*Math.sin(rd);
            const isActive=mode==='h'?(v===selH%12):v===selM;
            return(
              <text key={v} x={tx} y={ty} textAnchor="middle" dominantBaseline="central"
                fontSize={11} fill={isActive?'#0e0d0b':T.textMute}
                fontFamily="'Geist Mono',monospace">
                {mode==='h'?(v===0?12:v):String(v).padStart(2,'0')}
              </text>
            );
          })}
        </svg>
        <div style={{display:'flex',justifyContent:'flex-end',marginTop:10,gap:8}}>
          <button onClick={onClose} style={{padding:'5px 14px',border:`1px solid ${T.border}`,borderRadius:5,
            color:T.textMute,fontSize:12,background:'transparent',cursor:'pointer'}}>Cancel</button>
          <button onClick={()=>{onChange(`${String(selH).padStart(2,'0')}:${String(selM).padStart(2,'0')}`);onClose();}}
            style={{padding:'5px 14px',background:T.accent,border:'none',borderRadius:5,
              color:'#0e0d0b',fontSize:12,fontWeight:600,cursor:'pointer'}}>OK</button>
        </div>
      </div>
    </div>
  );
}

  const [open,setOpen]=React.useState(false);

/* ═══════════════════════════════════════════════════════════
   AIFillModal — take photo / upload screenshot, send to
   Claude Vision, preview extracted fields, then append as a
   new take row (with the photo saved as its reference).
   Uses the user's own Anthropic API key (stored in localStorage).
   Key is never sent anywhere except api.anthropic.com.
═══════════════════════════════════════════════════════════ */
function AIFillModal({roll, projId, scenes, onApply, onClose}){
  const mob=useMobile();
  // Up to 2 images — each is {dataUrl, label}
  const [imgList,setImgList]=React.useState([]);
  const [status,setStatus]=React.useState('idle');
  const [result,setResult]=React.useState(null);
  const [errMsg,setErrMsg]=React.useState('');
  const [fields,setFields]=React.useState({});
  const [hasKey,setHasKey]=React.useState(!!localStorage.getItem(SB_ANTHRO_KEY));
  const fileRefs=[React.useRef(null),React.useRef(null)];
  const camRefs=[React.useRef(null),React.useRef(null)];

  async function handleFile(file, slot){
    if(!file||!file.type.startsWith('image/'))return;
    const dataUrl=await readAndResize(file,1400,1400,0.92);
    setImgList(prev=>{
      const next=[...prev];
      next[slot]={dataUrl, label:slot===0?'Photo 1':'Photo 2'};
      return next;
    });
    setStatus('idle'); setResult(null); setFields({}); setErrMsg('');
  }

  function removeImg(slot){
    setImgList(prev=>{const next=[...prev];next.splice(slot,1);return next;});
    setStatus('idle'); setResult(null); setFields({}); setErrMsg('');
  }

  async function runAnalysis(){
    if(!imgList.length)return;
    setStatus('loading'); setErrMsg('');
    try{
      const dataUrls=imgList.map(i=>i.dataUrl);
      const parsed=await analyseCameraSlate(dataUrls.length===1?dataUrls[0]:dataUrls, roll);
      setResult(parsed);
      setFields({
        scene:parsed.scene||'', shot:parsed.shot||'/', take:parsed.take||'1',
        tail:parsed.tail==='true'||parsed.tail===true,
        clip:parsed.clip||'', lens:parsed.lens||roll?.lens||'', focal:parsed.focal||'',
        stop:parsed.stop||'', ei:parsed.ei||roll?.baseEI||'',
        intFilters:parsed.intFilters||'', filters:parsed.filters||'',
        nd:parsed.nd||'', wb:parsed.wb||'', focus:parsed.focus||'',
        codec:parsed.codec||'', notes:parsed.notes||''
      });
      setStatus('done'); setHasKey(true);
    }catch(e){
      setStatus('error'); setErrMsg(e.message||'Analysis failed.');
      setHasKey(!!localStorage.getItem(SB_ANTHRO_KEY));
    }
  }

  function applyTake(){
    onApply({fields, imgData:imgList[0]||null, imgList});
    onClose();
  }

  const inp={background:T.surface2,border:'1px solid '+T.border,borderRadius:5,padding:'5px 8px',
    fontSize:11,color:T.text,fontFamily:"'Geist Mono',monospace",width:'100%'};
  const lbl={fontSize:8,fontFamily:"'Geist Mono',monospace",letterSpacing:'0.08em',
    color:T.textDim,marginBottom:2,display:'block'};
  const FIELD_DEFS=[
    {k:'scene',l:'SCENE'},{k:'shot',l:'SHOT'},{k:'take',l:'TAKE'},
    {k:'clip',l:'CLIP'},{k:'lens',l:'LENS'},{k:'focal',l:'FOCAL'},
    {k:'stop',l:'STOP'},{k:'ei',l:'EI'},{k:'intFilters',l:'FILTER 1'},
    {k:'filters',l:'FILTER 2'},{k:'nd',l:'ND'},{k:'wb',l:'WB'},
    {k:'focus',l:'FOCUS (cm)'},{k:'codec',l:'CODEC'},{k:'notes',l:'NOTES'}
  ];

  const slotLabel=['📷 Monitor / Slate photo','📷 Second photo (optional — e.g. slate if first was monitor)'];

  return(
    <div style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(0,0,0,0.75)',
      display:'flex',alignItems:'center',justifyContent:'center',padding:mob?8:24}}>
      <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:12,
        width:'100%',maxWidth:660,maxHeight:'92vh',overflow:'auto',
        boxShadow:'0 20px 60px rgba(0,0,0,0.7)',display:'flex',flexDirection:'column'}}>

        {/* Header */}
        <div style={{padding:'14px 18px',borderBottom:`1px solid ${T.rule}`,
          display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
          <span style={{fontSize:18}}>{'\uD83E\uDD16'}</span>
          <div>
            <div style={{fontSize:14,color:T.text,fontWeight:600}}>AI Fill from Photo</div>
            <div style={{fontSize:10,color:T.textDim,marginTop:1}}>
              Add 1–2 photos (monitor + slate) — Claude extracts fields from both at once
            </div>
          </div>
          <div style={{flex:1}}/>
          {hasKey&&<button onClick={()=>{clearAnthropicKey();setHasKey(false);}}
            style={{fontSize:9,color:T.textDim,background:'transparent',border:`1px solid ${T.border}`,
              borderRadius:4,padding:'3px 7px',cursor:'pointer',fontFamily:"'Geist Mono',monospace"}}>
            forget key
          </button>}
          <button onClick={onClose}
            style={{background:'transparent',border:'none',color:T.textDim,fontSize:18,cursor:'pointer',padding:'0 4px',lineHeight:1}}>
            {'\u00D7'}
          </button>
        </div>

        <div style={{padding:'14px 18px',flex:1,minHeight:0,overflow:'auto'}}>

          {/* Step 1: Image slots */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,fontFamily:"'Geist Mono',monospace",color:T.textDim,
              letterSpacing:'0.08em',marginBottom:10}}>
              1 · ADD PHOTOS (up to 2 — e.g. monitor screenshot + slate)
            </div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              {[0,1].map(slot=>{
                const img=imgList[slot];
                const isSecond=slot===1;
                if(isSecond&&imgList.length===0)return null; // hide slot 2 until slot 1 filled
                return(
                  <div key={slot} style={{flex:1,minWidth:mob?'100%':200,
                    background:T.surface2,border:`1px solid ${img?T.accent+'44':T.border}`,
                    borderRadius:8,padding:8,display:'flex',flexDirection:'column',gap:6}}>
                    <div style={{fontSize:9,fontFamily:"'Geist Mono',monospace",color:img?T.accent:T.textDim}}>
                      {img?'PHOTO '+(slot+1)+' \u2713':slotLabel[slot]}
                    </div>
                    {img?(
                      <div style={{position:'relative',display:'inline-block'}}>
                        <img src={img.dataUrl} style={{width:'100%',maxHeight:100,
                          objectFit:'contain',borderRadius:5,border:`1px solid ${T.border}`}}/>
                        <button onClick={()=>removeImg(slot)}
                          style={{position:'absolute',top:3,right:3,width:18,height:18,
                            background:'rgba(0,0,0,0.7)',border:'none',borderRadius:'50%',
                            color:'white',fontSize:11,cursor:'pointer',display:'grid',placeItems:'center'}}>
                          {'\u00D7'}
                        </button>
                      </div>
                    ):(
                      <div style={{display:'flex',gap:6}}>
                        <button onClick={()=>fileRefs[slot].current?.click()}
                          style={{flex:1,padding:'6px 0',borderRadius:5,border:`1px dashed ${T.border}`,
                            background:'transparent',color:T.textMute,fontSize:10,
                            fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}>
                          {'\uD83D\uDDBC'} File
                        </button>
                        <button onClick={()=>camRefs[slot].current?.click()}
                          style={{flex:1,padding:'6px 0',borderRadius:5,border:`1px dashed ${T.accent}66`,
                            background:T.accent+'10',color:T.accent,fontSize:10,
                            fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}>
                          {'\uD83D\uDCF7'} Shoot
                        </button>
                      </div>
                    )}
                    <input ref={fileRefs[slot]} type="file" accept="image/*" style={{display:'none'}}
                      onChange={e=>{handleFile(e.target.files[0],slot);e.target.value='';}}/>
                    <input ref={camRefs[slot]} type="file" accept="image/*" capture="environment" style={{display:'none'}}
                      onChange={e=>{handleFile(e.target.files[0],slot);e.target.value='';}}/>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Step 2: Analyse */}
          {imgList.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,fontFamily:"'Geist Mono',monospace",color:T.textDim,
                letterSpacing:'0.08em',marginBottom:8}}>2 · ANALYSE</div>
              {status==='idle'&&(
                <button onClick={runAnalysis}
                  style={{width:'100%',padding:'10px 0',borderRadius:7,background:T.accent,
                    border:'none',color:'#0e0d0b',fontSize:12,fontWeight:600,cursor:'pointer',
                    fontFamily:"'Geist Mono',monospace"}}>
                  {'\uD83E\uDD16'} Analyse {imgList.length===2?'both photos':'photo'} with Claude
                </button>
              )}
              {status==='loading'&&(

  );
}

function camOf(roll){ return (roll&&roll.cam)||'A'; }


/* Format a date string "YYYY-MM-DD" into "Wed, 1 Jul 2026".
   Falls back to the raw string if it can't be parsed. */
function fmtDayDate(dateStr){
  if(!dateStr)return '';
  const m=String(dateStr).match(/^(\d{4})-(\d{2})-(\d{2})/);
  let d;
  if(m){ d=new Date(Number(m[1]),Number(m[2])-1,Number(m[3])); }
  else { d=new Date(dateStr); }
  if(isNaN(d.getTime()))return dateStr;
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return days[d.getDay()]+', '+d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
}

/* Extract INT / EXT from a scene slug like "INT. ALEX'S APARTMENT - DAY". */
function sceneIntExt(slug){
  if(!slug)return '';
  const s=slug.toUpperCase();
  const hasInt=/\bINT\b/.test(s);
  const hasExt=/\bEXT\b/.test(s);
  if(hasInt&&hasExt)return 'I/E';
  if(hasInt)return 'INT';
  if(hasExt)return 'EXT';
  return '';
}

/* Aggregate camera-report coverage per scene id across all rolls.
   A take's scene field may hold multiple comma-separated scene ids.
   Returns { [sceneId]: {takes, shots, rolls} }. */
function computeSceneCoverage(rolls){
  const map={};
  (rolls||[]).forEach(r=>{
    (r.takes||[]).forEach(t=>{
      const ids=String(t.scene||'').split(',').map(x=>x.trim()).filter(Boolean);
      ids.forEach(id=>{
        if(!map[id])map[id]={takes:0,shotSet:new Set(),rollSet:new Set()};
        map[id].takes++;
        map[id].shotSet.add((t.shot||'/')+'');
        map[id].rollSet.add(r.id);
      });
    });
  });
  const out={};
  Object.entries(map).forEach(([id,v])=>{
    out[id]={takes:v.takes,shots:v.shotSet.size,rolls:v.rollSet.size};
  });
  return out;
}
