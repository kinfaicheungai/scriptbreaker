═══════════════════════════════════════════════════════════ */
const GDRIVE_CLIENT_ID = '145572665951-pe6ka3u15qb26kgb397cm7b1a8hl9cac.apps.googleusercontent.com';
const GDRIVE_SCOPE = 'https://www.googleapis.com/auth/drive';
const GDRIVE_FOLDER_NAME = 'ScriptBreaker';

// Drive auth state
let _driveToken = null;
let _driveUser = null;
let _driveFolderId = null;

function getDriveToken(){ return _driveToken; }
function getDriveUser(){ return _driveUser; }

// Sign in with Google
function driveSignIn(){
  return new Promise((resolve, reject) => {
    if(!window.google) { reject(new Error('Google Identity not loaded')); return; }
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GDRIVE_CLIENT_ID,
      scope: GDRIVE_SCOPE + ' https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
      callback: async (resp) => {
        if(resp.error){ reject(new Error(resp.error)); return; }
        _driveToken = resp.access_token;
        // Get user info
        try {
          const r = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
            headers: { Authorization: 'Bearer ' + _driveToken }
          });
          _driveUser = await r.json();
        } catch(e) {}
        // Ensure folder exists
        try { _driveFolderId = await ensureDriveFolder(); } catch(e) {}
        resolve({ token: _driveToken, user: _driveUser });
      }
    });
    client.requestAccessToken();
  });
}

function driveSignOut(){
  if(_driveToken) google.accounts.oauth2.revoke(_driveToken, ()=>{});
  _driveToken = null;
  _driveUser = null;
  _driveFolderId = null;
}

// Ensure ScriptBreaker folder exists in Drive
async function ensureDriveFolder(){
  const q = encodeURIComponent(`name='${GDRIVE_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
    headers: { Authorization: 'Bearer ' + _driveToken }
  });
  const data = await r.json();
  if(data.files && data.files.length > 0) return data.files[0].id;
  // Create folder
  const cr = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + _driveToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: GDRIVE_FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' })
  });
  const folder = await cr.json();
  return folder.id;
}

// List all JSON files in ScriptBreaker folder (own + shared)
async function listDriveFiles(){
  if(!_driveToken) return [];

  // 1. Own ScriptBreaker folder
  const folderId = _driveFolderId || await ensureDriveFolder();
  _driveFolderId = folderId;
  const q1 = encodeURIComponent("'" + folderId + "' in parents and mimeType='application/json' and trashed=false");
  const r1 = await fetch('https://www.googleapis.com/drive/v3/files?q=' + q1 + '&fields=files(id,name,modifiedTime,size)&orderBy=modifiedTime+desc', {
    headers: { Authorization: 'Bearer ' + _driveToken }
  });
  const d1 = await r1.json();
  const ownFiles = d1.files || [];

  // 2. Find ALL ScriptBreaker folders accessible (shared or owned)
  // Use broad search without sharedWithMe filter to catch all cases
  const q2 = encodeURIComponent("name='ScriptBreaker' and mimeType='application/vnd.google-apps.folder' and trashed=false");
  const r2 = await fetch('https://www.googleapis.com/drive/v3/files?q=' + q2 + '&fields=files(id,name)&includeItemsFromAllDrives=true&supportsAllDrives=true&corpora=allDrives', {
    headers: { Authorization: 'Bearer ' + _driveToken }
  });
  const d2 = await r2.json();
  // Filter out own folder to avoid duplicates
  const otherFolders = (d2.files || []).filter(f => f.id !== folderId);

  // 3. Get JSON files from each other ScriptBreaker folder
  let sharedFiles = [];
  for(const folder of otherFolders){
    try {
      const q3 = encodeURIComponent("'" + folder.id + "' in parents and mimeType='application/json' and trashed=false");
      const r3 = await fetch('https://www.googleapis.com/drive/v3/files?q=' + q3 + '&fields=files(id,name,modifiedTime,size)&orderBy=modifiedTime+desc&includeItemsFromAllDrives=true&supportsAllDrives=true', {
        headers: { Authorization: 'Bearer ' + _driveToken }
      });
      const d3 = await r3.json();
      sharedFiles = sharedFiles.concat(d3.files || []);
    } catch(e) {}
  }

  // Deduplicate by id, sort newest first
  const allMap = {};
  [...ownFiles, ...sharedFiles].forEach(f => { allMap[f.id] = f; });
  return Object.values(allMap).sort((a,b) => new Date(b.modifiedTime) - new Date(a.modifiedTime));
}

// Read a JSON file from Drive (own or shared)
async function readDriveFile(fileId){
  const r = await fetch('https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media&supportsAllDrives=true', {
    headers: { Authorization: 'Bearer ' + _driveToken }
  });
  return await r.json();
}

// Save/update a JSON file in Drive
async function saveDriveFile(fileId, filename, data){
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  if(fileId){
    // Update existing
    const r = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
      method: 'PATCH',
      headers: { Authorization: 'Bearer ' + _driveToken, 'Content-Type': 'application/json' },
      body: blob
    });
    return await r.json();
  } else {
    // Create new with metadata
    const folderId = _driveFolderId || await ensureDriveFolder();
    const meta = { name: filename, parents: [folderId], mimeType: 'application/json' };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
    form.append('file', blob);
    const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + _driveToken },
      body: form
    });
    return await r.json();
  }
}

// Delete a file from Drive
async function deleteDriveFile(fileId){
  await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}`, {
    method: 'DELETE',
    headers: { Authorization: 'Bearer ' + _driveToken }
  });
}

function normalizeProject(raw){
  if(!raw) return null;
  const p=JSON.parse(JSON.stringify(raw));
  p.characters?.forEach((c,i)=>{ if(!c.color) c.color=CHAR_COLORS[i%CHAR_COLORS.length]; });
  p.locations?.forEach((l,i)=>{ if(!l.color) l.color=LOC_COLORS[i%LOC_COLORS.length]; });
  p.scenes?.forEach(s=>{
    if(!s.characters) s.characters=[];
    s.characters=s.characters.map(x=>typeof x==='string'?x:(x.id||x)).filter(Boolean);
    if(!s.shots) s.shots=[];
    if(!s.props) s.props=[];
    if(!s.wardrobe) s.wardrobe=[];
    if(!s.makeup) s.makeup=[];
    if(!s.equipment) s.equipment=[];
  });
  if(!p._id) p._id='p_'+Date.now();
  p._updatedAt=Date.now();
  return p;
}

/* ═══════════════════════════════════════════════════════════
   IMAGE RESIZE / COMPRESS HELPER
   Resizes any image to max maxW x maxH pixels and exports as
   JPEG (quality 0.82) to keep localStorage / IDB payloads small.
   Phone photos are typically 3-5 MB as raw base64; after
   resizing to <=1400px they compress to ~100-250 KB - safe for
   localStorage and fast to render.
   Returns a Promise<string> (data URL).
═══════════════════════════════════════════════════════════ */
function resizeToDataUrl(dataUrl, maxW, maxH, quality){
  maxW = maxW || 1400;
  maxH = maxH || 1400;
  quality = quality || 0.82;
  return new Promise(function(resolve, reject){
    var img = new window.Image();
    img.onload = function(){
      var w = img.naturalWidth;
      var h = img.naturalHeight;
      var scale = Math.min(1, maxW / w, maxH / h);
      var tw = Math.round(w * scale);
      var th = Math.round(h * scale);
      var canvas = document.createElement('canvas');
      canvas.width = tw;
      canvas.height = th;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, tw, th);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = function(){ reject(new Error('Image load failed')); };
    img.src = dataUrl;
  });
}

/* Helper: read a File/Blob to base64, then compress.
   Returns Promise<string>. */
function readAndResize(file, maxW, maxH, quality){
  return new Promise(function(resolve, reject){
    var r = new FileReader();
    r.onload = function(ev){
      resizeToDataUrl(ev.target.result, maxW, maxH, quality).then(resolve).catch(reject);
    };
    r.onerror = function(){ reject(new Error('FileReader failed')); };
    r.readAsDataURL(file);
  });
}

// Compute actual calendar dates for shoot days
function computeShootCalendar(startDateStr,endDateStr,totalDays){
  if(!startDateStr) return {};
  try{
    const start=new Date(startDateStr+'T00:00:00');
    if(isNaN(start)) return {};
    const calendar={};
    let cur=new Date(start);
    let day=1;
    // If end date given, count actual workdays; else just generate totalDays workdays
    while(day<=Math.max(totalDays||1,1)){
      if(cur.getDay()!==0&&cur.getDay()!==6){
        calendar[day]=cur.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        day++;
      }
      cur=new Date(cur.getTime()+86400000);
    }
    return calendar;
  }catch{return {}}
}

function mergeProjectChunk(base,chunk,replaceExisting){

/* ═══════════════════════════════════════════════════════════
   GALLERY IndexedDB - local storage for batch-imported shot
   reference images, kept separate from proj JSON so Export/
   Drive sync stays lightweight. Scoped per project via proj._id.
═══════════════════════════════════════════════════════════ */
const GALLERY_DB_NAME = 'sb_gallery';
const GALLERY_STORE = 'images';

function openGalleryDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(GALLERY_DB_NAME, 1);
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains(GALLERY_STORE)){
        const store = db.createObjectStore(GALLERY_STORE, {keyPath:'key'});
        store.createIndex('projId', 'projId', {unique:false});
      }
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}

async function galleryPutImage(projId, item){
  // item: {name, sceneNum, shotNum, desc, dataUrl}
  const db = await openGalleryDB();
  const key = projId + '::' + item.name;
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(GALLERY_STORE, 'readwrite');
    tx.objectStore(GALLERY_STORE).put({ key, projId, ...item });
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}

async function galleryGetAll(projId){
  const db = await openGalleryDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(GALLERY_STORE, 'readonly');
    const idx = tx.objectStore(GALLERY_STORE).index('projId');
    const req = idx.getAll(projId);
    req.onsuccess = ()=>resolve(req.result || []);
    req.onerror = ()=>reject(req.error);
  });
}

async function galleryDeleteImage(projId, name){
  const db = await openGalleryDB();
  const key = projId + '::' + name;
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(GALLERY_STORE, 'readwrite');
    tx.objectStore(GALLERY_STORE).delete(key);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}

async function galleryClearProject(projId){
  const all = await galleryGetAll(projId);
  const db = await openGalleryDB();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(GALLERY_STORE, 'readwrite');
    const store = tx.objectStore(GALLERY_STORE);
    all.forEach(item => store.delete(item.key));
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}

/* ═══════════════════════════════════════════════════════════
   MAKEUP REF IMAGES - stored in IndexedDB (sb_makeup), kept
   OUT of the project JSON so Export stays small. Scoped per
   project via projId. Text profile lives in proj._bd.makeupProfile.
═══════════════════════════════════════════════════════════ */
const MAKEUP_DB_NAME = 'sb_makeup';
const MAKEUP_STORE = 'images';

function openMakeupDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(MAKEUP_DB_NAME, 1);
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains(MAKEUP_STORE)){
        const store = db.createObjectStore(MAKEUP_STORE, {keyPath:'key'});
        store.createIndex('projId', 'projId', {unique:false});

/* ═══════════════════════════════════════════════════════════
   CLAUDE VISION — analyse a camera slate / label / field
   photo and return structured take data.
   API key stored in localStorage under 'sb_anthropic_key'.
   First use prompts once; never sent to any server.
═══════════════════════════════════════════════════════════ */
const SB_ANTHRO_KEY='sb_anthropic_key';
function getAnthropicKey(){
  let k=(localStorage.getItem(SB_ANTHRO_KEY)||'').trim();
  if(k) return k;
  k=(prompt('Enter your Anthropic API key to enable AI photo analysis.\nIt is saved only in this browser (localStorage) and never sent anywhere except api.anthropic.com.\n\nKey (starts with sk-ant-):')||'').trim();
  if(!k) throw new Error('API key required.');
  if(!k.startsWith('sk-ant-')) throw new Error('Key should start with sk-ant-');
  localStorage.setItem(SB_ANTHRO_KEY,k);
  return k;
}
function clearAnthropicKey(){ localStorage.removeItem(SB_ANTHRO_KEY); }

async function analyseCameraSlate(dataUrlOrArray, existingRoll){
  const key=getAnthropicKey();
  // Accept single dataUrl or array of up to 2
  const dataUrls=Array.isArray(dataUrlOrArray)?dataUrlOrArray:[dataUrlOrArray];
  const imageBlocks=dataUrls.map(function(du){
    const m=du.match(/^data:(image\/[^;]+);base64,(.+)$/);
    if(!m)throw new Error('Invalid image format.');
    return {type:'image',source:{type:'base64',media_type:m[1],data:m[2]}};
  });

  // Build context clue from current roll so Claude can infer defaults / validate
  const rollCtx=existingRoll?[
    `Current roll: ${existingRoll.roll||''}, Camera: ${existingRoll.camera||''}, Codec: ${existingRoll.codec||''}, LUT: ${existingRoll.lut||''}.`,
    `Default lens: ${existingRoll.lens||''}. Base EI: ${existingRoll.baseEI||''}.`
  ].join(' '):'';

  const multi=dataUrls.length>1;
  const prompt=[
    multi
      ? 'You are given TWO production photos. Extract information from BOTH and combine into one JSON — e.g. one photo may be a camera monitor overlay (EI, WB, FPS, clip number etc.) and the other a slate/clapperboard (scene, shot, take). Merge all readable fields.'
      : 'You are analysing a film production photo. It may be any of these sources:',
    multi?'':
      '  • A camera slate / clapperboard (scene, shot, take numbers)',
    multi?'':
      '  • A camera monitor / EVF overlay screenshot (e.g. SmallHD, Teradek, ARRI, RED) showing live camera metadata: FPS, shutter, EI/ISO, WB, roll name, clip number, ND filter, codec, timecode etc.',
    multi?'':
      '  • A handwritten take sheet or label',
    multi?'':
      '  • Any other on-set reference material with camera/take information',
    'Extract ONLY what is clearly visible. Never invent values. For monitor screenshots, read the HUD/overlay text carefully (usually displayed as white or coloured text around the image frame).',
    rollCtx,
    'Return a single JSON object (no markdown, no explanation) with these keys (all strings, all optional — omit any key you cannot read clearly):',
    '  scene   — scene number/ID (from slate, e.g. "S05", "05", "12A")',
    '  shot    — shot letter (from slate, e.g. "A", "B"); "/" means no shot letter',
    '  take    — take number as string (e.g. "1", "3")',
    '  tail    — "true" if TAIL or TAIL SLATE is visible',
    '  clip    — clip/card name visible on monitor (e.g. "C026", "A026") or slate',
    '  roll    — roll/magazine name if visible on monitor (e.g. "A001")',
    '  lens    — lens brand/series if visible (e.g. "Cooke Panchro i")',
    '  focal   — focal length if visible (e.g. "32mm")',
    '  stop    — aperture/T-stop if visible (e.g. "T2.8", "f4")',
    '  ei      — ISO/EI value from monitor or slate (e.g. "1600")',
    '  fps     — frame rate from monitor (e.g. "24.000", "25")',
    '  shutter — shutter angle/speed from monitor (e.g. "180.0", "1/50")',
    '  nd      — ND filter value from monitor if visible (e.g. "0.6", "ND6")',
    '  intFilters — internal/in-camera filter if visible',
    '  filters — external filter(s) if visible (e.g. "ND1.2", "Polariser")',
    '  wb      — white balance from monitor or slate (e.g. "4000K", "5600K")',
    '  focus   — focus distance if visible; use cm (e.g. "180")',
    '  codec   — codec/recording format from monitor (e.g. "RAW", "ProRes 4444")',
    '  notes   — any other relevant text (timecode, battery, remarks etc.)',
    multi
      ? 'Example: {"scene":"S05","shot":"A","take":"2","ei":"1600","wb":"4000K","fps":"24.000","clip":"C026"}'
      : 'Example for monitor: {"ei":"1600","wb":"4000K","fps":"24.000","shutter":"180.0","clip":"C026","codec":"RAW"}',
    'Return ONLY the JSON object.'
  ].filter(Boolean).join('\n');

  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1024,
      messages:[{role:'user',content:[
        ...imageBlocks,
        {type:'text',text:prompt}
      ]}]
    })
  });

  if(!resp.ok){
    const e=await resp.json().catch(()=>({}));
    throw new Error(e?.error?.message||'Anthropic API error '+resp.status);
  }
  const data=await resp.json();
  const raw=(data.content?.find(b=>b.type==='text')?.text||'').trim();
  const clean=raw.replace(/^```json?/,'').replace(/```$/,'').trim();
  try{
    const parsed=JSON.parse(clean);
    if(typeof parsed==='object'&&parsed!==null) return parsed;
    throw new Error('Unexpected response shape.');
  }catch(e){
    throw new Error('Could not parse AI response. Raw: '+raw.slice(0,200));
  }
}

/* ═══════════════════════════════════════════════════════════
   FILENAME PARSER - same logic as standalone Shot Reference
   Viewer, with configurable rules persisted to localStorage
═══════════════════════════════════════════════════════════ */
const GALLERY_RULES_KEY = 'sb_gallery_parse_rules';
const GALLERY_DEFAULT_RULES = {
  delimiter: '_',
  prefixes: 'S, Scene, EP',
  groupSegment: 1,
  sortSegment: 2,
};

function loadGalleryRules(){
  try {
    const saved = localStorage.getItem(GALLERY_RULES_KEY);
    if(saved) return { ...GALLERY_DEFAULT_RULES, ...JSON.parse(saved) };
  } catch(e){}
  return { ...GALLERY_DEFAULT_RULES };
}

function saveGalleryRules(rules){
  try { localStorage.setItem(GALLERY_RULES_KEY, JSON.stringify(rules)); }
  catch(e){ console.warn('Could not save gallery rules', e); }
}

function parseGalleryFilename(name, rules){
  rules = rules || GALLERY_DEFAULT_RULES;
  const base = name.replace(/\.[^.]+$/, '');

  let s = base;
  const prefixList = (rules.prefixes||'').split(',').map(p=>p.trim()).filter(Boolean);
  for(const prefix of prefixList){
    const re = new RegExp('^' + prefix.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\s*', 'i');
    if(re.test(s)){ s = s.replace(re, ''); break; }
  }

  const delim = rules.delimiter || '_';
  const delimEscaped = delim.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const segments = s.split(new RegExp(delimEscaped + '+')).filter(seg => seg !== '');

  const gIdx = (rules.groupSegment||1) - 1;
  const sIdx = (rules.sortSegment||2) - 1;

  const groupRaw = segments[gIdx];
  const sortRaw = segments[sIdx];
  const groupNum = groupRaw!=null ? parseInt(groupRaw, 10) : NaN;
  const sortNum = sortRaw!=null ? parseInt(sortRaw, 10) : NaN;

  if(!isNaN(groupNum)){
    const descSegments = segments.filter((_, i) => i!==gIdx && i!==sIdx);
    const desc = descSegments.join(' ').trim();
    return { sceneNum: groupNum, shotNum: isNaN(sortNum)?0:sortNum, desc, raw: name, valid: true };
  }
  return { sceneNum: null, shotNum: 0, desc: base, raw: name, valid: false };
}

// Compress image client-side before storing (keeps IndexedDB usage reasonable)
function compressGalleryImage(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e)=>{ img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = ()=>{
      let { width, height } = img;
      if(width > maxDim || height > maxDim){
        if(width > height){ height = Math.round(height * maxDim / width); width = maxDim; }
        else { width = Math.round(width * maxDim / height); height = maxDim; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function fbSaveCloudGalleryItem(projId, item){
  const db = getFirestore();
  const ref = db.collection('gallery_cloud').doc(projId);
  const snap = await ref.get();
  const existing = snap.exists ? (snap.data().images || []) : [];
  const filtered = existing.filter(i => i.name !== item.name);
  await ref.set({
    images: [...filtered, item],
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
}

async function fbDeleteCloudGalleryItem(projId, name){
  const db = getFirestore();
  const ref = db.collection('gallery_cloud').doc(projId);
  const snap = await ref.get();
  if(!snap.exists) return;
  const existing = snap.data().images || [];
  await ref.set({
    images: existing.filter(i => i.name !== name),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
}

function fbSubscribeCloudGallery(projId, callback){
  try {
    const db = getFirestore();
    return db.collection('gallery_cloud').doc(projId).onSnapshot(doc=>{
      callback(doc.exists ? (doc.data().images || []) : []);
    }, ()=>callback([]));
  } catch(e){ console.warn('Cloud gallery subscribe error:', e); return ()=>{}; }
}

/* ═══════════════════════════════════════════════════════════
   SHOT GALLERY TAB - bulk-imported reference images, scoped
   to the current project, filterable by scene number or
   shoot location (reuses proj.locations/scene.locationId)
═══════════════════════════════════════════════════════════ */
function ShotGalleryTab({focusScene}){
  const {proj} = useProj();
  const mob = useMobile();
  const projId = proj._id || 'default';

  const [localImages, setLocalImages] = React.useState([]);
  const [cloudImages, setCloudImages] = React.useState([]);
  const [cloudStatus, setCloudStatus] = React.useState('offline'); // offline|live
  const [loading, setLoading] = React.useState(true);
  const [filterLoc, setFilterLoc] = React.useState('all');
  const [filterSrc, setFilterSrc] = React.useState('all'); // all|local|cloud
  const [search, setSearch] = React.useState('');
  const [lightbox, setLightbox] = React.useState(null);
  const [showUpload, setShowUpload] = React.useState(false);
  const [showRules, setShowRules] = React.useState(false);
  const [rules, setRules] = React.useState(loadGalleryRules);

  // Load local (IndexedDB) images for this project
  const reloadLocal = React.useCallback(()=>{
    setLoading(true);
    galleryGetAll(projId).then(list=>{
      setLocalImages(list.map(img => ({...img, source:'local', dataUrl: img.dataUrl})));
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[projId]);

  React.useEffect(()=>{ reloadLocal(); },[reloadLocal]);

  // Subscribe to cloud (Firestore + Cloudinary) images, shared across team
  React.useEffect(()=>{
    const unsub = fbSubscribeCloudGallery(projId, (list)=>{
      setCloudImages(list.map(img => ({...img, source:'cloud', dataUrl: img.url})));
      setCloudStatus('live');
    });
    return ()=> unsub && unsub();
  },[projId]);

  // When arriving from another view focused on a scene, auto-filter to its number
  React.useEffect(()=>{
    if(focusScene){
      const num = String(focusScene).replace(/\D/g,'').replace(/^0+/,'') || '0';
      setSearch(num);
      setFilterLoc('all');
    }
  },[focusScene]);

  const images = React.useMemo(()=>{
    const merged = [...localImages, ...cloudImages];
    merged.sort((a,b)=>{
      const sa = a.sceneNum ?? 99999, sb = b.sceneNum ?? 99999;
      if(sa !== sb) return sa - sb;
      return (a.shotNum||0) - (b.shotNum||0);
    });
    return merged;
  },[localImages, cloudImages]);

  // Map scene number -> locationId, so gallery images (which only know
  // their scene number) can be filtered by the same locations used
  // elsewhere in ScriptBreaker
  const sceneToLoc = React.useMemo(()=>{
    const map = {};
    (proj.scenes||[]).forEach(s=>{
      const num = parseInt(String(s.id).replace(/\D/g,''), 10);
      if(!isNaN(num)) map[num] = s.locationId;
    });
    return map;
  },[proj.scenes]);

  const filtered = React.useMemo(()=>{
    let list = images;
    if(filterSrc!=='all') list = list.filter(img => img.source===filterSrc);
    if(filterLoc!=='all'){
      list = list.filter(img => sceneToLoc[img.sceneNum] === filterLoc);
    }
    if(search.trim()){
      const q = search.trim().toLowerCase();
      list = list.filter(img =>
        String(img.sceneNum).includes(q) ||
        (img.desc||'').toLowerCase().includes(q) ||
        (img.raw||'').toLowerCase().includes(q)
      );
    }
    return list;
  },[images, filterLoc, filterSrc, search, sceneToLoc]);

  const sceneNumbers = React.useMemo(()=>{
    const set = new Set(images.map(i=>i.sceneNum).filter(n=>n!=null));
    return Array.from(set).sort((a,b)=>a-b);
  },[images]);

  async function handleDelete(img){
    if(img.source==='cloud') await fbDeleteCloudGalleryItem(projId, img.name);
    else await galleryDeleteImage(projId, img.name);
    reloadLocal();
  }

  async function handleClearAll(){
    await galleryClearProject(projId);
    reloadLocal();
  }

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}}>

      <div style={{padding:mob?'6px 8px':'6px 20px',borderBottom:`1px solid ${T.rule}`,

        <div style={{display:'flex',gap:6,alignItems:'center',overflowX:'auto',flex:1}}>
          {[{id:'all',name:'All'},...(proj.locations||[])].map(l=>(
            <button key={l.id} onClick={()=>setFilterLoc(l.id)}
              style={{padding:'3px 10px',borderRadius:4,fontSize:10,
                fontFamily:"'Geist Mono',monospace",
                background:filterLoc===l.id?T.accent+'22':T.chip,
                color:filterLoc===l.id?T.accent:T.textMute,
                border:`1px solid ${filterLoc===l.id?T.accent+'44':T.border}`,
                whiteSpace:'nowrap'}}>
              {(l.name||'All').toUpperCase()}
            </button>
          ))}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:99,
          background:cloudStatus==='live'?T.success+'18':T.surface2,
          border:`1px solid ${cloudStatus==='live'?T.success+'44':T.border}`}}>
          <div style={{width:5,height:5,borderRadius:'50%',
            background:cloudStatus==='live'?T.success:T.textDim}}/>
          <span style={{fontFamily:"'Geist Mono',monospace",fontSize:8,
            color:cloudStatus==='live'?T.success:T.textDim}}>
            {cloudStatus==='live'?'CLOUD LIVE':'CLOUD OFFLINE'}
          </span>
        </div>
        <Mono s={{color:T.textDim,fontSize:9}}>{images.length} IMAGES</Mono>
      </div>

      {/* Search + scene strip + actions */}
      <div style={{padding:mob?'6px 8px':'6px 20px',borderBottom:`1px solid ${T.rule}`,
        display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search scene, description..."
          style={{flex:1,minWidth:140,background:T.surface2,border:`1px solid ${T.border}`,
            borderRadius:5,padding:'5px 10px',fontSize:11,color:T.text}}/>
        <select value={filterSrc} onChange={e=>setFilterSrc(e.target.value)}
          style={{background:T.surface2,border:`1px solid ${T.border}`,borderRadius:5,
            padding:'5px 8px',fontSize:10,color:T.text,fontFamily:"'Geist Mono',monospace"}}>
          <option value="all">All sources</option>
          <option value="local">📍 Local only</option>
          <option value="cloud">☁ Cloud only</option>
        </select>
        <button onClick={()=>setShowRules(true)}
          style={{padding:'5px 10px',background:'transparent',border:`1px solid ${T.border}`,
            borderRadius:5,color:T.textDim,fontSize:10,fontFamily:"'Geist Mono',monospace"}}>
          ⚙ Rules
        </button>
        <button onClick={()=>setShowUpload(true)}
          style={{padding:'5px 14px',background:T.accent,border:'none',borderRadius:5,
            color:'#0e0d0b',fontSize:11,fontWeight:600}}>
          + Upload
        </button>
      </div>

      {/* Scene quick-jump */}
      {sceneNumbers.length>0 && (
        <div style={{padding:mob?'6px 8px':'6px 20px',borderBottom:`1px solid ${T.rule}`,
          display:'flex',gap:5,overflowX:'auto'}}>
          {sceneNumbers.map(n=>(
            <button key={n} onClick={()=>setSearch(String(n))}
              style={{padding:'2px 9px',borderRadius:99,fontSize:9,whiteSpace:'nowrap',
                background:'transparent',border:`1px solid ${T.border}`,color:T.textMute,
                fontFamily:"'Geist Mono',monospace"}}>
              S{n}
            </button>
          ))}
        </div>
      )}

      {/* Grid */}
      <div style={{flex:1,overflow:'auto',padding:mob?10:'14px 20px'}}>
        {loading && (
          <div style={{textAlign:'center',padding:50,color:T.textDim,fontSize:11}}>Loading...</div>
        )}
        {!loading && filtered.length===0 && (
          <Empty icon="🎞" title={images.length===0?"No gallery images yet":"No matches"}
            sub={images.length===0?"Tap + Upload to batch-import shot references":"Try a different filter or search"}/>
        )}
        <div style={{display:'grid',gridTemplateColumns:mob?'repeat(2,1fr)':'repeat(auto-fill,minmax(170px,1fr))',gap:mob?8:12}}>
          {filtered.map((img, idx)=>(
            <GalleryThumb key={(img.source||'local')+'_'+img.name} img={img} onClick={()=>setLightbox(idx)}/>
          ))}

      </div>

      {lightbox!==null && (
        <GalleryLightbox images={filtered} index={lightbox}
          onClose={()=>setLightbox(null)} onNav={setLightbox}
          onDelete={handleDelete} mob={mob}/>

      {showUpload && (
        <GalleryUploadModal projId={projId} rules={rules}
          onClose={()=>{setShowUpload(false); reloadLocal();}}
          onClearAll={handleClearAll} mob={mob}/>

      {showRules && (
        <GalleryRulesModal rules={rules}
          onSave={(r)=>{setRules(r); saveGalleryRules(r); reloadLocal();}}
          onClose={()=>setShowRules(false)}/>
      )}
    </div>
  );
}

function GalleryLightbox({images, index, onClose, onNav, onDelete, mob}){
  const img = images[index];
  const touchStart = React.useRef(null);

  React.useEffect(()=>{
    function onKey(e){
      if(e.key==='Escape') onClose();
      if(e.key==='ArrowLeft' && index>0) onNav(index-1);
      if(e.key==='ArrowRight' && index<images.length-1) onNav(index+1);
    }
    window.addEventListener('keydown', onKey);
    return ()=>window.removeEventListener('keydown', onKey);
  },[index, images.length]);

  function onTouchStart(e){ touchStart.current = e.touches[0].clientX; }
  function onTouchEnd(e){
    if(touchStart.current==null) return;
    const dx = e.changedTouches[0].clientX - touchStart.current;
    if(dx > 60 && index>0) onNav(index-1);
    if(dx < -60 && index<images.length-1) onNav(index+1);
    touchStart.current = null;
  }

  if(!img) return null;

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(8,7,6,0.97)',zIndex:9000,
      display:'flex',flexDirection:'column'}}
      onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      <div style={{flexShrink:0,padding:mob?'10px 12px':'14px 24px',
        paddingTop: mob ? 'max(10px,env(safe-area-inset-top))' : undefined,
        display:'flex',alignItems:'center',gap:10}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:11,color:T.accent,fontWeight:600}}>
            SCENE {img.sceneNum}{img.shotNum?` · SHOT ${img.shotNum}`:''}
          </div>
          <div style={{fontSize:mob?11:13,color:T.textMute,marginTop:2,overflow:'hidden',
            textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {img.desc||'untitled'}
          </div>
        </div>
        <div style={{fontSize:10,color:T.textDim,flexShrink:0}}>{index+1}/{images.length}</div>
        <button onClick={()=>{onDelete(img); onClose();}}
          style={{flexShrink:0,width:32,height:32,borderRadius:'50%',background:T.surface2,
            border:`1px solid ${T.danger}44`,color:T.danger,fontSize:13,
            display:'grid',placeItems:'center'}}>🗑</button>
        <button onClick={onClose}
          style={{flexShrink:0,width:32,height:32,borderRadius:'50%',background:T.surface2,
            border:`1px solid ${T.border}`,color:T.textMute,fontSize:15,
            display:'grid',placeItems:'center'}}>x</button>
      </div>

      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',
        position:'relative',overflow:'hidden',padding: mob?'0 8px':'0 80px'}}>
        {!mob && index>0 && (
          <button onClick={()=>onNav(index-1)}
            style={{position:'absolute',left:16,top:'50%',transform:'translateY(-50%)',
              width:44,height:44,borderRadius:'50%',background:T.surface2,
              border:`1px solid ${T.border}`,color:T.text,fontSize:18,
              display:'grid',placeItems:'center'}}>‹</button>
        )}
        <img src={img.dataUrl} alt={img.desc}
          style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain',borderRadius:4}}/>
        {!mob && index<images.length-1 && (
          <button onClick={()=>onNav(index+1)}
            style={{position:'absolute',right:16,top:'50%',transform:'translateY(-50%)',
              width:44,height:44,borderRadius:'50%',background:T.surface2,
              border:`1px solid ${T.border}`,color:T.text,fontSize:18,
              display:'grid',placeItems:'center'}}>›</button>
        )}
      </div>

      {mob && (
        <div style={{flexShrink:0,padding:'10px 16px',
          paddingBottom:'max(10px,env(safe-area-inset-bottom))',display:'flex',gap:10}}>
          <button onClick={()=>index>0&&onNav(index-1)} disabled={index===0}
            style={{flex:1,padding:'10px 0',background:T.surface2,border:`1px solid ${T.border}`,
              borderRadius:8,color:index===0?T.textDim:T.text,fontSize:13}}>‹ Prev</button>
          <button onClick={()=>index<images.length-1&&onNav(index+1)} disabled={index===images.length-1}
            style={{flex:1,padding:'10px 0',background:T.surface2,border:`1px solid ${T.border}`,
              borderRadius:8,color:index===images.length-1?T.textDim:T.text,fontSize:13}}>Next ›</button>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   GALLERY UPLOAD MODAL - batch import with filename parsing
═══════════════════════════════════════════════════════════ */
function GalleryUploadModal({projId, rules, onClose, onClearAll, mob}){
  const [files, setFiles] = React.useState([]);
  const [dragOver, setDragOver] = React.useState(false);
  const [uploading, setUploading] = React.useState(false);
  const [done, setDone] = React.useState(0);
  const [target, setTarget] = React.useState('local'); // 'local' | 'cloud'
  const fileInputRef = React.useRef(null);

  function handleFiles(fileList){
    const arr = Array.from(fileList).filter(f => GALLERY_IMG_EXT.test(f.name));
    const parsed = arr.map(f => ({
      file: f,
      parsed: parseGalleryFilename(f.name, rules),
      status: 'pending',
      previewUrl: URL.createObjectURL(f),
    }));
    setFiles(prev => [...prev, ...parsed]);
  }

  function onDrop(e){ e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); }
  function removeFile(idx){ setFiles(prev => prev.filter((_,i)=>i!==idx)); }
  function updateParsed(idx, patch){
    setFiles(prev => prev.map((f,i)=> i===idx ? {...f, parsed:{...f.parsed,...patch}} : f));
  }

  async function uploadAll(){
    setUploading(true); setDone(0);
    for(let i=0; i<files.length; i++){
      const item = files[i];
      if(item.status==='done'){ setDone(d=>d+1); continue; }
      setFiles(prev => prev.map((f,idx)=> idx===i ? {...f,status:'uploading'} : f));
      try {
        if(target==='cloud'){
          const {url, thumbUrl, publicId} = await uploadToCloudinary(item.file);
          await fbSaveCloudGalleryItem(projId, {
            name: item.file.name,
            sceneNum: item.parsed.sceneNum,
            shotNum: item.parsed.shotNum,
            desc: item.parsed.desc,
            raw: item.file.name,
            url, thumbUrl, publicId,
          });
        } else {
          const dataUrl = await compressGalleryImage(item.file, 1400, 0.82);
          await galleryPutImage(projId, {
            name: item.file.name,
            sceneNum: item.parsed.sceneNum,
            shotNum: item.parsed.shotNum,
            desc: item.parsed.desc,
            raw: item.file.name,
            dataUrl,
          });
        }
        setFiles(prev => prev.map((f,idx)=> idx===i ? {...f,status:'done'} : f));
        setDone(d=>d+1);
      } catch(e){
        console.error('Gallery upload error:', e);
        setFiles(prev => prev.map((f,idx)=> idx===i ? {...f,status:'error'} : f));
      }
    }
    setUploading(false);
  }

  const allDone = files.length>0 && files.every(f=>f.status==='done');
  const invalidCount = files.filter(f=>!f.parsed.valid).length;

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(8,7,6,0.8)',zIndex:9500,
      display:'flex',alignItems:mob?'flex-end':'center',justifyContent:'center'}}
      onClick={e=>{if(e.target===e.currentTarget && !uploading)onClose();}}>
      <div style={{background:T.panel,border:`1px solid ${T.borderHi}`,
        borderRadius:mob?'16px 16px 0 0':14,width:mob?'100%':620,
        maxHeight:mob?'90vh':'82vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>

        <div style={{padding:'14px 18px',borderBottom:`1px solid ${T.rule}`,
          display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
          <span style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',
            fontSize:17,color:T.text,flex:1}}>Upload Shot References</span>
          {!uploading && <button onClick={onClose}
            style={{color:T.textDim,fontSize:17,background:'transparent',border:'none'}}>x</button>}
        </div>

        {/* Storage target switcher */}
        <div style={{padding:'10px 18px',borderBottom:`1px solid ${T.rule}`,
          display:'flex',gap:8,alignItems:'center',flexShrink:0}}>
          <span style={{fontSize:9,color:T.textDim,letterSpacing:'0.06em'}}>SAVE TO</span>
          <button onClick={()=>!uploading && setTarget('local')}
            style={{padding:'5px 12px',borderRadius:6,fontSize:11,
              background:target==='local'?T.accent+'22':T.surface2,
              border:`1px solid ${target==='local'?T.accent:T.border}`,
              color:target==='local'?T.accent:T.textMute}}>
            📍 This device only
          </button>
          <button onClick={()=>!uploading && setTarget('cloud')}
            style={{padding:'5px 12px',borderRadius:6,fontSize:11,
              background:target==='cloud'?T.accent+'22':T.surface2,
              border:`1px solid ${target==='cloud'?T.accent:T.border}`,
              color:target==='cloud'?T.accent:T.textMute}}>
            ☁ Cloud (team-shared)
          </button>
        </div>
        {target==='cloud' && (
          <div style={{padding:'6px 18px',background:T.info+'10',fontSize:9,color:T.textMute,flexShrink:0}}>
            Images saved here will be visible to anyone with access to this project's data.
          </div>
        )}

        <div style={{flex:1,overflow:'auto',padding:'14px 18px'}}>
          {files.length===0 && (
            <div onDragOver={e=>{e.preventDefault();setDragOver(true);}}
              onDragLeave={()=>setDragOver(false)} onDrop={onDrop}
              onClick={()=>fileInputRef.current?.click()}
              style={{border:`2px dashed ${dragOver?T.accent:T.border}`,borderRadius:10,
                padding:mob?'36px 14px':'52px 18px',textAlign:'center',cursor:'pointer',
                background:dragOver?T.accent+'10':'transparent'}}>
              <div style={{fontSize:32,opacity:0.3,marginBottom:8}}>📁</div>
              <div style={{fontSize:12,color:T.textMute}}>
                {mob ? 'Tap to select photos' : 'Drag images here or click to browse'}
              </div>
              <div style={{fontSize:9,color:T.textDim,marginTop:6}}>
                Filenames like "60_3_description.png" auto-detect scene + shot
              </div>
            </div>
          )}
          <input ref={fileInputRef} type="file" accept="image/*" multiple
            onChange={e=>handleFiles(e.target.files)} style={{display:'none'}}/>

          {files.length>0 && (
            <>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <div style={{fontSize:10,color:T.textMute}}>
                  {files.length} files{invalidCount>0 && <span style={{color:T.danger}}> · {invalidCount} need review</span>}
                </div>
                {!uploading && <button onClick={()=>fileInputRef.current?.click()}
                  style={{fontSize:10,color:T.info,background:'transparent',border:'none'}}>+ Add more</button>}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:5}}>
                {files.map((item, idx)=>(
                  <GalleryFileRow key={idx} item={item}
                    onRemove={()=>removeFile(idx)}
                    onUpdate={(p)=>updateParsed(idx,p)}
                    disabled={uploading}/>
                ))}
              </div>
            </>
          )}
        </div>

        {files.length>0 && (
          <div style={{padding:'12px 18px',borderTop:`1px solid ${T.rule}`,
            display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
            {uploading && <div style={{flex:1,fontSize:10,color:T.textMute}}>Uploading {done}/{files.length}...</div>}
            {!uploading && !allDone && <div style={{flex:1,fontSize:10,color:T.textDim}}>Ready to upload {files.length} image{files.length>1?'s':''}</div>}
            {allDone && <div style={{flex:1,fontSize:10,color:T.success}}>✓ All uploaded</div>}
            {!allDone ? (
              <button onClick={uploadAll} disabled={uploading||files.length===0}
                style={{padding:'8px 18px',background:T.accent,border:'none',borderRadius:6,
                  color:'#0e0d0b',fontSize:11,fontWeight:600,opacity:uploading?0.6:1}}>
                {uploading?'Uploading...':`Upload ${files.length}`}
              </button>
            ) : (
              <button onClick={onClose}
                style={{padding:'8px 18px',background:T.accent,border:'none',borderRadius:6,
                  color:'#0e0d0b',fontSize:11,fontWeight:600}}>Done</button>
            )}
          </div>
        )}

        {files.length===0 && (
          <div style={{padding:'10px 18px',borderTop:`1px solid ${T.rule}`,flexShrink:0}}>
            <button onClick={()=>{ if(confirm('Delete all gallery images for this project? This cannot be undone.')) onClearAll(); }}
              style={{fontSize:10,color:T.danger,background:'transparent',border:'none'}}>
              Clear all gallery images for this project
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function GalleryFileRow({item, onRemove, onUpdate, disabled}){
  const [editing, setEditing] = React.useState(false);
  const p = item.parsed;
  const statusIcon = {
    pending: null,
    uploading: <div style={{width:11,height:11,border:`2px solid ${T.info}`,borderTopColor:'transparent',borderRadius:'50%'}}/>,
    done: <span style={{color:T.success,fontSize:12}}>✓</span>,
    error: <span style={{color:T.danger,fontSize:12}}>✕</span>,
  }[item.status];

  return (
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',
      background:T.surface2,border:`1px solid ${p.valid?T.border:T.danger}`,borderRadius:7}}>
      <img src={item.previewUrl} alt="" style={{width:38,height:38,objectFit:'cover',borderRadius:4,flexShrink:0}}/>
      <div style={{flex:1,minWidth:0}}>
        {!editing ? (
          <>
            <div style={{fontSize:10,fontWeight:600,color:p.valid?T.accent:T.danger}}>
              {p.valid ? `S${p.sceneNum}${p.shotNum?'.'+p.shotNum:''}` : 'Unparsed - tap to set'}
            </div>
            <div style={{fontSize:9,color:T.textDim,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {p.desc || item.file.name}
            </div>
          </>
        ) : (
          <div style={{display:'flex',gap:5}}>
            <input type="number" placeholder="Scene" value={p.sceneNum||''}
              onChange={e=>onUpdate({sceneNum:e.target.value?parseInt(e.target.value):null,valid:true})}
              style={{width:50,background:T.bg,border:`1px solid ${T.border}`,borderRadius:4,padding:'3px 5px',fontSize:10,color:T.text}}/>
            <input type="number" placeholder="Shot" value={p.shotNum||''}
              onChange={e=>onUpdate({shotNum:e.target.value?parseInt(e.target.value):0})}
              style={{width:42,background:T.bg,border:`1px solid ${T.border}`,borderRadius:4,padding:'3px 5px',fontSize:10,color:T.text}}/>
            <input type="text" placeholder="Description" value={p.desc||''}
              onChange={e=>onUpdate({desc:e.target.value})}
              style={{flex:1,background:T.bg,border:`1px solid ${T.border}`,borderRadius:4,padding:'3px 5px',fontSize:10,color:T.text,minWidth:0}}/>
          </div>
        )}
      </div>
      {statusIcon}
      {!disabled && (
        <>
          <button onClick={()=>setEditing(e=>!e)} style={{color:T.textDim,fontSize:10,background:'transparent',border:'none',flexShrink:0}}>{editing?'✓':'✎'}</button>
          <button onClick={onRemove} style={{color:T.textDim,fontSize:13,background:'transparent',border:'none',flexShrink:0}}>x</button>
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   GALLERY RULES MODAL - configure filename parsing
═══════════════════════════════════════════════════════════ */
function GalleryRulesModal({rules, onSave, onClose}){
  const [delimiter, setDelimiter] = React.useState(rules.delimiter);
  const [prefixes, setPrefixes] = React.useState(rules.prefixes);
  const [groupSegment, setGroupSegment] = React.useState(rules.groupSegment);
  const [sortSegment, setSortSegment] = React.useState(rules.sortSegment);
  const [sample, setSample] = React.useState('60_3_cu_hand_on_static.png');

  const draftRules = { delimiter, prefixes, groupSegment:Number(groupSegment), sortSegment:Number(sortSegment) };
  const preview = parseGalleryFilename(sample, draftRules);

  function handleSave(){ onSave(draftRules); onClose(); }
  function handleReset(){
    setDelimiter(GALLERY_DEFAULT_RULES.delimiter);
    setPrefixes(GALLERY_DEFAULT_RULES.prefixes);
    setGroupSegment(GALLERY_DEFAULT_RULES.groupSegment);
    setSortSegment(GALLERY_DEFAULT_RULES.sortSegment);
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(8,7,6,0.8)',zIndex:9600,
      display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:T.panel,border:`1px solid ${T.borderHi}`,borderRadius:12,
        width:'100%',maxWidth:480,maxHeight:'85vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>

        <div style={{padding:'14px 18px',borderBottom:`1px solid ${T.rule}`,
          display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
          <span style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',

}

/* ═══════════════════════════════════════════════════════════
   NAV BACK BADGE — floats top-right when user jumped here
   from another view (e.g. Daily). Shows "← Daily · SC XX".
   Clicking returns to the origin view and restores context.
═══════════════════════════════════════════════════════════ */
function NavBackBadge(){
  const {navFrom, navigateBack}=useProj();
  if(!navFrom) return null;
  const label=navFrom.label||navFrom.view;
  return(
    <button onClick={navigateBack}
      style={{position:'fixed',top:14,right:16,zIndex:9000,
        display:'inline-flex',alignItems:'center',gap:6,
        padding:'6px 12px',borderRadius:99,
        background:T.panel,border:`1px solid ${T.accent}55`,
        color:T.accent,fontSize:11,fontFamily:"'Geist Mono',monospace",
        letterSpacing:'0.08em',cursor:'pointer',
        boxShadow:'0 2px 12px rgba(0,0,0,0.35)',
        backdropFilter:'blur(8px)',
        transition:'background 0.15s'}}
      onMouseEnter={e=>{e.currentTarget.style.background=T.accent+'22';}}
      onMouseLeave={e=>{e.currentTarget.style.background=T.panel;}}>
      {'\u2190'} {label}
    </button>
  );
}
