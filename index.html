/* ═══ NotesPicker — text input with quick-select preset list ═══ */
function NotesPicker({value,onChange}){
  const [open,setOpen]=React.useState(false);
  const [fixPos,setFixPos]=React.useState({top:0,left:0,width:240});
  const wrapRef=React.useRef(null);
  const presets=React.useMemo(()=>{
    try{return JSON.parse(localStorage.getItem(SB_NOTE_PRESETS_KEY)||'[]');}catch{return[];}
  },[open]);

  // Split the note field into tokens separated by "; ". A token can be a
  // preset OR free text — both coexist. Trailing empty tokens (from a
  // dangling delimiter) are stripped.
  function parseTokens(v){
    return String(v||'').split(';').map(s=>s.trim()).filter(Boolean);
  }
  function joinTokens(tokens){
    return tokens.join('; ');
  }
  // Toggle a preset: if it's already among the tokens, remove it; otherwise
  // append it. Anything the user typed manually (free text tokens) is
  // preserved untouched.
  function togglePreset(p){
    const tokens=parseTokens(value);
    const idx=tokens.indexOf(p);
    let next;
    if(idx>=0){ next=tokens.filter((_,i)=>i!==idx); }
    else{ next=[...tokens,p]; }
    onChange(joinTokens(next));
  }
  const selectedTokens=parseTokens(value);

  function openPicker(){
    if(!wrapRef.current||presets.length===0)return;
    const r=wrapRef.current.getBoundingClientRect();
    const up=window.innerHeight-r.bottom<200&&r.top>window.innerHeight-r.bottom;
    setFixPos({top:up?undefined:r.bottom+2,bottom:up?(window.innerHeight-r.top+2):undefined,left:r.left,width:Math.max(r.width,240)});
    setOpen(true);
  }
  React.useEffect(()=>{
    if(!open)return;
    const fn=e=>{if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',fn); document.addEventListener('touchstart',fn);
    return()=>{document.removeEventListener('mousedown',fn); document.removeEventListener('touchstart',fn);};
  },[open]);

  return(
    <div ref={wrapRef} style={{position:'relative',width:'100%'}}>
      <input value={value||''} onChange={e=>onChange(e.target.value)} onFocus={openPicker}
        style={{background:'transparent',border:'none',padding:'8px 6px',fontSize:12,
          color:T.text,width:'100%',fontFamily:"'Geist Mono',monospace"}}/>
      {open&&presets.length>0&&(
        <div style={{position:'fixed',top:fixPos.top,bottom:fixPos.bottom,left:fixPos.left,
          width:fixPos.width,zIndex:9500,maxHeight:260,overflowY:'auto',
          background:T.panel,border:`1px solid ${T.border}`,borderRadius:7,boxShadow:'0 8px 24px rgba(0,0,0,0.5)'}}>
          <div style={{padding:'5px 10px 3px',display:'flex',alignItems:'center',gap:8}}>
            <span style={{flex:1,fontSize:8,fontFamily:"'Geist Mono',monospace",color:T.textDim,letterSpacing:'0.08em'}}>QUICK SELECT {'\u00B7'} TAP TO TOGGLE</span>
            <button type="button" onMouseDown={e=>{e.preventDefault();setOpen(false);}}
              style={{fontSize:9,color:T.textDim,background:'transparent',border:`1px solid ${T.border}`,
                borderRadius:3,padding:'2px 7px',cursor:'pointer',fontFamily:"'Geist Mono',monospace"}}>done</button>
          </div>
          {presets.map((p,i)=>{
            const sel=selectedTokens.includes(p);
            return(
              <button key={i} type="button" onMouseDown={e=>{e.preventDefault();togglePreset(p);}}
                style={{display:'flex',alignItems:'center',gap:8,width:'100%',textAlign:'left',padding:'9px 13px',
                  background:sel?T.accent+'18':'transparent',border:'none',borderBottom:`1px solid ${T.rule}`,
                  color:sel?T.accent:T.text,fontSize:12,fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}>
                <span style={{width:16,height:16,borderRadius:3,flexShrink:0,display:'grid',placeItems:'center',fontSize:10,fontWeight:600,
                  background:sel?T.accent:T.surface2,border:`1px solid ${sel?T.accent:T.border}`,color:sel?'#0e0d0b':T.textDim}}>
                  {sel?'\u2713':''}
                </span>
                <span style={{flex:1}}>{p}</span>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ═══ Generic PresetsModal — one modal drives every field's dropdown
   options list (notes, focal, stop, filter 2, and future fields).
   Config: {title, storageKey, defaults, placeholder, normalize} ═══ */
function PresetsModal({config,onClose,onSaved}){
  const {title,storageKey,defaults,placeholder,normalize}=config;
  const hasDefaults=Array.isArray(defaults)&&defaults.length>0;
  const [items,setItems]=React.useState(()=>{
    try{const v=JSON.parse(localStorage.getItem(storageKey)||'null');
      if(Array.isArray(v)&&v.length)return v;
      return hasDefaults?defaults:[];
    }catch{return hasDefaults?defaults:[];}
  });
  const [draft,setDraft]=React.useState('');
  function save(next){setItems(next);localStorage.setItem(storageKey,JSON.stringify(next));onSaved&&onSaved(next);}
  function add(){let v=draft.trim();if(!v)return;if(normalize)v=normalize(v);if(items.includes(v))return;save([...items,v]);setDraft('');}
  function remove(i){save(items.filter((_,idx)=>idx!==i));}
  function moveUp(i){if(i===0)return;const n=[...items];[n[i-1],n[i]]=[n[i],n[i-1]];save(n);}
  function resetDefaults(){if(confirm('Reset '+title+' to defaults?'))save(defaults||[]);}
  return(
    <div style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(0,0,0,0.72)',
      display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:10,
        width:'100%',maxWidth:360,maxHeight:'78vh',overflow:'auto',
        boxShadow:'0 16px 48px rgba(0,0,0,0.6)',display:'flex',flexDirection:'column'}}>
        <div style={{padding:'12px 16px',borderBottom:`1px solid ${T.rule}`,display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:13,fontWeight:600,color:T.text,flex:1}}>{title}</span>
          {hasDefaults&&<button onClick={resetDefaults} style={{fontSize:9,color:T.textDim,background:'transparent',border:`1px solid ${T.border}`,borderRadius:4,padding:'3px 7px',cursor:'pointer',fontFamily:"'Geist Mono',monospace"}}>reset</button>}
          <button onClick={onClose} style={{background:'transparent',border:'none',color:T.textDim,fontSize:18,cursor:'pointer',lineHeight:1}}>{'\u00D7'}</button>
        </div>
        <div style={{padding:14,flex:1,overflow:'auto'}}>
          <div style={{display:'flex',gap:6,marginBottom:12}}>
            <input value={draft} onChange={e=>setDraft(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&add()} placeholder={placeholder||'Add an option...'}
              style={{flex:1,background:T.surface2,border:`1px solid ${T.border}`,borderRadius:5,
                padding:'7px 10px',fontSize:12,color:T.text,fontFamily:"'Geist Mono',monospace"}}/>
            <button onClick={add} style={{padding:'7px 14px',borderRadius:5,background:T.accent,
              border:'none',color:'#0e0d0b',fontWeight:600,fontSize:12,cursor:'pointer'}}>Add</button>
          </div>
          {items.length===0&&<div style={{fontSize:11,color:T.textDim,fontStyle:'italic'}}>No options yet.</div>}
          {items.map((p,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 0',borderBottom:`1px solid ${T.rule}`}}>
              <span style={{flex:1,fontSize:12,color:T.text,fontFamily:"'Geist Mono',monospace"}}>{p}</span>
              {i>0&&<button onClick={()=>moveUp(i)} style={{background:'transparent',border:`1px solid ${T.border}`,borderRadius:4,color:T.textDim,fontSize:11,padding:'2px 7px',cursor:'pointer'}}>{'\u2191'}</button>}
              <button onClick={()=>remove(i)} style={{background:'transparent',border:`1px solid ${T.danger}44`,borderRadius:4,color:T.danger,fontSize:11,padding:'2px 7px',cursor:'pointer'}}>del</button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function LensFocalPicker({value,onChange,options,placeholder,inputStyle,align}){
  const [open,setOpen]=React.useState(false);
  const [fixPos,setFixPos]=React.useState({top:0,left:0,width:150,up:false});
  const wrapRef=React.useRef(null);
  const listRef=React.useRef(null);
  const selectedRef=React.useRef(null);

  // Use position:fixed + getBoundingClientRect so the dropdown is NEVER
  // clipped by overflow:auto/hidden on any ancestor (e.g. the table wrapper).
  function openPicker(){
    if(!wrapRef.current)return;
    const r=wrapRef.current.getBoundingClientRect();
    const spaceBelow=window.innerHeight-r.bottom;
    const up=spaceBelow<240&&r.top>spaceBelow;
    setFixPos({
      top: up ? undefined : r.bottom+2,
      bottom: up ? (window.innerHeight-r.top+2) : undefined,
      left: r.left,
      width: Math.max(r.width,150)
    });
    setOpen(true);
  }

  React.useEffect(()=>{
    if(!open)return;
    function onDoc(e){
      // Close if click is outside the wrapper (the dropdown itself is fixed, outside wrapper)
      if(wrapRef.current&&!wrapRef.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown',onDoc);
    document.addEventListener('touchstart',onDoc);
    return ()=>{ document.removeEventListener('mousedown',onDoc); document.removeEventListener('touchstart',onDoc); };
  },[open]);

  // When the dropdown opens, jump straight to the currently selected value
  // instead of always starting at the top of the list.
  React.useEffect(()=>{
    if(!open)return;
    // Wait a frame so the list has actually rendered/measured before scrolling.
    const id=requestAnimationFrame(()=>{
      if(selectedRef.current&&listRef.current){
        selectedRef.current.scrollIntoView({block:'center'});
      }
    });
    return ()=>cancelAnimationFrame(id);
  },[open]);

  return(
    <div ref={wrapRef} style={{position:'relative',width:'100%'}}>
      <div style={{display:'flex',alignItems:'center',gap:1}}>
        <input value={value||''} placeholder={placeholder||''} onChange={e=>onChange(e.target.value)}
          onFocus={openPicker}
          style={{flex:1,minWidth:0,fontFamily:"'Geist Mono',monospace",
            background:'transparent',border:'none',padding:'4px 2px',fontSize:11,color:T.text,
            ...(inputStyle||{}),flex:1,minWidth:0}}/>
        <button type="button" onClick={()=>{ if(open){setOpen(false);}else{openPicker();} }} title="Show options"
          style={{flexShrink:0,background:'transparent',border:'none',color:T.accent,cursor:'pointer',fontSize:11,padding:'0 4px'}}>{'\u25BC'}</button>
      </div>
      {open&&(
        <div ref={listRef} style={{
          position:'fixed',
          top: fixPos.top,
          bottom: fixPos.bottom,
          left: fixPos.left,
          width: fixPos.width,
          zIndex:9500,
          maxHeight:230,overflowY:'auto',
          background:T.panel,border:`1px solid ${T.border}`,borderRadius:7,
          boxShadow:'0 8px 24px rgba(0,0,0,0.5)'}}>
          {options.map(opt=>(
            <button key={opt} type="button"
              ref={value===opt?selectedRef:null}
              onMouseDown={(e)=>{e.preventDefault();onChange(opt);setOpen(false);}}
              style={{display:'block',width:'100%',textAlign:'left',padding:'10px 13px',
                background:value===opt?T.chip:'transparent',border:'none',
                borderBottom:`1px solid ${T.rule}`,color:T.text,fontSize:13,
                fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}>
              {opt}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   TakePhotoCell — per-take photo capture for the Camera Report.
   Compact icon button (📷 + count); tapping opens a small
   popover with thumbnails + Shoot/File capture. Photos live in
   IndexedDB (sb_camrep) and never touch Firestore directly —
   only photoIds[] + a small cloudMap{imgId:url} (after sync) are
   stored on the take. Tap ☁ on a thumbnail to push it to
   Cloudinary so it shows up on OTHER devices too (IndexedDB is
   local to the device that took the photo).
═══════════════════════════════════════════════════════════ */
function TakePhotoCell({projId,take,onAddPhoto,onRemovePhoto,onSyncPhoto}){
  const [photos,setPhotos]=React.useState({}); // imgId -> {dataUrl, cloudUrl}
  const [open,setOpen]=React.useState(false);
  const [fixPos,setFixPos]=React.useState({top:0,right:0});
  const [loading,setLoading]=React.useState(false);
  const [uploading,setUploading]=React.useState({});
  const [lightboxUrl,setLightboxUrl]=React.useState(null);
  const fileRef=React.useRef(null);
  const camRef=React.useRef(null);
  const wrapRef=React.useRef(null);
  const ids=take.photoIds||[];
  const cloudMap=take.cloudMap||{};
  const idCount=ids.length;

  React.useEffect(()=>{
    let alive=true;
    camRepGetForTake(projId,take.id).then(rows=>{
      if(!alive)return;
      const m={};
      rows.forEach(r=>{ m[r.imgId]={dataUrl:r.dataUrl,cloudUrl:r.cloudUrl||cloudMap[r.imgId]}; });
      ids.forEach(iid=>{ if(!m[iid]&&cloudMap[iid]) m[iid]={dataUrl:null,cloudUrl:cloudMap[iid]}; });
      setPhotos(m);
    }).catch(()=>{
      if(!alive)return;
      const m={}; ids.forEach(iid=>{ if(cloudMap[iid]) m[iid]={dataUrl:null,cloudUrl:cloudMap[iid]}; });
      setPhotos(m);
    });
    return ()=>{alive=false;};
  },[projId,take.id,idCount,JSON.stringify(cloudMap)]);

  React.useEffect(()=>{
    if(!open)return;
    function onDoc(e){ if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false); }
    document.addEventListener('mousedown',onDoc);
    document.addEventListener('touchstart',onDoc);
    return ()=>{ document.removeEventListener('mousedown',onDoc); document.removeEventListener('touchstart',onDoc); };
  },[open]);

  // Use position:fixed + getBoundingClientRect to escape overflow:auto clipping.
  function toggleOpen(){
    if(!open&&wrapRef.current){
      const r=wrapRef.current.getBoundingClientRect();
      const spaceBelow=window.innerHeight-r.bottom;
      const up=spaceBelow<220&&r.top>spaceBelow;
      setFixPos({
        top: up ? undefined : r.bottom+4,
        bottom: up ? (window.innerHeight-r.top+4) : undefined,
        right: window.innerWidth-r.right
      });
    }
    setOpen(o=>!o);
  }

  async function handleFile(file){
    if(!file||!file.type||file.type.indexOf('image/')!==0)return;
    setLoading(true);
    try{
      const dataUrl=await readAndResize(file,700,700,0.7); // small ref thumbnail, kept light
      const imgId='cp'+Date.now()+Math.floor(Math.random()*1000);
      await camRepPutPhoto(projId,{imgId,takeId:take.id,dataUrl});
      setPhotos(p=>({...p,[imgId]:{dataUrl}}));
      onAddPhoto(imgId);
    }catch(e){ console.warn('camera report photo error',e); }
    setLoading(false);
  }

  async function removePhoto(imgId){
    await camRepDeletePhoto(projId,imgId);
    setPhotos(p=>{ const n={...p}; delete n[imgId]; return n; });
    onRemovePhoto(imgId);
  }

  async function syncPhoto(imgId){
    const entry=photos[imgId];
    if(!entry||!entry.dataUrl||entry.cloudUrl)return;
    setUploading(u=>({...u,[imgId]:true}));
    try{
      const {url}=await uploadCamRepPhoto(entry.dataUrl);
      await camRepSetCloudUrl(projId,imgId,url);
      setPhotos(p=>({...p,[imgId]:{...p[imgId],cloudUrl:url}}));
      onSyncPhoto(imgId,url);
    }catch(e){ console.warn('camera report cloud sync error',e); }
    setUploading(u=>({...u,[imgId]:false}));
  }

  return(
    <div ref={wrapRef} style={{position:'relative',display:'flex',justifyContent:'center'}}>
      {/* Always in DOM — must survive iOS camera capture even if popover closes */}
      <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}}
        onChange={e=>{handleFile(e.target.files[0]);e.target.value='';}}/>
      <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:'none'}}
        onChange={e=>{handleFile(e.target.files[0]);e.target.value='';}}/>
      <button type="button" onClick={toggleOpen} title="Reference photos"
        style={{display:'flex',alignItems:'center',gap:3,
          background:idCount?T.accent+'18':'transparent',
          border:`1px solid ${idCount?T.accent+'44':T.border}`,borderRadius:5,
          padding:'3px 6px',color:idCount?T.accent:T.textDim,fontSize:10,
          cursor:'pointer',fontFamily:"'Geist Mono',monospace"}}>
        {'\uD83D\uDCF7'}{idCount>0?idCount:''}
      </button>
      {open&&(
        <div style={{position:'fixed',
          top:fixPos.top, bottom:fixPos.bottom, right:fixPos.right,
          zIndex:9500,width:270,
          background:T.panel,border:`1px solid ${T.border}`,borderRadius:8,
          boxShadow:'0 8px 24px rgba(0,0,0,0.5)',padding:8}}>
          {idCount>0&&(
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
              {ids.map(imgId=>{
                const p=photos[imgId];
                const showUrl=p&&(p.dataUrl||p.cloudUrl);
                const synced=p&&p.cloudUrl;
                return(
                  <div key={imgId} style={{width:88,height:66,borderRadius:5,overflow:'hidden',position:'relative',border:`1px solid ${T.border}`,background:T.surface2}}>
                    {showUrl
                      ?<img src={showUrl} onClick={()=>setLightboxUrl(showUrl)}
                          style={{width:'100%',height:'100%',objectFit:'cover',cursor:'zoom-in'}}/>
                      :<div style={{width:'100%',height:'100%',display:'grid',placeItems:'center',fontSize:8,color:T.textDim}}>...</div>}
                    <button onClick={()=>removePhoto(imgId)}
                      style={{position:'absolute',top:2,right:2,width:16,height:16,background:'rgba(0,0,0,0.7)',
                        borderRadius:3,color:'white',fontSize:10,border:'none',cursor:'pointer',display:'grid',placeItems:'center'}}>x</button>
                    <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'1px 0',background:'rgba(0,0,0,0.6)'}}>
                      {synced?(<div style={{textAlign:'center',fontSize:7,color:T.success,fontFamily:"'Geist Mono',monospace"}}>{'\u2611'} synced</div>
                      ):uploading[imgId]?(<div style={{textAlign:'center',fontSize:7,color:T.accent,fontFamily:"'Geist Mono',monospace"}}>uploading...</div>
                      ):p&&p.dataUrl?(<button onClick={()=>syncPhoto(imgId)}
                          style={{width:'100%',background:'transparent',border:'none',color:T.accent,fontSize:7,fontFamily:"'Geist Mono',monospace",cursor:'pointer',padding:0}}>{'\u2601'} SYNC</button>
                      ):null}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          <div style={{display:'flex',gap:6}}>
            <button type="button" onClick={()=>fileRef.current?.click()} disabled={loading}
              style={{flex:1,padding:'6px 0',borderRadius:5,border:`1px dashed ${T.border}`,
                background:'transparent',color:T.textMute,fontSize:9,fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}>FILE</button>
            <button type="button" onClick={()=>camRef.current?.click()} disabled={loading}
              style={{flex:1,padding:'6px 0',borderRadius:5,border:`1px dashed ${T.accent}66`,
                background:T.accent+'10',color:T.accent,fontSize:9,fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}>
              {loading?'...':'\uD83D\uDCF7 SHOOT'}
            </button>
          </div>
        </div>
      )}
      {lightboxUrl&&(
        <div onClick={()=>setLightboxUrl(null)}
          style={{position:'fixed',inset:0,zIndex:9998,background:'rgba(0,0,0,0.88)',
            display:'flex',alignItems:'center',justifyContent:'center',cursor:'zoom-out',padding:16}}>
          <img src={lightboxUrl} style={{maxWidth:'100%',maxHeight:'100%',borderRadius:8,objectFit:'contain',boxShadow:'0 0 40px rgba(0,0,0,0.8)'}}/>
          <div style={{position:'absolute',top:16,right:20,color:'rgba(255,255,255,0.7)',fontSize:24,cursor:'pointer',lineHeight:1}} onClick={()=>setLightboxUrl(null)}>{'\u00D7'}</div>
        </div>
      )}
    </div>
  );
}

function CameraReport(){
  const {proj,navTarget,clearNavTarget}=useProj();
  const mob=useMobile();
  const projId=proj._id||'default';

  // Defaults pulled from the user's template (ALEXA MINI LF camera report)
  const DEFAULTS={camera:'ALEXA MINI LF',codec:'5K 1.7:1',fps:'24',shutter:'180',baseEI:'1600',lut:'Rec 709',director:'David Cook',dop:'Robin Tampoe',ac:'Dimitri Belke'};
  const SHUTTER_OPTIONS=['180','172.8'];
  // WB 3200K..7000K in 50K steps
  const WB_OPTIONS=(()=>{const a=[];for(let k=3200;k<=7000;k+=50)a.push(k+'');return a;})();
  const LENS_OPTIONS=['Cooke Panchro i','Cooke S4','Cooke S7','Zeiss Master Prime','Zeiss Ultra Prime','Zeiss Supreme','Arri Signature Prime','Leica Summilux-C','Angenieux Zoom','Canon CN-E'];
  const DEFAULT_FOCAL=['21mm','27mm','32mm','40mm','50mm','65mm','75mm','85mm','100mm','110mm'];
  const DEFAULT_STOP=['T1.4','T2','T2.2','T2.5','T2.8','T3.2','T3.5','T4','T4.5','T5.6','T6.3','T7.1','T8','T9','T11','T13','T16','T22'];
  const DEFAULT_FILTER2=['ND0.6','ND1.2','ND1.8','ND2.4','ND3.0'];
  const loadOpts=(key,def)=>{try{const v=JSON.parse(localStorage.getItem(key)||'null');return (Array.isArray(v)&&v.length)?v:def;}catch{return def;}};
  const [focalOptions,setFocalOptions]=React.useState(()=>loadOpts(SB_FOCAL_PRESETS_KEY,DEFAULT_FOCAL));
  const [stopOptions,setStopOptions]=React.useState(()=>loadOpts(SB_STOP_PRESETS_KEY,DEFAULT_STOP));
  const [filter2Options,setFilter2Options]=React.useState(()=>loadOpts(SB_FILTER2_PRESETS_KEY,DEFAULT_FILTER2));
  const FOCAL_OPTIONS=focalOptions;
  const STOP_OPTIONS=stopOptions;
  const FILTER2_OPTIONS=filter2Options;
  // Single active-preset editor (null = closed). Value is a config key.
  const [activePreset,setActivePreset]=React.useState(null);
  // Registry of all editable dropdown-option lists — add future fields here.
  const PRESET_CONFIGS={
    notes:  {title:'Note Presets',    storageKey:SB_NOTE_PRESETS_KEY,    defaults:null,            placeholder:'Add a preset note...',   onSaved:null},
    focal:  {title:'Focal Length Presets', storageKey:SB_FOCAL_PRESETS_KEY, defaults:DEFAULT_FOCAL, placeholder:'e.g. 135mm or 135', normalize:v=>/^\d+(\.\d+)?$/.test(v)?v+'mm':v, onSaved:setFocalOptions},
    stop:   {title:'T-Stop Presets',  storageKey:SB_STOP_PRESETS_KEY,    defaults:DEFAULT_STOP,    placeholder:'e.g. T2.8 or 2.8', normalize:v=>/^\d+(\.\d+)?$/.test(v)?'T'+v:v, onSaved:setStopOptions},
    filter2:{title:'Filter 2 (ND) Presets', storageKey:SB_FILTER2_PRESETS_KEY, defaults:DEFAULT_FILTER2, placeholder:'e.g. ND1.2', normalize:v=>/^\d+(\.\d+)?$/.test(v)?'ND'+v:v, onSaved:setFilter2Options},
  };
  const PRESET_MENU=[{k:'notes',l:'Notes'},{k:'focal',l:'Focal'},{k:'stop',l:'Stop'},{k:'filter2',l:'Filter 2'}];
  const [showPresetMenu,setShowPresetMenu]=React.useState(false);

  const [rolls,setRolls]=React.useState([]);     // [{id, roll, cam, mag, date, shootDay, ...takes}]
  const [activeRoll,setActiveRoll]=React.useState(null);
  const [activeCam,setActiveCam]=React.useState('A');   // which camera's rolls are shown
  const [syncCams,setSyncCams]=React.useState(false);   // add takes to all cams at once
  const [camActiveRoll,setCamActiveRoll]=React.useState({}); // cam -> last selected roll id
  const [syncStatus,setSyncStatus]=React.useState('offline');
  const [exporting,setExporting]=React.useState(false);
  const [showAIFill,setShowAIFill]=React.useState(false);
  const [filterDay,setFilterDay]=React.useState('all');
  const [selTakeIds,setSelTakeIds]=React.useState([]); // multi-selected clip rows (for moving)
  const [showSearch,setShowSearch]=React.useState(false);
  const [searchQ,setSearchQ]=React.useState({});  // field -> search string
  const unsubRef=React.useRef(null);

  const scenes=proj.scenes||[];
  // Format a scene string ("S01, S23") into "S01 EXT, S23 INT" using slugs.
  function sceneWithIE(sceneStr){
    const ids=String(sceneStr||'').split(',').map(x=>x.trim()).filter(Boolean);
    if(!ids.length)return '';
    return ids.map(id=>{
      const sc=scenes.find(s=>s.id===id);
      const ie=sc?sceneIntExt(sc.slug):'';
      return ie?`${id} ${ie}`:id;
    }).join(', ');
  }
  const shootDays=(proj.shootDays||[]).slice().sort((a,b)=>a.day-b.day);

  // Consume a jump from Breakdown ("view this scene in Camera Report")
  React.useEffect(()=>{
    if(navTarget && navTarget.view==='notes' && navTarget.camSearchScene){
      setShowSearch(true);
      setSearchQ({scene:navTarget.camSearchScene});
      clearNavTarget&&clearNavTarget();
    }
  },[navTarget, clearNavTarget]);

  // Firestore realtime sync (same project, separate collection)
  React.useEffect(()=>{
    try{
      const db=getFirestore();
      const unsub=db.collection('camera_reports').doc(projId).onSnapshot(doc=>{
        if(doc.exists){
          const data=doc.data().rolls||[];
          setRolls(data);
          setActiveRoll(prev=>prev||(data[0]?.id||null));
        }else{ setRolls([]); }
        setSyncStatus('live');
      },()=>setSyncStatus('offline'));
      unsubRef.current=unsub;
      return ()=>{ if(unsubRef.current)unsubRef.current(); };
    }catch(e){ setSyncStatus('offline'); }
  },[projId]);

  const saveRolls=async(updated)=>{
    setSyncStatus('saving');
    try{
      const db=getFirestore();
      await db.collection('camera_reports').doc(projId).set({
        rolls:updated, updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }catch(e){ setSyncStatus('offline'); }
  };

  function nextRollNo(cam){
    // Roll numbers are per-camera and prefixed with the camera letter:
    // A cam -> A001, A002 ...; B cam -> B001 ...
    const c=cam||activeCam||'A';
    let max=0;
    rolls.filter(r=>camOf(r)===c).forEach(r=>{const m=(r.roll||'').match(/(\d+)/);if(m){const n=parseInt(m[1],10);if(n>max)max=n;}});
    return c+String(max+1).padStart(3,'0');
  }

  function addRoll(cam){
    const c=cam||activeCam||'A';
    const id='roll'+Date.now();
    const today=new Date().toISOString().slice(0,10);
    const newRoll={id, roll:nextRollNo(c), cam:c, mag:'', date:today, shootDay:shootDays[0]?.day||'', location:'',
      director:DEFAULTS.director, dop:DEFAULTS.dop, ac:DEFAULTS.ac,
      camera:DEFAULTS.camera, codec:DEFAULTS.codec, fps:DEFAULTS.fps, shutter:DEFAULTS.shutter,
      baseEI:DEFAULTS.baseEI, lut:DEFAULTS.lut, lens:LENS_OPTIONS[0], takes:[]};
    const updated=[newRoll,...rolls];
    setRolls(updated); setActiveCam(c); setActiveRoll(id); saveRolls(updated);
  }

  // Add the next camera (B, then C, then D) with an initial empty roll.
  function addCamera(){
    const next=CAM_ORDER.find(c=>!existingCams.includes(c));
    if(!next){ alert('All cameras (A-D) already exist.'); return; }
    addRoll(next); // creates e.g. B001 and switches to it
  }

  // Move an entire roll (with all its takes) to a different camera.
  // The roll is auto-renumbered to the next available number on the target
  // camera (e.g. A005 moved to B cam -> B003). Then we switch to that camera
  // and select the moved roll so the user can confirm.
  function moveRollToCam(rollId,targetCam){
    const rk=rolls.find(r=>r.id===rollId);
    if(!rk||camOf(rk)===targetCam)return;
    // Compute next roll number on the target camera (excluding this roll).
    let max=0;
    rolls.forEach(r=>{
      if(r.id===rollId)return;
      if(camOf(r)===targetCam){const m=(r.roll||'').match(/(\d+)/);if(m){const n=parseInt(m[1],10);if(n>max)max=n;}}
    });
    const newRollNo=targetCam+String(max+1).padStart(3,'0');
    if(!confirm(`Move roll ${rk.roll||''} (${(rk.takes||[]).length} clips) to ${targetCam} cam?\nIt will be renumbered to ${newRollNo}.`))return;
    const updated=rolls.map(r=>r.id===rollId?{...r,cam:targetCam,roll:newRollNo}:r);
    setRolls(updated); saveRolls(updated);
    setActiveCam(targetCam);
    setActiveRoll(rollId);
  }

  // Move the currently multi-selected clip rows from the active roll to
  // another roll (of the SAME camera). Clips keep their original names; the
  // user can Resequence afterwards if desired. This is a move, not a copy.
  function moveTakesToRoll(targetRollId){
    if(!roll||selTakeIds.length===0)return;
    const target=rolls.find(r=>r.id===targetRollId);
    if(!target||target.id===roll.id)return;
    const moving=roll.takes.filter(t=>selTakeIds.includes(t.id));
    if(moving.length===0)return;
    if(!confirm(`Move ${moving.length} clip${moving.length!==1?'s':''} from ${roll.roll||''} to ${target.roll||''}?`))return;
    const updated=rolls.map(r=>{
      if(r.id===roll.id) return {...r,takes:r.takes.filter(t=>!selTakeIds.includes(t.id))};
      if(r.id===targetRollId) return {...r,takes:[...r.takes,...moving]};
      return r;
    });
    setRolls(updated); saveRolls(updated);
    setSelTakeIds([]);
  }
  function toggleTakeSel(id){
    setSelTakeIds(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  }
  // Clear selection whenever the active roll changes (selection is per-roll).
  React.useEffect(()=>{ setSelTakeIds([]); },[activeRoll]);

  function patchRoll(id,obj){
    const updated=rolls.map(r=>r.id===id?{...r,...obj}:r);
    setRolls(updated); saveRolls(updated);
  }

  function deleteRoll(id){
    if(!confirm('Delete this entire roll and all its takes?'))return;
    const updated=rolls.filter(r=>r.id!==id);
    setRolls(updated);
    if(activeRoll===id)setActiveRoll(updated[0]?.id||null);
    saveRolls(updated);
  }

  // Which cameras actually have rolls (always include A). Ordered A,B,C,D.
  const existingCams=React.useMemo(()=>{
    const set=new Set(['A']);
    rolls.forEach(r=>set.add(camOf(r)));
    return CAM_ORDER.filter(c=>set.has(c));
  },[rolls]);
  // Rolls belonging to the currently-selected camera.
  const camRolls=React.useMemo(()=>rolls.filter(r=>camOf(r)===activeCam),[rolls,activeCam]);
  const CAM=CAM_CONFIG[activeCam]||CAM_CONFIG.A;

  // When the active camera changes (or its roll set changes), make sure the
  // selected roll actually belongs to that camera; otherwise pick its first.
  React.useEffect(()=>{
    if(camRolls.length===0)return;
    if(!camRolls.some(r=>r.id===activeRoll)){
      // Prefer the roll we last used for this camera, else its first roll.
      const remembered=camActiveRoll[activeCam];
      const target=(remembered&&camRolls.some(r=>r.id===remembered))?remembered:camRolls[0].id;
      setActiveRoll(target);
    }
  },[activeCam,camRolls,activeRoll,camActiveRoll]);

  // Remember which roll is active for the current camera (for sync-add + return).
  React.useEffect(()=>{
    if(roll&&activeRoll){
      setCamActiveRoll(prev=>prev[activeCam]===activeRoll?prev:{...prev,[activeCam]:activeRoll});
    }
  },[activeRoll,activeCam]); // eslint-disable-line

  const roll=rolls.find(r=>r.id===activeRoll);
  // Shot letters A, B, C ... AA, AB ...
  // Shot sequence follows US convention: a scene's FIRST shot has no letter
  // (shown as "/"), then subsequent shots advance A, B, C ... AA, AB ...
  function letterToIndex(s){
    let idx=0;const u=(s||'').toUpperCase();
    for(let k=0;k<u.length;k++){idx=idx*26+(u.charCodeAt(k)-64);}
    return idx-1;
  }
  function indexToLetter(i){
    let s='';i=Math.max(0,i);
    do{ s=String.fromCharCode(65+(i%26))+s; i=Math.floor(i/26)-1; }while(i>=0);
    return s;
  }
  // Next shot for a scene: no shots yet -> "/". Currently "/" -> "A". Currently a letter -> next letter.
  function nextShotForScene(sceneId, excludeId){
    if(!roll)return '/';
    let maxIdx=-2; // -2 sentinel = no shot rows yet for this scene
    roll.takes.forEach(t=>{
      if(excludeId&&t.id===excludeId)return;
      if(t.scene===sceneId){
        const idx=(!t.shot||t.shot==='/')?-1:letterToIndex(t.shot);
        if(idx>maxIdx)maxIdx=idx;
      }
    });
    if(maxIdx===-2)return '/';
    if(maxIdx===-1)return 'A';
    return indexToLetter(maxIdx+1);
  }
  // Take number for a given scene+shot = highest existing take for that combo + 1.
  function takeNoFor(sceneId, shot, excludeId){
    if(!roll)return 1;
    let max=0;
    roll.takes.forEach(t=>{
      if(excludeId&&t.id===excludeId)return;
      if(t.scene===sceneId&&(t.shot||'/')===(shot||'/')){ const n=parseInt(t.take,10)||0; if(n>max)max=n; }
    });
    return max+1;
  }
  // Clip is a sequential file-name counter (e.g. C001, C002 ...). First clip on
  // a roll is left blank for the user to establish the naming pattern; once a
  // numeric pattern exists, every new take/shot auto-increments it.
  function nextClipNumber(){
    if(!roll||roll.takes.length===0)return '';
    let max=-1,prefix='',digLen=3;
    roll.takes.forEach(t=>{
      const m=(t.clip||'').match(/^(.*?)(\d+)$/);
      if(m){ const n=parseInt(m[2],10); if(n>max){ max=n; prefix=m[1]; digLen=m[2].length; } }
    });
    if(max<0)return '';
    return prefix+String(max+1).padStart(digLen,'0');
  }

  // Per-roll helpers (operate on a specific roll object, not just the active one)
  // so we can add synchronised takes across multiple cameras at once.
  function nextClipNumberFor(rk){
    if(!rk||rk.takes.length===0)return '';
    let max=-1,prefix='',digLen=3;
    rk.takes.forEach(t=>{
      const m=(t.clip||'').match(/^(.*?)(\d+)$/);
      if(m){ const n=parseInt(m[2],10); if(n>max){ max=n; prefix=m[1]; digLen=m[2].length; } }
    });
    if(max<0)return '';
    return prefix+String(max+1).padStart(digLen,'0');
  }
  function nextShotForSceneIn(rk,sceneId){
    let maxIdx=-2;
    rk.takes.forEach(t=>{
      if(t.scene===sceneId){
        const idx=(!t.shot||t.shot==='/')?-1:letterToIndex(t.shot);
        if(idx>maxIdx)maxIdx=idx;
      }
    });
    if(maxIdx===-2)return '/';
    if(maxIdx===-1)return 'A';
    return indexToLetter(maxIdx+1);
  }
  function takeNoForIn(rk,sceneId,shot){
    let max=0;
    rk.takes.forEach(t=>{
      if(t.scene===sceneId&&(t.shot||'/')===(shot||'/')){ const n=parseInt(t.take,10)||0; if(n>max)max=n; }
    });
    return max+1;
  }
  // Build a new take row for a given roll. mode: 'take' | 'shot' | 'scene'.
  // When a reference scene/shot is provided (from the primary camera), the
  // synced cameras use the SAME scene/shot/take so slates line up; only the
  // clip stays per-roll.
  function buildTake(rk,mode,ref){
    const last=rk.takes[rk.takes.length-1]||{};
    let scene,shot,take;
    if(ref){
      scene=ref.scene; shot=ref.shot; take=ref.take;
    }else if(mode==='scene'){
      scene=''; shot='/'; take='1';
    }else if(mode==='shot'){
      scene=last.scene||(scenes[0]?.id||'');
      shot=nextShotForSceneIn(rk,scene); take='1';
    }else{ // take
      scene=last.scene||(scenes[0]?.id||'');
      shot=last.shot||'/'; take=takeNoForIn(rk,scene,shot)+'';
    }
    return {id:'tk'+Date.now()+Math.floor(Math.random()*1000),
      scene, shot, take, tail:false, clip:nextClipNumberFor(rk),
      lens:rk.lens||'', focal:last.focal||'', stop:last.stop||'',
      shutter:last.shutter||rk.shutter||'', ei:rk.baseEI||'',
      intFilters:last.intFilters||'', filters:last.filters||'',
      wb:last.wb||'', focus:'', notes:'', photoIds:[], cloudMap:{}};
  }

  // Resolve each camera's target roll for a sync-add: the last roll used for
  // that camera, or its first roll. Returns [{roll}] for all cams that have one.
  function syncTargetRolls(){
    const targets=[];
    existingCams.forEach(c=>{
      const cr=rolls.filter(r=>camOf(r)===c);
      if(cr.length===0)return;
      const remembered=camActiveRoll[c];
      const rk=(remembered&&cr.find(r=>r.id===remembered))||cr[0];
      targets.push(rk);
    });
    return targets;
  }

  // Core add: applies to the active roll, or (when syncing) to every camera's
  // current roll. The active/primary roll determines the shared scene/shot/take.
  function doAdd(mode){
    if(!roll)return;
    if(syncCams&&existingCams.length>1){
      const primaryTake=buildTake(roll,mode,null);
      const ref={scene:primaryTake.scene,shot:primaryTake.shot,take:primaryTake.take};
      const targets=syncTargetRolls();
      const updated=rolls.map(r=>{
        const tgt=targets.find(t=>t.id===r.id);
        if(!tgt)return r;
        const isPrimary=r.id===roll.id;
        const nt=isPrimary?primaryTake:buildTake(r,mode,ref);
        return {...r,takes:[...r.takes,nt]};
      });
      setRolls(updated); saveRolls(updated);
    }else{
      const nt=buildTake(roll,mode,null);
      patchRoll(roll.id,{takes:[...roll.takes,nt]});
    }
  }

  function addTake(){ doAdd('take'); }
  function addShot(){ doAdd('shot'); }
  function addNewScene(){ doAdd('scene'); }

  // Cross-roll search ─────────────────────────────────────────
  const SEARCH_FIELDS=[
    {k:'scene',l:'SCENE'},{k:'shot',l:'SHOT'},{k:'clip',l:'CLIP'},
    {k:'lens',l:'LENS'},{k:'focal',l:'FOCAL'},{k:'stop',l:'STOP'},
    {k:'shutter',l:'SHUTTER'},{k:'ei',l:'EI'},{k:'intFilters',l:'FILTER 1'},
    {k:'filters',l:'FILTER 2'},{k:'wb',l:'WB'},{k:'focus',l:'FOCUS'},
    {k:'notes',l:'NOTES'},
  ];
  const hasSearch=Object.values(searchQ).some(v=>v&&v.trim());
  const searchResults=React.useMemo(()=>{
    if(!hasSearch)return null;
    const active=Object.entries(searchQ).filter(([,v])=>v&&v.trim());
    const out=[];
    rolls.forEach(r=>{
      (r.takes||[]).forEach(t=>{
        const match=active.every(([k,v])=>{
          const cell=String(t[k]||'').toLowerCase();
          return cell.includes(v.trim().toLowerCase());
        });
        if(match) out.push({roll:r,take:t});
      });
    });
    return out;
  },[searchQ,rolls,hasSearch]);

  // Unique existing values per search field — used for autocomplete suggestions
  const searchSuggestions=React.useMemo(()=>{
    const out={};
    SEARCH_FIELDS.forEach(({k})=>{
      const vals=new Set();
      rolls.forEach(r=>(r.takes||[]).forEach(t=>{
        const v=(t[k]||'').trim(); if(v) vals.add(v);
      }));
      out[k]=[...vals].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
    });
    return out;
  },[rolls]);

  function setQ(k,v){setSearchQ(prev=>({...prev,[k]:v}));}
  function resetSearch(){setSearchQ({});}

  // Edit a take that may belong to any roll (for search results view)
  function patchTakeGlobal(rollId,takeId,obj){
    const updated=rolls.map(r=>r.id===rollId
      ?{...r,takes:r.takes.map(t=>t.id===takeId?{...t,...obj}:t)}:r);
    setRolls(updated); saveRolls(updated);
  }
  // ────────────────────────────────────────────────────────────

  function patchTake(takeId,obj){
    if(!roll)return;
    patchRoll(roll.id,{takes:roll.takes.map(t=>t.id===takeId?{...t,...obj}:t)});
  }

  // Called by AIFillModal when user confirms.
  // Creates a new take row from AI-extracted fields and optionally
  // saves the source image to IndexedDB as the take's reference photo.
  // If the photo was a monitor screenshot, also updates roll-level fields
  // (fps, shutter, ei, wb, codec) that are more reliably read from the HUD.
  async function applyAITake({fields, imgData}){
    if(!roll)return;
    const takeId='tk'+Date.now();
    const sceneVal=fields.scene||(roll.takes[roll.takes.length-1]?.scene)||(scenes[0]?.id||'');
    const shotVal=fields.shot||'/';
    const takeVal=fields.take||String(takeNoFor(sceneVal,shotVal));
    // ND from monitor -> append to intFilters
    const intFiltVal=[fields.intFilters,fields.nd?'ND '+fields.nd:''].filter(Boolean).join(' ');
    const newTake={
      id:takeId,
      scene:sceneVal, shot:shotVal, take:takeVal,
      tail:!!fields.tail, clip:fields.clip||nextClipNumber(),
      lens:fields.lens||roll.lens||'', focal:fields.focal||'',
      stop:fields.stop||'', ei:fields.ei||roll.baseEI||'',
      intFilters:intFiltVal, filters:fields.filters||'',
      wb:fields.wb||'', focus:fields.focus||'',
      notes:fields.notes||'',
      photoIds:[], cloudMap:{}
    };
    // Save the source image as the take's reference photo (IndexedDB)
    let finalPhotoIds=[];
    if(imgData&&imgData.dataUrl){
      try{
        const imgId='cp'+Date.now()+Math.floor(Math.random()*999);
        await camRepPutPhoto(projId,{imgId,takeId,dataUrl:imgData.dataUrl});
        finalPhotoIds=[imgId];
      }catch(e){ console.warn('AI take photo save error',e); }
    }
    const final={...newTake, photoIds:finalPhotoIds};
    // Patch roll header with monitor-sourced values if they're clearer than what's there
    const rollPatch={};
    if(fields.fps&&!roll.fps)    rollPatch.fps=fields.fps;
    if(fields.shutter&&!roll.shutter) rollPatch.shutter=fields.shutter;
    if(fields.codec&&!roll.codec)  rollPatch.codec=fields.codec;
    const updatedTakes=[...roll.takes,final];
    patchRoll(roll.id,{takes:updatedTakes,...rollPatch});
  }


  // Scene changed manually -> shot back to "/" (new-scene convention), take recomputed.
  function changeTakeScene(takeId,sceneId){
    if(!roll)return;
    const newTake=takeNoFor(sceneId,'/',takeId);
    patchRoll(roll.id,{takes:roll.takes.map(t=>t.id===takeId?{...t,scene:sceneId,shot:'/',take:newTake+''}:t)});
  }

  // Shot changed manually within a scene -> recompute take for that scene+shot.
  function changeTakeShot(takeId,shot){
    if(!roll)return;
    const row=roll.takes.find(t=>t.id===takeId);
    if(!row)return;
    const newTake=takeNoFor(row.scene,shot,takeId);
    patchRoll(roll.id,{takes:roll.takes.map(t=>t.id===takeId?{...t,shot:shot,take:newTake+''}:t)});
  }

  // Parse a clip name into its numeric parts: "B04" → {pre:'B', num:4, digits:2, suf:''}
  // Returns null if no number found in the clip name.
  function parseClip(clip){
    if(!clip)return null;
    const m=clip.match(/^(.*?)(\d+)([^\d]*)$/);
    if(!m)return null;
    return {pre:m[1], num:parseInt(m[2],10), digits:m[2].length, suf:m[3]};
  }
  function fmtClip(parsed,num){
    return parsed.pre+String(num).padStart(parsed.digits,'0')+parsed.suf;
  }

  // Insert a blank take immediately after the given row.
  // Clip auto-fill: new take gets anchor+1, and all subsequent takes whose
  // clip follows the same naming pattern are renumbered +1 (e.g. B04→B05,
  // B05→B06 etc.) so the sequence stays contiguous.
  function insertTakeAfter(anchorId){
    if(!roll)return;
    const anchor=roll.takes.find(t=>t.id===anchorId);
    const anchorIdx=roll.takes.findIndex(t=>t.id===anchorId);
    const scene=anchor?.scene||'';
    const shot=anchor?.shot||'/';

    // Determine new clip value and renumber plan
    const anchorParsed=parseClip(anchor?.clip||'');
    const newClip=anchorParsed?fmtClip(anchorParsed,anchorParsed.num+1):'';
    const insertNum=anchorParsed?anchorParsed.num+1:null;

    const newTake={
      id:'tk'+Date.now(),
      scene, shot,
      take:String(takeNoFor(scene,shot)),
      tail:false, clip:newClip,
      lens:anchor?.lens||roll.lens||'',
      focal:anchor?.focal||'',
      stop:anchor?.stop||'',
      shutter:anchor?.shutter||roll.shutter||'',
      ei:anchor?.ei||roll.baseEI||'',
      intFilters:anchor?.intFilters||'',
      filters:anchor?.filters||'',
      wb:anchor?.wb||'', focus:'', notes:'',
      photoIds:[], cloudMap:{}
    };

    // Renumber takes AFTER the anchor that share the same clip pattern
    // and have clip number >= the inserted clip's number → bump each +1
    const after=roll.takes.slice(anchorIdx+1).map(t=>{
      if(!anchorParsed||!insertNum)return t;
      const p=parseClip(t.clip||'');
      if(!p||p.pre!==anchorParsed.pre||p.suf!==anchorParsed.suf||p.digits!==anchorParsed.digits)return t;
      if(p.num>=insertNum) return {...t,clip:fmtClip(p,p.num+1)};
      return t;
    });

    const next=[...roll.takes.slice(0,anchorIdx+1), newTake, ...after];
    patchRoll(roll.id,{takes:next});
  }

  async function deleteTake(takeId){
    if(!roll)return;
    const delIdx=roll.takes.findIndex(x=>x.id===takeId);
    const t=roll.takes[delIdx];
    const label=t?`${t.scene||'?'}${t.shot?'/'+t.shot:''} / Take ${t.take||'?'}`:'this take';
    if(!confirm('Delete '+label+'?'))return;
    if(t&&t.photoIds&&t.photoIds.length){
      try{ await Promise.all(t.photoIds.map(imgId=>camRepDeletePhoto(projId,imgId))); }catch(e){}
    }
    // Renumber clips after the deleted row (-1) if they match the deleted take's pattern
    const delParsed=parseClip(t?.clip||'');
    const remaining=roll.takes.filter(x=>x.id!==takeId).map(take=>{
      const origIdx=roll.takes.findIndex(x=>x.id===take.id);
      if(!delParsed||origIdx<=delIdx)return take;
      const p=parseClip(take.clip||'');
      if(!p||p.pre!==delParsed.pre||p.suf!==delParsed.suf||p.digits!==delParsed.digits)return take;
      if(p.num>delParsed.num) return {...take,clip:fmtClip(p,p.num-1)};
      return take;
    });
    patchRoll(roll.id,{takes:remaining});
  }

  // Resequence all clips in the current roll: starting from the first
  // parseable clip, fill every take with a contiguous number sequence.
  // Useful after manual edits leave gaps.
  function resequenceClips(){
    if(!roll||roll.takes.length===0)return;
    let parsed=null; let startIdx=0;
    for(let i=0;i<roll.takes.length;i++){
      const p=parseClip(roll.takes[i].clip||'');
      if(p){parsed=p;startIdx=i;break;}
    }
    if(!parsed){alert('No numbered clip found to base the sequence on.');return;}
    if(!confirm(`Resequence all clips from "${fmtClip(parsed,parsed.num)}" onwards?\nAll clips from take ${startIdx+1} will be renumbered in order.`))return;
    const updated=roll.takes.map((t,i)=>{
      if(i<startIdx)return t;
      return {...t,clip:fmtClip(parsed,parsed.num+(i-startIdx))};
    });
    patchRoll(roll.id,{takes:updated});
  }

  // ---- Export to template-style printable HTML ----
  // async: gathers one representative photo per take from IndexedDB first
  // (thumbnail only, embedded directly in the print HTML — never sent to CSV).
  async function exportReport(){
    if(!roll)return;
    // CRITICAL for Safari/iPad: window.open() must be called synchronously,
    // in the same tick as the click, before any `await`. Once we cross an
    // await boundary, Safari no longer considers the call "user-initiated"
    // and silently blocks it — regardless of window.open vs anchor-click vs
    // blob URLs. So we open a blank tab RIGHT NOW and write into it later,
    // once the (async) HTML is ready.
    const preOpened=window.open('','_blank');
    if(preOpened){
      try{
        preOpened.document.write('<!doctype html><html><head><meta charset="utf-8"><title>Preparing report...</title></head><body style="font-family:-apple-system,sans-serif;background:#111;color:#aaa;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;"><div>Preparing camera report...</div></body></html>');
        preOpened.document.close();
      }catch(e){}
    }

    const dayD=shootDays.find(d=>d.day===roll.shootDay);
    const rawDate=roll.date||(dayD&&dayD.date)||'';
    const dateStr=fmtDayDate(rawDate);
    const camCfg=CAM_CONFIG[camOf(roll)]||CAM_CONFIG.A;
    const camHeaderColor=camCfg.header;
    // Light tint of the camera accent for the corner roll tag.
    const camRollTag={A:'#f3b0b0',B:'#b0c8f3',C:'#b0f3c8',D:'#f3d4b0'}[camOf(roll)]||'#f3b0b0';
    const fcm=(v)=>{v=(v==null?'':String(v)).trim();if(!v)return '';return /^[\d.]+$/.test(v)?v+'cm':v;};

    const hasAnyPhoto=roll.takes.some(t=>(t.photoIds||[]).length>0);
    let photoMap={};
    if(hasAnyPhoto){
      try{
        const pairs=await Promise.all(roll.takes.map(async t=>{
          const pids=t.photoIds||[];
          if(!pids.length)return [t.id,null];
          const cm=t.cloudMap||{};
          const rows=await camRepGetForTake(projId,t.id).catch(()=>[]);
          // Prefer this device's local copy; if this take's photo was taken on
          // another device, fall back to its synced cloud URL (if it was SYNCed).
          const local=rows.find(r=>r.dataUrl);
          if(local)return [t.id, local.dataUrl];
          const firstCloud=pids.map(id=>cm[id]).find(Boolean);
          return [t.id, firstCloud||null];
        }));
        pairs.forEach(([id,url])=>{ if(url)photoMap[id]=url; });
      }catch(e){ console.warn('print photo gather failed',e); }
    }

    const rows=roll.takes.map(t=>`<tr>
      <td>${sceneWithIE(t.scene)}</td><td style="text-align:center">${t.shot||''}</td><td style="text-align:center">${t.take||''}</td>
      <td style="text-align:center">${t.tail?'\u2705':''}</td><td>${t.clip||''}</td>
      <td>${t.lens||''}</td><td>${t.focal||''}</td><td>${t.stop||''}</td><td>${t.shutter||roll.shutter||''}</td><td>${t.ei||''}</td>
      <td>${t.intFilters||''}</td><td>${t.filters||''}</td><td>${t.wb||''}</td><td>${fcm(t.focus)}</td>
      <td>${(t.notes||'').replace(/</g,'&lt;')}</td>
      ${hasAnyPhoto?`<td>${photoMap[t.id]?`<img src="${photoMap[t.id]}" style="width:46px;height:34px;object-fit:cover;border-radius:2px;border:1px solid #999;">`:''}</td>`:''}
      </tr>`).join('');
    const html=`<!doctype html><html><head><meta charset="utf-8"><title>${proj.title||'Camera Report'} ${roll.roll}</title>
    <style>
      body{font-family:Arial,Helvetica,sans-serif;margin:18px;color:#111;}
      .hdr{background:#1a1a1a;color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
      .hdr .title{font-size:24px;font-weight:bold;letter-spacing:2px;text-align:center;flex:1;}
      .hdr .roll{background:${camRollTag};color:#111;font-weight:bold;font-size:20px;padding:4px 14px;border-radius:3px;}
      .crew{font-size:10px;line-height:1.5;}
      .meta{display:flex;flex-wrap:wrap;border:1px solid #000;border-top:none;font-size:11px;}
      .meta div{padding:4px 8px;border-right:1px solid #ccc;}
      .meta b{color:#000;}
      table{width:100%;border-collapse:collapse;margin-top:0;font-size:10px;table-layout:fixed;}
      th{background:${camHeaderColor};color:#fff;padding:4px;text-align:left;font-size:10px;overflow:hidden;word-wrap:break-word;line-height:1.15;vertical-align:middle;}
      td{border:1px solid #ccc;padding:3px 4px;overflow:hidden;word-wrap:break-word;vertical-align:top;}
      tr:nth-child(even) td{background:#f7f7f7;}
      .toolbar{position:fixed;top:0;left:0;right:0;background:#1a1a1a;color:#fff;padding:8px 14px;display:flex;gap:10px;align-items:center;justify-content:flex-end;box-shadow:0 2px 8px rgba(0,0,0,0.3);z-index:9999;}
      .toolbar button{font-family:Arial,sans-serif;font-size:13px;padding:7px 16px;border-radius:6px;border:none;cursor:pointer;}
      .toolbar .close{background:#444;color:#fff;}
      .toolbar .print{background:#c98a3a;color:#111;font-weight:bold;}
      .toolbar .spacer-note{flex:1;font-size:11px;color:#aaa;text-align:left;}
      .content{margin-top:52px;}
      @media print{ .toolbar{display:none!important;} .content{margin-top:0;} }
    </style></head><body>
    <div class="toolbar">
      <span class="spacer-note">${roll.roll||''} camera report &middot; use Print to save as PDF</span>
      <button class="close" onclick="window.close()">&times; Close</button>
      <button class="print" onclick="window.print()">&#128424; Print / Save PDF</button>
    </div>
    <div class="content">
    <div class="hdr">
      <div class="crew">DIRECTOR: ${roll.director||DEFAULTS.director}<br>DOP: ${roll.dop||DEFAULTS.dop}<br>1ST AC: ${roll.ac||DEFAULTS.ac}</div>
      <div class="title">${(proj.title||'FRACTURED MIND').toUpperCase()}</div>
      <div><div class="roll">${roll.roll||''}</div><div style="color:#fff;font-size:10px;margin-top:4px">MAG # ${roll.mag||''}</div></div>
    </div>
    <div class="meta">
      <div><b>DATE:</b> ${dateStr}</div><div><b>SHOOT DAY:</b> ${roll.shootDay||''}</div>
      <div><b>CODEC:</b> ${roll.codec||''}</div><div><b>CAMERA:</b> ${roll.camera||''}</div><div><b>LUT:</b> ${roll.lut||''}</div>
      <div><b>FPS:</b> ${roll.fps||''}</div><div><b>LOCATION:</b> ${roll.location||''}</div>
    </div>
    <table>
    <colgroup>
      <col style="width:8.5%"/>  <!-- SCENE (fits "S57 INT, S60 INT, S46 INT" on one line at 10px) -->
      <col style="width:3.5%"/>  <!-- SHOT -->
      <col style="width:3.5%"/>  <!-- TAKE -->
      <col style="width:3%"/>    <!-- T/S -->
      <col style="width:5%"/>    <!-- CLIP -->
      <col style="width:8%"/>    <!-- LENS -->
      <col style="width:4.5%"/>  <!-- FOCAL -->
      <col style="width:3.5%"/>  <!-- STOP -->
      <col style="width:5%"/>    <!-- SHUTTER (was ~8-9%) -->
      <col style="width:3.5%"/>  <!-- EI -->
      <col style="width:8%"/>    <!-- FILTER 1 -->
      <col style="width:5%"/>    <!-- FILTER 2 (was ~7%) -->
      <col style="width:4%"/>    <!-- WB -->
      <col style="width:5%"/>    <!-- FOCUS (cm) (was ~8%) -->
      <col/>                     <!-- NOTES takes remaining space -->
      ${hasAnyPhoto?'<col style="width:5%"/>':''}
    </colgroup>
    <thead><tr>
      <th>SCENE</th><th>SHOT</th><th>TAKE</th><th>T/S</th><th>CLIP</th><th>LENS</th><th>FOCAL</th><th>STOP</th><th>SHUTTER</th><th>EI</th>
      <th>FILTER 1</th><th>FILTER 2</th><th>WB</th><th>FOCUS<br/>(cm)</th><th>NOTES</th>${hasAnyPhoto?'<th>PHOTO</th>':''}
    </tr></thead><tbody>${rows}</tbody></table>
    </div>
    </body></html>`;

    // Write the finished report into the tab we opened synchronously above —
    // this works even on Safari/iPad because that tab was opened in direct
    // response to the click, before any async work happened.
    if(preOpened && !preOpened.closed){
      try{
        preOpened.document.open();
        preOpened.document.write(html);
        preOpened.document.close();
        return;
      }catch(e){}
    }

    // Fallback (pre-open was blocked, e.g. some in-app browsers): print via a
    // hidden iframe on the current page — no new window/tab involved at all.
    const blob=new Blob([html],{type:'text/html'});
    const blobUrl=URL.createObjectURL(blob);
    const iframe=document.createElement('iframe');
    iframe.style.position='fixed'; iframe.style.right='0'; iframe.style.bottom='0';
    iframe.style.width='0'; iframe.style.height='0'; iframe.style.border='0';
    iframe.src=blobUrl;
    iframe.onload=()=>{ try{ iframe.contentWindow.focus(); iframe.contentWindow.print(); }catch(e){} };
    document.body.appendChild(iframe);
    setTimeout(()=>{ try{ document.body.removeChild(iframe); }catch(e){} }, 60000);
    setTimeout(()=>URL.revokeObjectURL(blobUrl), 60000);
  }

  function exportCSV(){

    const head=['SCENE','SHOT','TAKE','T/S','CLIP','LENS','FOCAL','STOP','SHUTTER','EI','FILTER 1','FILTER 2','WB','FOCUS (cm)','NOTES'];
    const fcm=(v)=>{v=(v==null?'':String(v)).trim();if(!v)return '';return /^[\d.]+$/.test(v)?v+'cm':v;};
    const esc=(v)=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
    const lines=[head.join(',')];
    roll.takes.forEach(t=>{
      lines.push([t.scene,t.shot,t.take,t.tail?'TAIL':'',t.clip,t.lens,t.focal,t.stop,t.shutter||roll.shutter||'',t.ei,t.intFilters,t.filters,t.wb,fcm(t.focus),t.notes].map(esc).join(','));
    });
    const blob=new Blob([lines.join('\n')],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`${roll.roll||'roll'}_camera_report.csv`; a.click();
    URL.revokeObjectURL(url);

        {/* Take table */}
        {/* Multi-select action bar — shown when clips are ticked */}
        {selTakeIds.length>0&&(()=>{
          const sameCamRolls=rolls.filter(r=>camOf(r)===activeCam&&r.id!==roll.id);
          return(
            <div style={{padding:'8px 16px',display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',
              background:CAM.tint,borderBottom:`1px solid ${CAM.accent}44`}}>
              <span style={{fontSize:11,fontFamily:"'Geist Mono',monospace",color:CAM.accent,fontWeight:600}}>
                {selTakeIds.length} clip{selTakeIds.length!==1?'s':''} selected
              </span>
              <span style={{fontSize:10,color:T.textDim,fontFamily:"'Geist Mono',monospace"}}>Move to roll:</span>
              {sameCamRolls.length===0
                ?<span style={{fontSize:10,color:T.textDim,fontStyle:'italic'}}>no other {activeCam} cam roll — create one first</span>
                :<select defaultValue="" onChange={e=>{ if(e.target.value){ moveTakesToRoll(e.target.value); e.target.value=''; } }}
                    style={{background:T.surface2,border:`1px solid ${CAM.accent}66`,borderRadius:5,
                      padding:'5px 9px',fontSize:12,color:CAM.accent,fontWeight:600,
                      fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}>
                    <option value="">- select roll -</option>
                    {sameCamRolls.map(r=><option key={r.id} value={r.id}>{r.roll||'(roll)'} {'\u00B7'} {(r.takes||[]).length} clips</option>)}
                  </select>
              }
              <button onClick={()=>setSelTakeIds([])}
                style={{padding:'4px 10px',borderRadius:5,fontSize:10,fontFamily:"'Geist Mono',monospace",
                  background:'transparent',border:`1px solid ${T.border}`,color:T.textDim,cursor:'pointer'}}>Clear</button>
            </div>
          );
        })()}

        <div style={{overflowX:'auto'}}>
          <table style={{borderCollapse:'collapse',width:'100%',minWidth:1272}}>
            <thead><tr>
              <th style={{...th,width:30,textAlign:'center'}}>
                <input type="checkbox"
                  checked={roll.takes.length>0&&selTakeIds.length===roll.takes.length}
                  onChange={e=>setSelTakeIds(e.target.checked?roll.takes.map(t=>t.id):[])}
                  style={{cursor:'pointer'}} title="Select all"/>
              </th>
              <th style={{...th,minWidth:110}}>SCENE</th><th style={{...th,width:38}}>SHOT</th><th style={{...th,width:46}}>TAKE</th><th style={{...th,width:36}}>T/S</th>
              <th style={{...th,width:88}}>CLIP</th><th style={{...th,width:72}}>LENS</th><th style={{...th,width:65}}>FOCAL</th>
              <th style={{...th,width:66}}>STOP</th>
              <th style={{...th,width:80,whiteSpace:'normal',lineHeight:1.15}}>SHUTTER</th>
              <th style={{...th,width:50}}>EI</th><th style={{...th,width:64}}>FILTER 1</th>
              <th style={{...th,width:80}}>FILTER 2</th><th style={{...th,width:76}}>WB</th>
              <th style={{...th,width:46,whiteSpace:'normal',lineHeight:1.15,verticalAlign:'middle'}}>FOCUS<br/>(cm)</th>
              <th style={{...th,minWidth:180}}>NOTES</th><th style={{...th,width:44}}>{'\uD83D\uDCF7'}</th><th style={{...th,width:78}}></th>
            </tr></thead>
            <tbody>
              {roll.takes.map((t,i)=>{
                const prev=i>0?roll.takes[i-1]:null;
                // Bold divider when this row starts a new shot or new scene
                const newGroup=prev&&((prev.shot||'')!==(t.shot||'')||(prev.scene||'')!==(t.scene||''));
                // A row that has a scene number should have focal + stop filled;
                // flag empties in red as a reminder.
                const hasScene=!!String(t.scene||'').trim();
                const needFocal=hasScene&&!String(t.focal||'').trim();
                const needStop=hasScene&&!String(t.stop||'').trim();
                const reqStyle={background:'rgba(229,72,77,0.16)',boxShadow:'inset 0 0 0 1.5px #e5484d'};
                const isSel=selTakeIds.includes(t.id);
                return(
                <tr key={t.id} style={{borderBottom:`1px solid ${T.rule}`,
                  borderTop:newGroup?`2px solid ${T.accent}66`:'none',
                  background:isSel?(CAM.tint):(i%2?T.surface2+'55':'transparent')}}>
                  <td style={{borderRight:`1px solid ${T.rule}`,textAlign:'center'}}>
                    <input type="checkbox" checked={isSel} onChange={()=>toggleTakeSel(t.id)} style={{cursor:'pointer'}}/>
                  </td>
                  <td style={{borderRight:`1px solid ${T.rule}`}}>
                    <ScenePicker value={t.scene||''} scenes={scenes} displayValue={sceneWithIE(t.scene)}
                      onChange={v=>{
                        const first=v.split(',')[0].trim();
                        const newTake=first?takeNoFor(first,t.shot||'/',t.id):t.take;
                        patchTake(t.id,{scene:v,take:String(newTake)});
                      }}/>
                    {String(t.scene||'').trim()&&(()=>{
                      const firstScene=String(t.scene).split(',')[0].trim();
                      const jump=(view)=>{
                        const nav=window.__sbNavigateTo;
                        if(nav) nav(view,{sceneId:firstScene, tab:view==='breakdown'?'scenes':undefined,
                          fromView:'notes', fromLabel:'Camera Report'});
                      };
                      return(
                        <div style={{display:'flex',gap:4,padding:'0 4px 4px'}}>
                          <button onClick={()=>jump('shots')} title="Open in Shot Board"
                            style={{fontSize:8,padding:'1px 5px',borderRadius:3,cursor:'pointer',
                              background:'transparent',border:`1px solid ${T.border}`,color:T.textDim,fontFamily:"'Geist Mono',monospace"}}>SB {'\u2192'}</button>
                          <button onClick={()=>jump('breakdown')} title="Open in Breakdown"
                            style={{fontSize:8,padding:'1px 5px',borderRadius:3,cursor:'pointer',
                              background:'transparent',border:`1px solid ${T.border}`,color:T.textDim,fontFamily:"'Geist Mono',monospace"}}>BD {'\u2192'}</button>
                        </div>
                      );
                    })()}
                  </td>
                  <td style={{borderRight:`1px solid ${T.rule}`}}><input value={t.shot||''} placeholder="/" onChange={e=>changeTakeShot(t.id,e.target.value.toUpperCase())} style={{...cellInput,textAlign:'center'}}/></td>
                  <td style={{borderRight:`1px solid ${T.rule}`}}><input value={t.take||''} onChange={e=>patchTake(t.id,{take:e.target.value})} style={{...cellInput,textAlign:'center'}} inputMode="numeric"/></td>
                  <td style={{borderRight:`1px solid ${T.rule}`,textAlign:'center'}}>
                    <button onClick={()=>patchTake(t.id,{tail:!t.tail})} title="Tail slate" style={{background:'transparent',border:'none',cursor:'pointer',fontSize:14,padding:'2px'}}>{t.tail?'\u2705':'\u2610'}</button>
                  </td>
                  <td style={{borderRight:`1px solid ${T.rule}`}}><input value={t.clip||''} onChange={e=>patchTake(t.id,{clip:e.target.value})} style={{...cellInput,textAlign:'right'}}/></td>
                  <td style={{borderRight:`1px solid ${T.rule}`}}><LensFocalPicker value={t.lens||''} onChange={v=>patchTake(t.id,{lens:v})} options={LENS_OPTIONS} inputStyle={cellInput}/></td>
                  <td style={{borderRight:`1px solid ${T.rule}`,...(needFocal?reqStyle:{})}}><LensFocalPicker value={t.focal||''} onChange={v=>patchTake(t.id,{focal:v})} options={FOCAL_OPTIONS} inputStyle={cellInput}/></td>
                  <td style={{borderRight:`1px solid ${T.rule}`,...(needStop?reqStyle:{})}}><LensFocalPicker value={t.stop||''} onChange={v=>patchTake(t.id,{stop:v})} options={STOP_OPTIONS} inputStyle={cellInput}/></td>
                  <td style={{borderRight:`1px solid ${T.rule}`}}><LensFocalPicker value={t.shutter||''} onChange={v=>patchTake(t.id,{shutter:v})} options={SHUTTER_OPTIONS} placeholder={roll.shutter||''} inputStyle={{...cellInput,textAlign:'center'}}/></td>
                  <td style={{borderRight:`1px solid ${T.rule}`}}><input value={t.ei||''} onChange={e=>patchTake(t.id,{ei:e.target.value})} style={cellInput}/></td>
                  <td style={{borderRight:`1px solid ${T.rule}`}}><input value={t.intFilters||''} onChange={e=>patchTake(t.id,{intFilters:e.target.value})} style={cellInput}/></td>
                  <td style={{borderRight:`1px solid ${T.rule}`}}><LensFocalPicker value={t.filters||''} onChange={v=>patchTake(t.id,{filters:v})} options={FILTER2_OPTIONS} inputStyle={cellInput}/></td>
                  <td style={{borderRight:`1px solid ${T.rule}`}}><LensFocalPicker value={t.wb||''} onChange={v=>patchTake(t.id,{wb:v})} options={WB_OPTIONS} inputStyle={cellInput}/></td>
                  <td style={{borderRight:`1px solid ${T.rule}`}}><input value={t.focus||''} placeholder="cm" onChange={e=>patchTake(t.id,{focus:e.target.value})} style={{...cellInput,padding:'8px 3px',textAlign:'center'}}/></td>
                  <td style={{borderRight:`1px solid ${T.rule}`}}><NotesPicker value={t.notes||''} onChange={v=>patchTake(t.id,{notes:v})}/></td>
                  <td style={{borderRight:`1px solid ${T.rule}`,padding:'4px 2px'}}>
                    <TakePhotoCell projId={projId} take={t}
                      onAddPhoto={imgId=>patchTake(t.id,{photoIds:[...(t.photoIds||[]),imgId]})}
                      onRemovePhoto={imgId=>{
                        const cm={...(t.cloudMap||{})}; delete cm[imgId];
                        patchTake(t.id,{photoIds:(t.photoIds||[]).filter(x=>x!==imgId),cloudMap:cm});
                      }}
                      onSyncPhoto={(imgId,url)=>patchTake(t.id,{cloudMap:{...(t.cloudMap||{}),[imgId]:url}})}/>
                  </td>
                  <td style={{textAlign:'center',whiteSpace:'nowrap',padding:'4px 2px'}}>
                    <button onClick={()=>insertTakeAfter(t.id)} title="Insert row below"
                      style={{background:T.accent+'14',border:`1px solid ${T.accent}44`,borderRadius:5,
                        color:T.accent,cursor:'pointer',fontSize:16,fontWeight:600,width:26,height:26,lineHeight:1,padding:0,marginRight:4}}>+</button>
                    <button onClick={()=>deleteTake(t.id)} title="Delete row"
                      style={{background:'transparent',border:`1px solid ${T.border}`,borderRadius:5,
                        color:T.textDim,cursor:'pointer',fontSize:14,width:26,height:26,lineHeight:1,padding:0}}>{'\u00D7'}</button>
                  </td>
                </tr>
                );})}
            </tbody>
          </table>
        </div>
        <div style={{padding:'10px 16px',display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <button onClick={addTake} style={{padding:'7px 16px',borderRadius:6,border:`1px dashed ${CAM.accent}66`,background:CAM.tint,color:CAM.accent,fontSize:12,fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}>+ Add take</button>
          <button onClick={addShot} style={{padding:'7px 16px',borderRadius:6,border:`1px dashed ${T.border}`,background:'transparent',color:T.textMute,fontSize:12,fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}>+ New shot</button>
          <button onClick={addNewScene} style={{padding:'7px 16px',borderRadius:6,border:`1px dashed ${T.border}`,background:'transparent',color:T.textMute,fontSize:12,fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}>+ New scene</button>
          {existingCams.length>1&&(
            <button onClick={()=>setSyncCams(s=>!s)}
              title="When on, Add take / New shot / New scene adds a matching row to every camera's current roll at once"
              style={{display:'flex',alignItems:'center',gap:6,padding:'7px 12px',borderRadius:6,cursor:'pointer',
                border:`1.5px solid ${syncCams?CAM.accent:T.border}`,
                background:syncCams?CAM.tint:'transparent',
                color:syncCams?CAM.accent:T.textDim,fontSize:11,fontFamily:"'Geist Mono',monospace"}}>
              <span style={{width:15,height:15,borderRadius:3,display:'grid',placeItems:'center',fontSize:10,fontWeight:700,
                background:syncCams?CAM.accent:'transparent',color:syncCams?'#0e0d0b':T.textDim,
                border:`1px solid ${syncCams?CAM.accent:T.border}`}}>{syncCams?'\u2713':''}</span>
              Sync cams ({existingCams.join('+')})
            </button>
          )}
          <div style={{flex:1}}/>
          <button onClick={resequenceClips} title="Renumber all clip names in sequence from the first one"
            style={{padding:'6px 12px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',
              color:T.textDim,fontSize:10,fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}>
            {'\u21B3'} Resequence clips
          </button>
        </div>
      </div>}

      {showAIFill&&roll&&(
        <AIFillModal
          roll={roll}
          projId={projId}
          scenes={scenes}
          onApply={applyAITake}
          onClose={()=>setShowAIFill(false)}/>
      )}
      {activePreset&&PRESET_CONFIGS[activePreset]&&(
        <PresetsModal config={PRESET_CONFIGS[activePreset]}
          onClose={()=>setActivePreset(null)}
          onSaved={PRESET_CONFIGS[activePreset].onSaved}/>
      )}
    </div>
  );
}

function OnSetNotes(){
  const {proj,navTarget} = useProj();
  const mob = useMobile();

  const [mainTab, setMainTab] = React.useState('camera'); // 'camera' | 'notes'

  // If we were sent here to view a scene in the Camera Report, open that tab.
  React.useEffect(()=>{
    if(navTarget && navTarget.view==='notes' && navTarget.camSearchScene){
      setMainTab('camera');
    }
  },[navTarget]);
  const [notes, setNotes] = React.useState([]);
  const [selDept, setSelDept] = React.useState('all');
  const [selScene, setSelScene] = React.useState('all');
  const [showResolved, setShowResolved] = React.useState(false);
  const [showAdd, setShowAdd] = React.useState(false);
  const [editNote, setEditNote] = React.useState(null);
  const [syncStatus, setSyncStatus] = React.useState('offline');
  const unsubRef = React.useRef(null);

  const projId = proj._id || 'default';

  // Firebase realtime sync
  React.useEffect(()=>{
    try {
      const db = getFirestore();
      const unsub = db.collection('onset_notes')
        .doc(projId)
        .onSnapshot(doc=>{
          if(doc.exists){
            const data = doc.data().notes || [];
            setNotes(data.sort((a,b)=>b.createdAt-a.createdAt));
          } else {
            setNotes([]);
          }
          setSyncStatus('live');
        }, ()=>setSyncStatus('offline'));
      unsubRef.current = unsub;
      return ()=>{ if(unsubRef.current) unsubRef.current(); };
    } catch(e){ setSyncStatus('offline'); }
  },[projId]);

  const saveNotes = async (updated) => {
    setSyncStatus('saving');
    try {
      const db = getFirestore();
      await db.collection('onset_notes').doc(projId).set({
        notes: updated,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch(e){ setSyncStatus('offline'); }
  };

  const addNote = (note) => {
    const newNote = { ...note, id: Date.now()+'', createdAt: Date.now(), resolved: false };
    const updated = [newNote, ...notes];
    setNotes(updated);
    saveNotes(updated);
    setShowAdd(false);
  };

  const updateNote = (id, patch) => {
    const updated = notes.map(n => n.id===id ? {...n,...patch} : n);
    setNotes(updated);
    saveNotes(updated);
  };

  const deleteNote = (id) => {
    const updated = notes.filter(n => n.id!==id);
    setNotes(updated);
    saveNotes(updated);
  };

  const filtered = notes.filter(n=>{
    if(!showResolved && n.resolved) return false;
    if(selDept!=='all' && n.dept!==selDept) return false;
    if(selScene!=='all' && n.sceneId!==selScene) return false;
    return true;
  });

  const unresolvedCount = notes.filter(n=>!n.resolved).length;

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}}>

      {/* Main switch: Camera Report / Notes */}
      <div style={{padding:mob?'6px 10px 0':'8px 20px 0',display:'flex',gap:6,flexShrink:0}}>
        <button onClick={()=>setMainTab('camera')}
          style={{padding:'5px 14px',borderRadius:'6px 6px 0 0',border:`1px solid ${mainTab==='camera'?T.border:'transparent'}`,borderBottom:'none',
            background:mainTab==='camera'?T.panel:'transparent',color:mainTab==='camera'?T.text:T.textDim,
            fontSize:12,fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}>
          {'\uD83C\uDFA5'} Camera Report
        </button>
        <button onClick={()=>setMainTab('notes')}
          style={{padding:'5px 14px',borderRadius:'6px 6px 0 0',border:`1px solid ${mainTab==='notes'?T.border:'transparent'}`,borderBottom:'none',
            background:mainTab==='notes'?T.panel:'transparent',color:mainTab==='notes'?T.text:T.textDim,
            fontSize:12,fontFamily:"'Geist Mono',monospace",cursor:'pointer'}}>
          {'\uD83D\uDCDD'} Notes
        </button>
      </div>

      {mainTab==='camera'&&<CameraReport/>}
      {mainTab==='notes'&&<>

      {/* Header bar */}
      <div style={{padding:mob?'8px 10px':'10px 20px',borderBottom:`1px solid ${T.rule}`,
        display:'flex',alignItems:'center',gap:8,flexShrink:0,flexWrap:'wrap'}}>
        <div style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:mob?16:20,color:T.text}}>
          On Set Notes
        </div>
        {/* Sync indicator */}
        <div style={{display:'flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:99,
          background:syncStatus==='live'?T.success+'18':T.surface2,
          border:`1px solid ${syncStatus==='live'?T.success+'44':T.border}`}}>
          <div style={{width:5,height:5,borderRadius:'50%',
            background:syncStatus==='live'?T.success:T.textDim}}/>
          <span style={{fontFamily:"'Geist Mono',monospace",fontSize:8,
            color:syncStatus==='live'?T.success:T.textDim}}>
            {syncStatus==='live'?'LIVE':syncStatus==='saving'?'SAVING...':'OFFLINE'}
          </span>
        </div>
        {unresolvedCount>0&&<div style={{fontFamily:"'Geist Mono',monospace",fontSize:9,
          color:T.warn,padding:'2px 8px',borderRadius:99,background:T.warn+'15',
          border:`1px solid ${T.warn}33`}}>
          {unresolvedCount} open
        </div>}
        <div style={{flex:1}}/>
        <button onClick={()=>setShowResolved(s=>!s)}
          style={{padding:'4px 10px',borderRadius:5,fontSize:10,cursor:'pointer',
            fontFamily:"'Geist Mono',monospace",
            background:showResolved?T.success+'18':'transparent',
            border:`1px solid ${showResolved?T.success+'44':T.border}`,
            color:showResolved?T.success:T.textDim}}>
          {showResolved?'Hide resolved':'Show resolved'}
        </button>
        <button onClick={()=>{setEditNote(null);setShowAdd(true);}}
          style={{padding:'4px 14px',background:T.accent,border:'none',borderRadius:5,
            color:'#0e0d0b',fontSize:11,fontWeight:600,cursor:'pointer',
            display:'flex',alignItems:'center',gap:4}}>
          + Note
        </button>
      </div>

      {/* Dept filter pills */}
      <div style={{padding:mob?'6px 8px':'6px 16px',borderBottom:`1px solid ${T.rule}`,
        display:'flex',gap:5,overflowX:'auto',flexShrink:0,
        scrollbarWidth:'none',WebkitOverflowScrolling:'touch'}}>
        <button onClick={()=>setSelDept('all')}
          style={{padding:'3px 10px',borderRadius:99,fontSize:10,whiteSpace:'nowrap',cursor:'pointer',
            fontFamily:"'Geist Mono',monospace",flexShrink:0,
            background:selDept==='all'?T.accent:'transparent',
            border:`1px solid ${selDept==='all'?T.accent:T.border}`,
            color:selDept==='all'?'#0e0d0b':T.textMute}}>
          ALL
        </button>
        {NOTE_DEPTS.map(d=>(
          <button key={d.id} onClick={()=>setSelDept(selDept===d.id?'all':d.id)}
            style={{padding:'3px 10px',borderRadius:99,fontSize:10,whiteSpace:'nowrap',
              cursor:'pointer',fontFamily:"'Geist Mono',monospace",flexShrink:0,
              background:selDept===d.id?d.color+'33':'transparent',
              border:`1px solid ${selDept===d.id?d.color:T.border}`,
              color:selDept===d.id?d.color:T.textMute}}>
            {d.icon} {mob?d.label.split('/')[0]:d.label}
          </button>
        ))}
      </div>

      {/* Scene filter */}
      <div style={{padding:mob?'4px 8px':'4px 16px',borderBottom:`1px solid ${T.rule}`,
        display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
        <span style={{fontFamily:"'Geist Mono',monospace",fontSize:8,color:T.textDim,flexShrink:0}}>SCENE</span>
        <select value={selScene} onChange={e=>setSelScene(e.target.value)}
          style={{flex:1,maxWidth:280,background:T.surface2,border:`1px solid ${T.border}`,
            borderRadius:4,padding:'3px 6px',fontSize:11,color:T.text}}>
          <option value="all">All scenes</option>
          {proj.scenes?.map(s=>(
            <option key={s.id} value={s.id}>{s.id} - {s.slug?.slice(0,40)}</option>
          ))}
        </select>
      </div>

      {/* Notes list */}
      <div style={{flex:1,overflow:'auto',padding:mob?'8px 8px':'10px 16px'}}>
        {filtered.length===0&&(
          <div style={{textAlign:'center',padding:'48px 20px',color:T.textDim}}>
            <div style={{fontSize:40,opacity:0.2,marginBottom:8}}>📋</div>
            <div style={{fontSize:12}}>{notes.length===0?'No notes yet - tap + Note to add':'No notes match filter'}</div>
          </div>
        )}
        {filtered.map(note=>{
          const dept = NOTE_DEPTS.find(d=>d.id===note.dept)||NOTE_DEPTS[8];
          const scene = proj.scenes?.find(s=>s.id===note.sceneId);
          return(
            <NoteCard key={note.id} note={note} dept={dept} scene={scene}
              onResolve={()=>updateNote(note.id,{resolved:!note.resolved})}
              onEdit={()=>{setEditNote(note);setShowAdd(true);}}
              onDelete={()=>deleteNote(note.id)}
              mob={mob}/>
          );
        })}
      </div>

      {/* Add / Edit modal */}
      {showAdd&&(
        <NoteModal
          note={editNote}
          scenes={proj.scenes||[]}
          onSave={(data)=>{
            if(editNote){ updateNote(editNote.id,data); setShowAdd(false); setEditNote(null); }
            else addNote(data);
          }}
          onClose={()=>{ setShowAdd(false); setEditNote(null); }}
          mob={mob}/>
      )}
      </>}
    </div>
  );
}

function NoteCard({note, dept, scene, onResolve, onEdit, onDelete, mob}){
  const [showImg, setShowImg] = React.useState(false);
  const timeStr = note.createdAt
    ? new Date(note.createdAt).toLocaleString('en-AU',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
    : '';

  return(
    <div style={{
      marginBottom:8, borderRadius:8, overflow:'hidden',
      border:`1px solid ${note.resolved?T.border:note.urgent?T.danger+'55':dept.color+'44'}`,
      background:note.resolved?T.surface2+'80':T.panel,
      opacity:note.resolved?0.65:1,
    }}>
      {/* Top strip */}
      <div style={{display:'flex',alignItems:'center',gap:6,padding:'7px 10px',
        borderBottom:`1px solid ${T.rule}`,
        background:note.resolved?'transparent':dept.color+'10'}}>
        <span style={{fontSize:13}}>{dept.icon}</span>
        <span style={{fontFamily:"'Geist Mono',monospace",fontSize:9,color:dept.color,fontWeight:600,letterSpacing:'0.05em'}}>
          {dept.label.toUpperCase()}
        </span>
