const GDRIVE_CLIENT_ID = '145572665951-pe6ka3u15qb26kgb397cm7b1a8hl9cac.apps.googleusercontent.com';
const GDRIVE_SCOPE = 'https://www.googleapis.com/auth/drive';
const GDRIVE_FOLDER_NAME = 'ScriptBreaker';

// Drive auth state
let _driveToken = null;
let _driveUser = null;
let _driveFolderId = null;

function getDriveToken(){ return _driveToken; }
function getDriveUser(){ return _driveUser; }

// Sign in with Google
function driveSignIn(){
  return new Promise((resolve, reject) => {
    if(!window.google) { reject(new Error('Google Identity not loaded')); return; }
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GDRIVE_CLIENT_ID,
      scope: GDRIVE_SCOPE + ' https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
      callback: async (resp) => {
        if(resp.error){ reject(new Error(resp.error)); return; }
        _driveToken = resp.access_token;
        // Get user info
        try {
          const r = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
            headers: { Authorization: 'Bearer ' + _driveToken }
          });
          _driveUser = await r.json();
        } catch(e) {}
        // Ensure folder exists
        try { _driveFolderId = await ensureDriveFolder(); } catch(e) {}
        resolve({ token: _driveToken, user: _driveUser });
      }
    });
    client.requestAccessToken();
  });
}

function driveSignOut(){
  if(_driveToken) google.accounts.oauth2.revoke(_driveToken, ()=>{});
  _driveToken = null;
  _driveUser = null;
  _driveFolderId = null;
}

// Ensure ScriptBreaker folder exists in Drive
async function ensureDriveFolder(){
  const q = encodeURIComponent(`name='${GDRIVE_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
    headers: { Authorization: 'Bearer ' + _driveToken }
  });
  const data = await r.json();
  if(data.files && data.files.length > 0) return data.files[0].id;
  // Create folder
  const cr = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + _driveToken, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: GDRIVE_FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' })
  });
  const folder = await cr.json();
  return folder.id;
}

// List all JSON files in ScriptBreaker folder (own + shared)
async function listDriveFiles(){
  if(!_driveToken) return [];

  // 1. Own ScriptBreaker folder
  const folderId = _driveFolderId || await ensureDriveFolder();
  _driveFolderId = folderId;
  const q1 = encodeURIComponent("'" + folderId + "' in parents and mimeType='application/json' and trashed=false");
  const r1 = await fetch('https://www.googleapis.com/drive/v3/files?q=' + q1 + '&fields=files(id,name,modifiedTime,size)&orderBy=modifiedTime+desc', {
    headers: { Authorization: 'Bearer ' + _driveToken }
  });
  const d1 = await r1.json();
  const ownFiles = d1.files || [];

  // 2. Find ALL ScriptBreaker folders accessible (shared or owned)
  // Use broad search without sharedWithMe filter to catch all cases
  const q2 = encodeURIComponent("name='ScriptBreaker' and mimeType='application/vnd.google-apps.folder' and trashed=false");
  const r2 = await fetch('https://www.googleapis.com/drive/v3/files?q=' + q2 + '&fields=files(id,name)&includeItemsFromAllDrives=true&supportsAllDrives=true&corpora=allDrives', {
    headers: { Authorization: 'Bearer ' + _driveToken }
  });
  const d2 = await r2.json();
  // Filter out own folder to avoid duplicates
  const otherFolders = (d2.files || []).filter(f => f.id !== folderId);

  // 3. Get JSON files from each other ScriptBreaker folder
  let sharedFiles = [];
  for(const folder of otherFolders){
    try {
      const q3 = encodeURIComponent("'" + folder.id + "' in parents and mimeType='application/json' and trashed=false");
      const r3 = await fetch('https://www.googleapis.com/drive/v3/files?q=' + q3 + '&fields=files(id,name,modifiedTime,size)&orderBy=modifiedTime+desc&includeItemsFromAllDrives=true&supportsAllDrives=true', {
        headers: { Authorization: 'Bearer ' + _driveToken }
      });
      const d3 = await r3.json();
      sharedFiles = sharedFiles.concat(d3.files || []);
    } catch(e) {}
  }

  // Deduplicate by id, sort newest first
  const allMap = {};
  [...ownFiles, ...sharedFiles].forEach(f => { allMap[f.id] = f; });
  return Object.values(allMap).sort((a,b) => new Date(b.modifiedTime) - new Date(a.modifiedTime));
}

// Read a JSON file from Drive (own or shared)
async function readDriveFile(fileId){
  const r = await fetch('https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media&supportsAllDrives=true', {
    headers: { Authorization: 'Bearer ' + _driveToken }
  });
  return await r.json();
}

// Save/update a JSON file in Drive
async function saveDriveFile(fileId, filename, data){
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  if(fileId){
    // Update existing
    const r = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
      method: 'PATCH',
      headers: { Authorization: 'Bearer ' + _driveToken, 'Content-Type': 'application/json' },
      body: blob
    });
    return await r.json();
  } else {
    // Create new with metadata
    const folderId = _driveFolderId || await ensureDriveFolder();
    const meta = { name: filename, parents: [folderId], mimeType: 'application/json' };
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
    form.append('file', blob);
    const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + _driveToken },
      body: form
    });
    return await r.json();
  }
}

// Delete a file from Drive
async function deleteDriveFile(fileId){
  await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}`, {
    method: 'DELETE',
    headers: { Authorization: 'Bearer ' + _driveToken }
  });
}

function normalizeProject(raw){
  if(!raw) return null;
  const p=JSON.parse(JSON.stringify(raw));
  p.characters?.forEach((c,i)=>{ if(!c.color) c.color=CHAR_COLORS[i%CHAR_COLORS.length]; });
  p.locations?.forEach((l,i)=>{ if(!l.color) l.color=LOC_COLORS[i%LOC_COLORS.length]; });
  p.scenes?.forEach(s=>{
    if(!s.characters) s.characters=[];
    s.characters=s.characters.map(x=>typeof x==='string'?x:(x.id||x)).filter(Boolean);
    if(!s.shots) s.shots=[];
    if(!s.props) s.props=[];
    if(!s.wardrobe) s.wardrobe=[];
    if(!s.makeup) s.makeup=[];
    if(!s.equipment) s.equipment=[];
  });
  if(!p._id) p._id='p_'+Date.now();
  p._updatedAt=Date.now();
  return p;
}

// Compute actual calendar dates for shoot days
function computeShootCalendar(startDateStr,endDateStr,totalDays){
  if(!startDateStr) return {};
  try{
    const start=new Date(startDateStr+'T00:00:00');
    if(isNaN(start)) return {};
    const calendar={};
    let cur=new Date(start);
    let day=1;
    // If end date given, count actual workdays; else just generate totalDays workdays
    while(day<=Math.max(totalDays||1,1)){
      if(cur.getDay()!==0&&cur.getDay()!==6){
        calendar[day]=cur.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        day++;
      }
      cur=new Date(cur.getTime()+86400000);
    }
    return calendar;
  }catch{return {}}
}

function mergeProjectChunk(base,chunk,replaceExisting){
  const mergeByKey=(a,b)=>{const m={};(a||[]).forEach(x=>{m[x.id]=x;});(b||[]).forEach(x=>{m[x.id]={...(m[x.id]||{}),...x};});return Object.values(m);};
  const sMap={};(base.scenes||[]).forEach(s=>{sMap[s.id]=s;});
  (chunk.scenes||[]).forEach(s=>{const ex=sMap[s.id];sMap[s.id]={...(ex||{}),...s,shots:s.shots&&s.shots.length?s.shots:(ex?.shots||[])};});
  const mergedScenes=Object.values(sMap).sort((a,b)=>a.sceneNo-b.sceneNo);
  const baseAlerts=base.continuityAlerts||[];const notes=new Set(baseAlerts.map(a=>a.note));
  const dayMap={};(base.shootDays||[]).forEach(d=>{dayMap[d.day]=d;});(chunk.shootDays||[]).forEach(d=>{dayMap[d.day]={...(dayMap[d.day]||{}),...d};});
  const bt=base.project?.title;
  return normalizeProject({...base,project:{...(base.project||{}),...(chunk.project||{}),title:(bt&&bt!=='Untitled')?bt:(chunk.project?.title||bt||'Untitled')},characters:mergeByKey(base.characters,chunk.characters),locations:mergeByKey(base.locations,chunk.locations),scenes:mergedScenes,continuityAlerts:[...baseAlerts,...(chunk.continuityAlerts||[]).filter(a=>!notes.has(a.note))],shootDays:Object.values(dayMap).sort((a,b)=>a.day-b.day)});
}


function ShotCard(props) {
  var shot = props.shot;

        {!shot.refImageUrl && ytId && (
          <div style={{width:'100%',height:'100%',position:'relative'}}>

        <div style={{position:'absolute',top:5,left:5,background:'rgba(14,13,11,0.85)',borderRadius:3,padding:'1px 5px',fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.text}}>{shot.shotNo}</div>

function ShotBoard(){
  const {proj,updateProj}=useProj();
  const mob=useMobile(); const t=useT();

  const [filterLoc,setFilterLoc]=useState('all');
  const [filterAct,setFilterAct]=useState('all');
  const scenes=useMemo(()=>{
    let s=proj.scenes||[];
    if(filterLoc!=='all') s=s.filter(sc=>sc.locationId===filterLoc);
    if(filterAct!=='all') s=s.filter(sc=>String(sc.act)===filterAct);
    return s;
  },[proj,filterLoc,filterAct]);

  const addShot=(sceneId)=>{
    updateProj(p=>{
      const sc=p.scenes?.find(s=>s.id===sceneId);
      const shots=sc?.shots||[];
      const base=sceneId.replace(/\D/g,'');
      const newShot={id:'sh_'+Date.now(),shotNo:base+String.fromCharCode(65+shots.length),size:'MEDIUM',move:'Static',lens:'',duration:'',description:'',dialogue:'',equipment:[],refImageUrl:'',refVideoUrl:''};
      return{...p,scenes:p.scenes?.map(s=>s.id===sceneId?{...s,shots:[...(s.shots||[]),newShot]}:s)};
    });
  };
  const updateShot=(sceneId,shotId,ch)=>{updateProj(p=>({...p,scenes:p.scenes?.map(s=>s.id===sceneId?{...s,shots:(s.shots||[]).map(sh=>sh.id===shotId?{...sh,...ch}:sh)}:s)}));};
  const delShot=(sceneId,shotId)=>{updateProj(p=>({...p,scenes:p.scenes?.map(s=>s.id===sceneId?{...s,shots:(s.shots||[]).filter(sh=>sh.id!==shotId)}:s)}));};
  const onPaste=(sceneId,shotId,e)=>{const item=[...e.clipboardData.items].find(i=>i.type.startsWith('image/'));if(!item)return;const r=new FileReader();r.onload=ev=>updateShot(sceneId,shotId,{refImageUrl:ev.target.result});r.readAsDataURL(item.getAsFile());};
  const onDrop=(sceneId,shotId,e)=>{e.preventDefault();const f=e.dataTransfer.files[0];if(!f||!f.type.startsWith('image/'))return;const r=new FileReader();r.onload=ev=>updateShot(sceneId,shotId,{refImageUrl:ev.target.result});r.readAsDataURL(f);};

  const sceneRefs=useRef({});
  const contentRef=React.useRef();
  const jumpTo=(id)=>{
    const container=contentRef.current;
    const el=document.getElementById('scene-'+id);
    if(el&&container){
      const top=el.offsetTop-container.offsetTop-20;
      container.scrollTo({top:top,behavior:'smooth'});
    } else if(el){
      el.scrollIntoView({behavior:'smooth',block:'start'});
    }
  };

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{padding:'6px 20px',borderBottom:`1px solid ${T.rule}`,display:'flex',gap:8,alignItems:'center',flexShrink:0,justifyContent:'space-between'}}>
        <div style={{display:'flex',gap:8,alignItems:'center',overflowX:'auto',flex:1}}>
        {[{id:'all',name:'All'},...(proj.locations||[])].map(l=>(
          <button key={l.id} onClick={()=>setFilterLoc(l.id)} style={{padding:'3px 10px',borderRadius:4,fontSize:10,fontFamily:"'Geist Mono',monospace",background:filterLoc===l.id?T.accent+'22':T.chip,color:filterLoc===l.id?T.accent:T.textMute,border:`1px solid ${filterLoc===l.id?T.accent+'44':T.border}`,whiteSpace:'nowrap'}}>
            {(l.name||'All').toUpperCase()}
          </button>
        ))}
        <div style={{width:1,height:14,background:T.border}}/>
        {['all','1','2','3'].map(a=>(
          <button key={a} onClick={()=>setFilterAct(a)} style={{padding:'3px 10px',borderRadius:4,fontSize:10,fontFamily:"'Geist Mono',monospace",background:filterAct===a?T.purple+'22':T.chip,color:filterAct===a?T.purple:T.textMute,border:`1px solid ${filterAct===a?T.purple+'44':T.border}`}}>
            {a==='all'?'ALL':'ACT '+a}
          </button>
        ))}
        </div>
      </div>
      <div style={{padding:'4px 20px 8px',borderBottom:`1px solid ${T.rule}`,display:'flex',alignItems:'center',justifyContent:'flex-end',flexShrink:0}}>
        <select onChange={e=>{if(e.target.value)jumpTo(e.target.value);}} defaultValue=""
          style={{background:T.chip,border:`1px solid ${T.accent}44`,borderRadius:5,padding:'5px 12px',fontSize:11,color:T.accent,fontFamily:"'Geist Mono',monospace",cursor:'pointer',fontWeight:500}}>
          <option value="">↓ Jump to scene...</option>
          {(proj.scenes||[]).filter(s=>filterLoc==='all'||s.locationId===filterLoc).map(s=>(
            <option key={s.id} value={s.id}>{s.id}  -  {s.slug?s.slug.slice(0,35):''}</option>
          ))}
        </select>
      </div>
      <div ref={contentRef} style={{flex:1,overflow:'auto',padding:'12px 20px'}}>
        {scenes.map((scene,si)=>{
          const loc=findLoc(proj,scene.locationId);
          const shots=scene.shots||[];
          const actCol=ACT_COLORS[(scene.act||1)-1];
          const prevScene=scenes[si-1];
          const showDivider=!prevScene||prevScene.act!==scene.act;
          return(
            <div key={scene.id} id={`scene-${scene.id}`}>
              {showDivider&&<div style={{display:'flex',alignItems:'center',gap:10,margin:'10px 0 8px',paddingTop:si>0?10:0,borderTop:si>0?`1px solid ${actCol}33`:'none'}}><Mono s={{color:actCol,letterSpacing:'0.14em'}}>ACT {scene.act}</Mono><div style={{flex:1,height:1,background:actCol+'22'}}/></div>}
              <div style={{marginBottom:10,border:`1px solid ${T.border}`,borderRadius:10,overflow:'hidden'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 14px',background:T.panel,borderLeft:`3px solid ${loc?.color||actCol}`}}>
                  <Mono s={{color:T.textDim,background:T.chip,padding:'1px 6px',borderRadius:3,fontSize:10}}>{scene.id}</Mono>
                  <div style={{flex:1,fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textMute,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{scene.slug}</div>
                  <Tag col={T.textDim}>{scene.timeOfDay}</Tag>
                  <Tag>{shots.length} shots</Tag>
                  <Mono s={{color:T.textDim}}>{scene.pages}p</Mono>
                </div>
                <div style={{background:T.surface2,padding:'10px 12px'}}>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:10}}>
                    {shots.map(sh=>(
                      <ShotCard key={sh.id} shot={sh} sceneId={scene.id} onUpdate={ch=>updateShot(scene.id,sh.id,ch)} onDelete={()=>delShot(scene.id,sh.id)} onPaste={e=>onPaste(scene.id,sh.id,e)} onDrop={e=>onDrop(scene.id,sh.id,e)}/>
                    ))}
                    <button onClick={()=>addShot(scene.id)} style={{minHeight:150,border:`2px dashed ${T.border}`,borderRadius:8,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,color:T.textDim,fontSize:12,transition:'all 0.15s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=T.accent;e.currentTarget.style.color=T.accent}} onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.textDim}}>
                      <span style={{fontSize:22}}>+</span><span>Add Shot</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
        {scenes.length===0&&<Empty icon="▣" title="No scenes" sub="Adjust filter or import a JSON breakdown"/>}
      </div>
    </div>
  );
}

function BDView(){
  const {proj,updateProj}=useProj();
  const mob=useMobile();
  function RefImage(riProps) {
    var images = riProps.images || [];
    var onAdd = riProps.onAdd;
    var inputRef = React.useRef();
    function addFile(e) { var f=e.target.files[0]; if(!f||!f.type.startsWith('image/'))return; var r=new FileReader(); r.onload=function(ev){onAdd(ev.target.result);}; r.readAsDataURL(f); }
    function addPaste(e) { var item=[...e.clipboardData.items].find(function(i){return i.type.startsWith('image/');}); if(!item)return; var r=new FileReader(); r.onload=function(ev){onAdd(ev.target.result);}; r.readAsDataURL(item.getAsFile()); }
    function addDrop(e) { e.preventDefault(); var f=e.dataTransfer.files[0]; if(!f||!f.type.startsWith('image/'))return; var r=new FileReader(); r.onload=function(ev){onAdd(ev.target.result);}; r.readAsDataURL(f); }
    return (
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        {images.map(function(img,i){ return (
          <div key={i} style={{width:80,height:60,borderRadius:6,overflow:'hidden',position:'relative',border:'1px solid '+T.border}}>
            <img src={img} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
            <button onClick={function(){onAdd(null,i);}} style={{position:'absolute',top:2,right:2,background:'rgba(0,0,0,0.7)',borderRadius:99,width:16,height:16,color:'white',fontSize:10,display:'grid',placeItems:'center'}}>x</button>
          </div>
        );})}
        <div onPaste={addPaste} onDragOver={function(e){e.preventDefault();}} onDrop={addDrop} onClick={function(){inputRef.current.click();}}
          style={{width:80,height:60,borderRadius:6,border:'2px dashed '+T.border,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',gap:3}}>
          <input ref={inputRef} type="file" accept="image/*" style={{display:'none'}} onChange={addFile}/>
          <span style={{fontSize:18,opacity:0.5}}>+</span>
          <span style={{fontSize:10,fontFamily:"'Geist Mono',monospace",color:T.textDim}}>REF IMAGE</span>
        </div>
      </div>
    );
  }

  const [tab,setTab]=useState('locations');
  const [selLoc,setSelLoc]=useState(null);
  const [selProp,setSelProp]=useState(null);
  const [selCos,setSelCos]=useState(null);
  const [selChar,setSelChar]=useState(null);
  const [bdSearch,setBdSearch]=useState('');
  const [selProps,setSelProps]=useState(()=>new Set());
  const [selCosKeys,setSelCosKeys]=useState(()=>new Set());
  const [mergeModal,setMergeModal]=useState(null);
  const [bdLeftWidth,setBdLeftWidth]=useState(220);
  const bdResizing=React.useRef(false);
  const onBdResizeStart=(e)=>{
    bdResizing.current=true;
    const startX=e.clientX,startW=bdLeftWidth;
    const onMove=(ev)=>{if(!bdResizing.current)return;setBdLeftWidth(Math.max(150,Math.min(420,startW+(ev.clientX-startX))));};
    const onUp=()=>{bdResizing.current=false;window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
  };

  useEffect(()=>{if(proj.locations?.length>0&&!selLoc)setSelLoc(proj.locations[0].id);},[proj]);

  function doMergeProps(unified){
    if(!unified.trim()||selProps.size<2)return;
    const names=Array.from(selProps);
    const updatedScenes=(proj.scenes||[]).map(s=>({
      ...s,
      props:(s.props||[]).map(p=>names.includes(p.name)?{...p,name:unified.trim()}:p)
        .filter((p,i,arr)=>arr.findIndex(x=>x.name===p.name)===i)
    }));
    updateProj({scenes:updatedScenes});
    setSelProps(new Set());setMergeModal(null);setSelProp(unified.trim());
  }

  function doMergeCostumes(unified){
    if(!unified.trim()||selCosKeys.size<2)return;
    const keys=Array.from(selCosKeys);
    const charIds=keys.map(k=>k.split('::')[0]);
    const descs=keys.map(k=>k.split('::')[1]);
    const updatedScenes=(proj.scenes||[]).map(s=>({
      ...s,
      wardrobe:(s.wardrobe||[]).map(w=>{
        if(charIds.includes(w.characterId)&&descs.includes(w.description))return{...w,description:unified.trim()};
        return w;
      }).filter((w,i,arr)=>arr.findIndex(x=>x.characterId===w.characterId&&x.description===w.description)===i)
    }));
    updateProj({scenes:updatedScenes});
    setSelCosKeys(new Set());setMergeModal(null);
  }

  const allProps=useMemo(()=>{
    const map={};
    (proj.scenes||[]).forEach(s=>(s.props||[]).forEach(p=>{
      if(!map[p.name])map[p.name]={name:p.name,critical:p.critical,scenes:[],images:[]};
      if(!map[p.name].scenes.includes(s.id))map[p.name].scenes.push(s.id);
    }));
    return Object.values(map).sort((a,b)=>b.scenes.length-a.scenes.length);
  },[proj]);

  const allCostumes=useMemo(()=>{
    const map={};
    (proj.scenes||[]).forEach(s=>(s.wardrobe||[]).forEach(w=>{
      const char=proj.characters?.find(c=>c.id===w.characterId);
      if(!char)return;
      const key=char.id+'::'+w.description;
      if(!map[key])map[key]={charId:char.id,charName:char.name,charColor:char.color,desc:w.description,scenes:[],images:[]};
      if(!map[key].scenes.includes(s.id))map[key].scenes.push(s.id);
    }));
    return Object.values(map).sort((a,b)=>a.charName.localeCompare(b.charName));
  },[proj]);

  const grouped=useMemo(()=>(proj.locations||[]).map(loc=>({loc,scenes:(proj.scenes||[]).filter(s=>s.locationId===loc.id)})),[proj]);

  const q=bdSearch.trim().toLowerCase();
  const contains=(txt)=>(txt||'').toString().toLowerCase().includes(q);
  const filteredGrouped=useMemo(()=>!q?grouped:grouped.filter(({loc,scenes})=>
    contains(loc.name)||contains(loc.type)||contains(loc.address)||scenes.some(s=>contains(s.id)||contains(s.slug)||contains(s.timeOfDay))
  ),[grouped,q]);
  const filteredProps=useMemo(()=>!q?allProps:allProps.filter(p=>contains(p.name)||p.scenes.some(contains)),[allProps,q]);
  const filteredCostumes=useMemo(()=>allCostumes.map((c,i)=>({...c,_idx:i})).filter(c=>!q||contains(c.charName)||contains(c.desc)||c.scenes.some(contains)),[allCostumes,q]);
  const filteredChars=useMemo(()=>!q?(proj.characters||[]):(proj.characters||[]).filter(c=>contains(c.name)||contains(c.role)||contains(c.description)||((proj.scenes||[]).some(s=>(s.characters||[]).includes(c.id)&&(contains(s.id)||contains(s.slug))))),[proj,q]);

  const addBDImage=(category,key,img,rmIdx)=>{
    updateProj(p=>{
      const bd={...(p._bd||{})};
      if(!bd[category])bd[category]={};
      if(!bd[category][key])bd[category][key]=[];
      if(img===null)bd[category][key]=bd[category][key].filter((_,i)=>i!==rmIdx);
      else bd[category][key]=[...bd[category][key],img];
      return{...p,_bd:bd};
    });
  };
  const bdImgs=(cat,key)=>(proj._bd?.[cat]?.[key])||[];

  const sg=grouped.find(g=>g.loc.id===selLoc);

  const TABS=[{id:'locations',label:'Locations',icon:'📍'},{id:'props',label:'Props',icon:'🎭'},{id:'costumes',label:'Costumes',icon:'👗'},{id:'characters',label:'Characters',icon:'👤'}];

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{padding:mob?'6px 8px':'8px 20px',borderBottom:`1px solid ${T.rule}`,display:'flex',gap:mob?3:4,flexShrink:0,flexWrap:'wrap'}}>
        {TABS.map(tb=>(
          <button key={tb.id} onClick={()=>setTab(tb.id)} style={{padding:mob?'5px 10px':'6px 14px',borderRadius:6,fontSize:mob?11:12,display:'flex',alignItems:'center',gap:4,background:tab===tb.id?T.chip:'transparent',color:tab===tb.id?T.text:T.textMute,border:`1px solid ${tab===tb.id?T.border:'transparent'}`}}>
            <span>{tb.icon}</span>{mob?tb.label.slice(0,4):tb.label}
          </button>
        ))}
        <input value={bdSearch} onChange={e=>setBdSearch(e.target.value)} placeholder={`Search...`}
          style={{width:mob?'100%':220,background:T.surface2,border:`1px solid ${T.border}`,borderRadius:6,padding:'5px 10px',fontSize:12,color:T.text,marginTop:mob?2:0}}/>
      </div>
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:mob?'column':'row'}}>

        {tab==='locations'&&<>
          <div style={{width:mob?'100%':bdLeftWidth,flexShrink:0,overflow:'auto',padding:'8px 0',display:mob&&selLoc?'none':'block',maxHeight:mob?'45vh':undefined}}>
            <button onClick={()=>setSelLoc('__all')} style={{width:'100%',padding:'9px 14px',textAlign:'left',background:selLoc==='__all'?T.chip:'transparent',fontSize:13,color:selLoc==='__all'?T.text:T.textMute,borderBottom:`1px solid ${T.rule}`,marginBottom:4}}>
              All locations <span style={{float:'right',fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim}}>{proj.scenes?.length}</span>
            </button>
            {filteredGrouped.map(({loc,scenes})=>(
              <button key={loc.id} onClick={()=>setSelLoc(loc.id)} style={{width:'100%',padding:'9px 14px',textAlign:'left',background:selLoc===loc.id?T.chip:'transparent',borderLeft:selLoc===loc.id?`2px solid ${loc.color}`:'2px solid transparent',marginBottom:2}}>
                <div style={{display:'flex',alignItems:'center',gap:7}}>
                  <div style={{width:7,height:7,borderRadius:'50%',background:loc.color,flexShrink:0}}/>
                  <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12,color:selLoc===loc.id?T.text:T.textMute}}>{loc.name}</span>
                  <span style={{fontSize:10,fontFamily:"'Geist Mono',monospace",color:T.textDim,background:T.chip,padding:'1px 5px',borderRadius:3}}>{loc.type}</span>
                </div>
                <div style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,marginTop:3,paddingLeft:14}}>{scenes.length} sc</div>
              </button>
            ))}
          </div>

          {/* BD Resize handle - desktop only */}
          {!mob&&<div onMouseDown={onBdResizeStart}
            style={{width:5,flexShrink:0,cursor:'col-resize',background:'transparent',borderRight:`1px solid ${T.border}`,position:'relative',zIndex:10,transition:'background 0.15s'}}
            onMouseEnter={e=>{e.currentTarget.style.background=T.accent+'44';}}
            onMouseLeave={e=>{e.currentTarget.style.background='transparent';}}>
            <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:3,height:32,borderRadius:2,background:T.border,opacity:0.7}}/>
          </div>}
          <div style={{flex:1,overflow:'auto',padding:mob?12:24,minHeight:0}}>
            {selLoc==='__all'?(
              <div style={{display:'grid',gap:12}}>
                {filteredGrouped.map(({loc,scenes})=>(
                  <div key={loc.id} onClick={()=>setSelLoc(loc.id)} style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:10,padding:'14px 18px',cursor:'pointer',display:'flex',alignItems:'center',gap:12}}>
                    <div style={{width:9,height:9,borderRadius:'50%',background:loc.color}}/>
                    <div style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:18,flex:1,color:T.text}}>{loc.name}</div>
                    <span style={{fontSize:10,fontFamily:"'Geist Mono',monospace",color:T.textDim,background:T.chip,padding:'2px 6px',borderRadius:3}}>{loc.type}</span>
                    <span style={{fontSize:11,color:T.textMute}}>{scenes.length} scenes</span>
                  </div>
                ))}
              </div>
            ):sg&&(
              <div>
                <div style={{marginBottom:18}}>
                  <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
                    <div style={{width:10,height:10,borderRadius:'50%',background:sg.loc.color}}/>
                    {mob&&<button onClick={()=>setSelLoc(null)} style={{color:T.accent,fontSize:11,fontFamily:"'Geist Mono',monospace",background:'transparent',border:'none',cursor:'pointer',padding:'0 0 8px',display:'block'}}>← Back</button>}
                    <div style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:mob?18:26,color:T.text}}>{sg.loc.name}</div>
                    <span style={{fontSize:10,fontFamily:"'Geist Mono',monospace",color:T.textDim,background:T.chip,padding:'2px 7px',borderRadius:3}}>{sg.loc.type}</span>
                  </div>
                  <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:8,padding:'12px 14px',marginBottom:12}}>
                    <div style={{fontSize:10,color:T.textDim,fontFamily:"'Geist Mono',monospace",letterSpacing:'0.1em',marginBottom:8}}>REFERENCE IMAGES</div>
                    <RefImage images={bdImgs('loc',selLoc)} onAdd={(img,i)=>addBDImage('loc',selLoc,img,i)}/>
                  </div>
                </div>
                <div style={{display:'grid',gap:8}}>
                  {sg.scenes.map(s=>{
                    const sC=(s.characters||[]).map(id=>proj.characters?.find(c=>c.id===id)).filter(Boolean);
                    return(
                      <div key={s.id} style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:8}}>
                        <div style={{padding:'8px 12px',borderBottom:`1px solid ${T.rule}`,display:'flex',alignItems:'center',gap:8}}>
                          <span style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,background:T.chip,padding:'1px 6px',borderRadius:3}}>{s.id}</span>
                          <span style={{flex:1,fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textMute,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.slug}</span>
                          <span style={{fontSize:10,fontFamily:"'Geist Mono',monospace",color:T.textDim}}>{s.timeOfDay}</span>
                        </div>
                        <div style={{padding:'8px 12px',display:'flex',gap:5,flexWrap:'wrap'}}>
                          {sC.map(c=><span key={c.id} style={{padding:'1px 7px',borderRadius:99,fontSize:10,background:c.color+'15',border:`1px solid ${c.color}33`,color:c.color}}>{c.name}</span>)}
                          {(s.props||[]).slice(0,6).map((p,i)=><span key={i} style={{padding:'2px 7px',borderRadius:4,fontSize:10,background:T.warn+'18',border:`1px solid ${T.warn}30`,color:T.warn}}>{p.name}{p.critical?' ★':''}</span>)}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </>}

        {tab==='props'&&<>
          <div style={{width:mob?'100%':bdLeftWidth,flexShrink:0,overflow:'auto',padding:'8px 0',display:mob&&selProp?'none':'block',maxHeight:mob?'45vh':undefined}}>
            <div style={{padding:'6px 12px 4px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim}}>{allProps.length} PROPS TOTAL</div>
              {selProps.size>=2&&(
                <button onClick={()=>setMergeModal({type:'prop',items:Array.from(selProps),unified:''})}
                  style={{padding:'3px 8px',background:T.accent+'22',border:`1px solid ${T.accent}55`,borderRadius:4,fontSize:10,color:T.accent,fontFamily:"'Geist Mono',monospace",cursor:'pointer',whiteSpace:'nowrap'}}>
                  MERGE {selProps.size}
                </button>
              )}
            </div>
            {filteredProps.map(p=>{
              const isSel=selProps.has(p.name);
              return(
              <div key={p.name} style={{display:'flex',alignItems:'stretch',marginBottom:1}}>
                <div onClick={()=>{const n=new Set(selProps);if(n.has(p.name))n.delete(p.name);else n.add(p.name);setSelProps(n);}}
                  style={{width:26,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',
                    background:isSel?T.accent+'20':'transparent',borderLeft:`2px solid ${isSel?T.accent:'transparent'}`}}>
                  <div style={{width:13,height:13,borderRadius:3,border:`1.5px solid ${isSel?T.accent:T.border}`,
                    background:isSel?T.accent:'transparent',display:'grid',placeItems:'center'}}>
                    {isSel&&<span style={{fontSize:10,color:'#0e0d0b',fontWeight:700,lineHeight:1}}>✓</span>}
                  </div>
                </div>
                <button onClick={()=>setSelProp(p.name)} style={{flex:1,padding:'7px 10px',textAlign:'left',
                  background:selProp===p.name?T.chip:'transparent'}}>
                  <div style={{display:'flex',alignItems:'center',gap:5}}>
                    <div style={{width:6,height:6,borderRadius:'50%',background:p.critical?T.danger:T.warn,flexShrink:0}}/>
                    <span style={{flex:1,fontSize:12,color:selProp===p.name?T.text:T.textMute,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</span>
                    <span style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim}}>{p.scenes.length}</span>
                  </div>
                  {p.critical&&<div style={{fontSize:10,color:T.danger,fontFamily:"'Geist Mono',monospace",marginTop:1,paddingLeft:10}}>CRITICAL ★</div>}
                </button>
              </div>
              );
            })}
          </div>

          {/* BD Resize handle */}
          <div onMouseDown={onBdResizeStart}
            style={{width:5,flexShrink:0,cursor:'col-resize',background:'transparent',borderRight:`1px solid ${T.border}`,position:'relative',zIndex:10,transition:'background 0.15s'}}
            onMouseEnter={e=>{e.currentTarget.style.background=T.accent+'44';}}
            onMouseLeave={e=>{e.currentTarget.style.background='transparent';}}>
            <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:3,height:32,borderRadius:2,background:T.border,opacity:0.7}}/>
          </div>
          <div style={{flex:1,overflow:'auto',padding:mob?12:24,minHeight:0}}>
            {selProp?(()=>{
              const prop=allProps.find(p=>p.name===selProp);
              if(!prop)return null;
              const propScenes=prop.scenes.map(id=>proj.scenes?.find(s=>s.id===id)).filter(Boolean);
              return(
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
                    {mob&&<button onClick={()=>setSelProp(null)} style={{color:T.accent,fontSize:11,fontFamily:"'Geist Mono',monospace",background:'transparent',border:'none',cursor:'pointer',padding:'0 0 10px',display:'block'}}>← Back</button>}
                <div style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:mob?18:24,color:T.text}}>{prop.name}</div>
                    {prop.critical&&<span style={{padding:'2px 8px',borderRadius:4,background:T.danger+'18',border:`1px solid ${T.danger}30`,fontSize:10,color:T.danger}}>CRITICAL ★</span>}
                    <span style={{fontSize:12,color:T.textMute}}>{prop.scenes.length} scenes: {prop.scenes.join(', ')}</span>
                  </div>
                  <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:8,padding:'12px 14px',marginBottom:14}}>
                    <div style={{fontSize:10,color:T.textDim,fontFamily:"'Geist Mono',monospace",letterSpacing:'0.1em',marginBottom:8}}>REFERENCE IMAGES</div>
                    <RefImage images={bdImgs('prop',selProp)} onAdd={(img,i)=>addBDImage('prop',selProp,img,i)}/>
                  </div>
                  <div style={{display:'grid',gap:8}}>
                    {propScenes.map(s=>{
                      const loc=proj.locations?.find(l=>l.id===s.locationId);
                      return(
                        <div key={s.id} style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:8,padding:'8px 12px',display:'flex',alignItems:'center',gap:10}}>
                          <span style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,background:T.chip,padding:'1px 6px',borderRadius:3}}>{s.id}</span>
                          <span style={{flex:1,fontSize:12,color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.slug}</span>
                          {loc&&<div style={{width:7,height:7,borderRadius:'50%',background:loc.color}}/>}
                          <span style={{fontSize:10,color:T.textMute}}>{s.timeOfDay}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })():<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:T.textDim,fontSize:13}}>Select a prop to see details</div>}

function ContMatrix(){
  const {proj}=useProj(); const t=useT();
  const scenes=proj.scenes||[];
  const chars=proj.characters||[];
  const COL_W=120;

  return(
    <div style={{height:'100%',overflow:'auto'}}>
      <table style={{borderCollapse:'separate',borderSpacing:0,minWidth:'100%'}}>
        <thead>
          <tr>
            <th style={{position:'sticky',left:0,top:0,zIndex:3,background:T.panel,width:160,minWidth:160,padding:'8px 14px',borderRight:`1px solid ${T.border}`,borderBottom:`1px solid ${T.rule}`,textAlign:'left'}}>
              <Mono s={{color:T.textDim,fontSize:10,letterSpacing:'0.12em'}}>CHARACTER</Mono>
            </th>
            {scenes.map(s=>{
              const loc=findLoc(proj,s.locationId);
              const actCol=ACT_COLORS[(s.act||1)-1];
              return(
                <th key={s.id} style={{position:'sticky',top:0,zIndex:2,background:T.panel,width:COL_W,minWidth:COL_W,padding:'6px 8px',borderBottom:`1px solid ${T.rule}`,borderRight:`1px solid ${T.border}`,textAlign:'center',borderTop:`2px solid ${actCol}`}}>
                  <div style={{fontFamily:"'Geist Mono',monospace",fontSize:11,color:actCol,letterSpacing:'0.1em'}}>{s.id}</div>
                  <div style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textMute,marginTop:2}}>{s.timeOfDay}</div>
                  <div style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim}}>D{s.shootDay}</div>
                </th>
              );
            })}
          </tr>
        </thead>
        <tbody>
          {chars.map((char,ci)=>(
            <tr key={char.id} style={{background:ci%2===0?T.bg:T.surface2+'88'}}>
              <td style={{position:'sticky',left:0,zIndex:1,background:ci%2===0?T.bg:T.surface2+'88',padding:'8px 14px',borderRight:`1px solid ${T.border}`,borderBottom:`1px solid ${T.rule}`,verticalAlign:'top'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:22,height:22,borderRadius:4,background:char.color+'22',border:`1px solid ${char.color}44`,display:'grid',placeItems:'center',fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:12,color:char.color,flexShrink:0}}>{(char.name||'?')[0]}</div>
                  <div>
                    <div style={{fontSize:12,color:T.text,fontWeight:500}}>{char.name}</div>
                    {char.role&&<div style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,letterSpacing:'0.06em',marginTop:1}}>{char.role.toUpperCase()}</div>}
                  </div>
                </div>
              </td>
              {scenes.map((s,si)=>{
                const inScene=(s.characters||[]).includes(char.id);
                if(!inScene) return(
                  <td key={s.id} style={{padding:'8px 8px',borderBottom:`1px solid ${T.rule}`,borderRight:`1px solid ${T.border}`,textAlign:'center',verticalAlign:'top'}}>
                    <div style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim}}> - </div>
                  </td>
                );
                const w=s.wardrobe?.find(ww=>ww.characterId===char.id);
                const mu=s.makeup?.find(m=>m.characterId===char.id);
                // Check if wardrobe changed from prev scene
                let prevW=null;
                for(let pi=si-1;pi>=0;pi--){
                  if((scenes[pi].characters||[]).includes(char.id)){
                    prevW=scenes[pi].wardrobe?.find(ww=>ww.characterId===char.id);
                    break;
                  }
                }
                const changed=prevW&&w&&prevW.description!==w.description;
                const missing=!w;
                return(
                  <td key={s.id} style={{padding:'8px 8px',borderBottom:`1px solid ${T.rule}`,borderRight:`1px solid ${T.border}`,verticalAlign:'top',background:missing?T.danger+'08':changed?T.warn+'08':'transparent'}}>
                    <div style={{display:'flex',alignItems:'flex-start',gap:5,marginBottom:5}}>
                      <div style={{width:6,height:6,borderRadius:'50%',flexShrink:0,marginTop:4,background:missing?T.danger:changed?T.warn:T.success}}/>
                      <div style={{flex:1,minWidth:0,fontSize:11,color:missing?T.danger:T.text,lineHeight:1.4,fontFamily:"'Geist Mono',monospace",display:'-webkit-box',WebkitLineClamp:3,WebkitBoxOrient:'vertical',overflow:'hidden',wordBreak:'break-word'}}>
                        {missing?<span style={{color:T.danger}}>{t.missing}</span>:w.description}
                      </div>
                    </div>
                    {mu&&<div style={{fontSize:10,color:T.textMute,fontFamily:"'Geist Mono',monospace",lineHeight:1.35,paddingLeft:11,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden',wordBreak:'break-word'}}>{mu.description}</div>}
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function ContTimeline(){
  const {proj}=useProj(); const t=useT();
  const scenes=proj.scenes||[];
  const chars=proj.characters||[];
  // Get unique story days
  const storyDays=[...new Set(scenes.map(s=>s.shootDay||s.day||1).filter(Boolean))].sort((a,b)=>a-b);

  return(
    <div style={{height:'100%',overflow:'auto',padding:'16px 20px',minWidth:0}}>
      <div style={{marginBottom:12,fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim,letterSpacing:'0.1em'}}>
        SHOOT DAYS · {storyDays.length} DAYS
        <span style={{marginLeft:16}}><span style={{color:T.warn}}>●</span> {t.changed}  <span style={{color:T.danger}}>●</span> {t.missing}</span>
      </div>
      {/* Day header row */}
      <div style={{display:'grid',gridTemplateColumns:`160px repeat(${scenes.length},minmax(22px,1fr))`,gap:2,marginBottom:4,minWidth:`${160+scenes.length*22}px`}}>
        <div/>
        {scenes.map(s=>{
          const actCol=ACT_COLORS[(s.act||1)-1];
          return(
            <div key={s.id} style={{textAlign:'center',fontFamily:"'Geist Mono',monospace",fontSize:10,color:actCol,letterSpacing:'0.08em',padding:'2px 0'}}>{s.id}</div>
          );
        })}
      </div>
      {/* Character rows */}
      {chars.map(char=>{
        const sceneCount=scenes.filter(s=>(s.characters||[]).includes(char.id)).length;
        return(
          <div key={char.id} style={{display:'grid',gridTemplateColumns:`160px repeat(${scenes.length},minmax(22px,1fr))`,gap:2,marginBottom:6,alignItems:'center',minWidth:`${160+scenes.length*22}px`}}>
            <div style={{display:'flex',alignItems:'center',gap:6,paddingRight:10}}>
              <div style={{width:22,height:22,borderRadius:4,background:char.color+'22',border:`1px solid ${char.color}44`,display:'grid',placeItems:'center',fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:12,color:char.color,flexShrink:0}}>{(char.name||'?')[0]}</div>
              <div style={{flex:1,overflow:'hidden'}}>
                <div style={{fontSize:11,color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{char.name}</div>
                <div style={{fontFamily:"'Geist Mono',monospace",fontSize:10,color:T.textDim}}>{sceneCount} SC</div>
              </div>
            </div>
            {scenes.map((s,si)=>{
              const inScene=(s.characters||[]).includes(char.id);
              if(!inScene) return <div key={s.id} style={{height:32}}/>;
              const w=s.wardrobe?.find(ww=>ww.characterId===char.id);
              let prevW=null;
              for(let pi=si-1;pi>=0;pi--){
                if((scenes[pi].characters||[]).includes(char.id)){prevW=scenes[pi].wardrobe?.find(ww=>ww.characterId===char.id);break;}
              }
              const changed=prevW&&w&&prevW.description!==w.description;
              const missing=!w;
              const bg=missing?T.danger:changed?T.warn:char.color;
              return(
                <div key={s.id} title={w?.description||t.missing} style={{height:32,borderRadius:4,background:bg+'25',border:`1px solid ${bg}50`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:bg,fontFamily:"'Geist Mono',monospace",overflow:'hidden',padding:'0 4px'}}>
                  {missing?'!':changed?`${si+1}→`:`${si+1}`}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   SHARED: Clock Picker
═══════════════════════════════════════════════════════════ */
function ClockPicker({value,onChange,onClose}){
  const [h,m]=(value||'07:00').split(':').map(Number);
  const [selH,setSelH]=React.useState(h);
  const [selM,setSelM]=React.useState(m);
  const [mode,setMode]=React.useState('h'); // 'h' or 'm'
  const clockRef=React.useRef(null);

  const cx=120,cy=120,r=90,rDot=10;
  const hourAngle=(selH%12)/12*360-90;
  const minAngle=selM/60*360-90;
  const angle=mode==='h'?hourAngle:minAngle;
  const rad=angle*Math.PI/180;
  const dotX=cx+r*Math.cos(rad);
  const dotY=cy+r*Math.sin(rad);

  const handleClick=(e)=>{
    const rect=clockRef.current.getBoundingClientRect();
    const x=e.clientX-rect.left-cx;
    const y=e.clientY-rect.top-cy;
    const a=Math.atan2(y,x)*180/Math.PI+90;
    const norm=(a+360)%360;
    if(mode==='h'){
      const hv=Math.round(norm/30)%12||(selH>=12?0:0);
      const newH=selH>=12?hv+12:hv;
      setSelH(newH);setMode('m');
    } else {
      const mv=Math.round(norm/6)%60;
      setSelM(mv);
      onChange(`${String(selH).padStart(2,'0')}:${String(mv).padStart(2,'0')}`);
      onClose();
    }
  };

  const hours=Array.from({length:12},(_,i)=>i);
  const mins=[0,5,10,15,20,25,30,35,40,45,50,55];

  return(
    <div style={{position:'fixed',inset:0,zIndex:9000,display:'grid',placeItems:'center'}}
      onClick={e=>{if(e.target===e.currentTarget)handleClose();}}>
      <div style={{background:T.panel,border:`1px solid ${T.borderHi}`,borderRadius:14,
        padding:'16px 20px',boxShadow:'0 8px 40px rgba(0,0,0,0.4)',width:280}}>
        {/* Display */}
        <div style={{display:'flex',alignItems:'baseline',justifyContent:'center',gap:2,marginBottom:14}}>
          <button onClick={()=>setMode('h')} style={{fontSize:36,fontFamily:"'Instrument Serif',serif",
            fontStyle:'italic',color:mode==='h'?T.accent:T.textMute,background:'transparent',border:'none',cursor:'pointer'}}>
            {String(selH).padStart(2,'0')}
          </button>
          <span style={{fontSize:28,color:T.textDim,fontFamily:"'Instrument Serif',serif"}}>:</span>
          <button onClick={()=>setMode('m')} style={{fontSize:36,fontFamily:"'Instrument Serif',serif",
            fontStyle:'italic',color:mode==='m'?T.accent:T.textMute,background:'transparent',border:'none',cursor:'pointer'}}>
            {String(selM).padStart(2,'0')}
          </button>
          <div style={{display:'flex',flexDirection:'column',gap:3,marginLeft:6}}>
            {['AM','PM'].map(p=>(
              <button key={p} onClick={()=>{
                if(p==='AM'&&selH>=12)setSelH(selH-12);
                if(p==='PM'&&selH<12)setSelH(selH+12);
              }} style={{fontSize:10,padding:'2px 6px',borderRadius:3,cursor:'pointer',
                background:(p==='AM'&&selH<12)||(p==='PM'&&selH>=12)?T.accent+'33':'transparent',
                border:`1px solid ${(p==='AM'&&selH<12)||(p==='PM'&&selH>=12)?T.accent:T.border}`,
                color:(p==='AM'&&selH<12)||(p==='PM'&&selH>=12)?T.accent:T.textMute,
                fontFamily:"'Geist Mono',monospace"}}>
                {p}
              </button>
            ))}
          </div>
        </div>
        {/* Clock face */}
        <svg width={240} height={240} style={{display:'block',margin:'0 auto',cursor:'pointer'}}
          ref={clockRef} onClick={handleClick}>
          <circle cx={cx} cy={cy} r={cx-4} fill={T.surface2} stroke={T.border} strokeWidth={1}/>
          <line x1={cx} y1={cy} x2={dotX} y2={dotY} stroke={T.accent} strokeWidth={2} strokeLinecap="round"/>
          <circle cx={cx} cy={cy} r={4} fill={T.accent}/>
          <circle cx={dotX} cy={dotY} r={rDot} fill={T.accent}/>
          {(mode==='h'?hours:mins).map((v,i)=>{
            const items=mode==='h'?hours:mins;
            const a=(i/items.length)*360-90;
            const rd=a*Math.PI/180;
            const tx=cx+(r-2)*Math.cos(rd);
            const ty=cy+(r-2)*Math.sin(rd);
            const isActive=mode==='h'?(v===selH%12):v===selM;
            return(
              <text key={v} x={tx} y={ty} textAnchor="middle" dominantBaseline="central"
                fontSize={11} fill={isActive?'#0e0d0b':T.textMute}
                fontFamily="'Geist Mono',monospace">
                {mode==='h'?(v===0?12:v):String(v).padStart(2,'0')}
              </text>
            );
          })}
        </svg>
        <div style={{display:'flex',justifyContent:'flex-end',marginTop:10,gap:8}}>
          <button onClick={onClose} style={{padding:'5px 14px',border:`1px solid ${T.border}`,borderRadius:5,
            color:T.textMute,fontSize:12,background:'transparent',cursor:'pointer'}}>Cancel</button>
          <button onClick={()=>{onChange(`${String(selH).padStart(2,'0')}:${String(selM).padStart(2,'0')}`);onClose();}}
            style={{padding:'5px 14px',background:T.accent,border:'none',borderRadius:5,
              color:'#0e0d0b',fontSize:12,fontWeight:600,cursor:'pointer'}}>OK</button>
        </div>
      </div>
    </div>
  );
}

function TimeButton({value,onChange,style}){
  const [open,setOpen]=React.useState(false);

═══════════════════════════════════════════════════════════ */
const NOTE_DEPTS = [
  {id:'director',  label:'Director',  icon:'🎬', color:'#c084fc'},
  {id:'camera',    label:'Camera',    icon:'📷', color:'#60a5fa'},
  {id:'sound',     label:'Sound',     icon:'🔊', color:'#34d399'},
  {id:'lighting',  label:'Lighting',  icon:'💡', color:'#fbbf24'},
  {id:'art',       label:'Art/Props', icon:'🎨', color:'#f97316'},
  {id:'wardrobe',  label:'Wardrobe',  icon:'👗', color:'#e879f9'},
  {id:'makeup',    label:'Makeup',    icon:'💄', color:'#fb7185'},
  {id:'post',      label:'Fix in Post',icon:'✂️', color:'#94a3b8'},
  {id:'general',   label:'General',   icon:'📋', color:'#a8a29e'},
];

function OnSetNotes(){
  const {proj} = useProj();
  const mob = useMobile();

  const [notes, setNotes] = React.useState([]);
  const [selDept, setSelDept] = React.useState('all');
  const [selScene, setSelScene] = React.useState('all');
  const [showResolved, setShowResolved] = React.useState(false);
  const [showAdd, setShowAdd] = React.useState(false);
  const [editNote, setEditNote] = React.useState(null);
  const [syncStatus, setSyncStatus] = React.useState('offline');
  const unsubRef = React.useRef(null);

  const projId = proj._id || 'default';

  // Firebase realtime sync
  React.useEffect(()=>{
    try {
      const db = getFirestore();
      const unsub = db.collection('onset_notes')
        .doc(projId)
        .onSnapshot(doc=>{
          if(doc.exists){
            const data = doc.data().notes || [];
            setNotes(data.sort((a,b)=>b.createdAt-a.createdAt));
          } else {
            setNotes([]);
          }
          setSyncStatus('live');
        }, ()=>setSyncStatus('offline'));
      unsubRef.current = unsub;
      return ()=>{ if(unsubRef.current) unsubRef.current(); };
    } catch(e){ setSyncStatus('offline'); }
  },[projId]);

  const saveNotes = async (updated) => {
    setSyncStatus('saving');
    try {
      const db = getFirestore();
      await db.collection('onset_notes').doc(projId).set({
        notes: updated,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch(e){ setSyncStatus('offline'); }
  };

  const addNote = (note) => {
    const newNote = { ...note, id: Date.now()+'', createdAt: Date.now(), resolved: false };
    const updated = [newNote, ...notes];
    setNotes(updated);
    saveNotes(updated);
    setShowAdd(false);
  };

  const updateNote = (id, patch) => {
    const updated = notes.map(n => n.id===id ? {...n,...patch} : n);
    setNotes(updated);
    saveNotes(updated);
  };

  const deleteNote = (id) => {
    const updated = notes.filter(n => n.id!==id);
    setNotes(updated);
    saveNotes(updated);
  };

  const filtered = notes.filter(n=>{
    if(!showResolved && n.resolved) return false;
    if(selDept!=='all' && n.dept!==selDept) return false;
    if(selScene!=='all' && n.sceneId!==selScene) return false;
    return true;
  });

  const unresolvedCount = notes.filter(n=>!n.resolved).length;

  return(
    <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}}>

      {/* Header bar */}
      <div style={{padding:mob?'8px 10px':'10px 20px',borderBottom:`1px solid ${T.rule}`,
        display:'flex',alignItems:'center',gap:8,flexShrink:0,flexWrap:'wrap'}}>
        <div style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:mob?16:20,color:T.text}}>
          On Set Notes
        </div>
        {/* Sync indicator */}
        <div style={{display:'flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:99,
          background:syncStatus==='live'?T.success+'18':T.surface2,
          border:`1px solid ${syncStatus==='live'?T.success+'44':T.border}`}}>
          <div style={{width:5,height:5,borderRadius:'50%',
            background:syncStatus==='live'?T.success:T.textDim}}/>
          <span style={{fontFamily:"'Geist Mono',monospace",fontSize:8,
            color:syncStatus==='live'?T.success:T.textDim}}>
            {syncStatus==='live'?'LIVE':syncStatus==='saving'?'SAVING...':'OFFLINE'}
          </span>
        </div>
        {unresolvedCount>0&&<div style={{fontFamily:"'Geist Mono',monospace",fontSize:9,
          color:T.warn,padding:'2px 8px',borderRadius:99,background:T.warn+'15',
          border:`1px solid ${T.warn}33`}}>
          {unresolvedCount} open
        </div>}
        <div style={{flex:1}}/>
        <button onClick={()=>setShowResolved(s=>!s)}
          style={{padding:'4px 10px',borderRadius:5,fontSize:10,cursor:'pointer',
            fontFamily:"'Geist Mono',monospace",
            background:showResolved?T.success+'18':'transparent',
            border:`1px solid ${showResolved?T.success+'44':T.border}`,
            color:showResolved?T.success:T.textDim}}>
          {showResolved?'Hide resolved':'Show resolved'}
        </button>
        <button onClick={()=>{setEditNote(null);setShowAdd(true);}}
          style={{padding:'4px 14px',background:T.accent,border:'none',borderRadius:5,
            color:'#0e0d0b',fontSize:11,fontWeight:600,cursor:'pointer',
            display:'flex',alignItems:'center',gap:4}}>
          + Note
        </button>
      </div>

      {/* Dept filter pills */}
      <div style={{padding:mob?'6px 8px':'6px 16px',borderBottom:`1px solid ${T.rule}`,
        display:'flex',gap:5,overflowX:'auto',flexShrink:0,
        scrollbarWidth:'none',WebkitOverflowScrolling:'touch'}}>
        <button onClick={()=>setSelDept('all')}
          style={{padding:'3px 10px',borderRadius:99,fontSize:10,whiteSpace:'nowrap',cursor:'pointer',
            fontFamily:"'Geist Mono',monospace",flexShrink:0,
            background:selDept==='all'?T.accent:'transparent',
            border:`1px solid ${selDept==='all'?T.accent:T.border}`,
            color:selDept==='all'?'#0e0d0b':T.textMute}}>
          ALL
        </button>
        {NOTE_DEPTS.map(d=>(
          <button key={d.id} onClick={()=>setSelDept(selDept===d.id?'all':d.id)}
            style={{padding:'3px 10px',borderRadius:99,fontSize:10,whiteSpace:'nowrap',
              cursor:'pointer',fontFamily:"'Geist Mono',monospace",flexShrink:0,
              background:selDept===d.id?d.color+'33':'transparent',
              border:`1px solid ${selDept===d.id?d.color:T.border}`,
              color:selDept===d.id?d.color:T.textMute}}>
            {d.icon} {mob?d.label.split('/')[0]:d.label}
          </button>
        ))}
      </div>

      {/* Scene filter */}
      <div style={{padding:mob?'4px 8px':'4px 16px',borderBottom:`1px solid ${T.rule}`,
        display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
        <span style={{fontFamily:"'Geist Mono',monospace",fontSize:8,color:T.textDim,flexShrink:0}}>SCENE</span>
        <select value={selScene} onChange={e=>setSelScene(e.target.value)}
          style={{flex:1,maxWidth:280,background:T.surface2,border:`1px solid ${T.border}`,
            borderRadius:4,padding:'3px 6px',fontSize:11,color:T.text}}>
          <option value="all">All scenes</option>
          {proj.scenes?.map(s=>(
            <option key={s.id} value={s.id}>{s.id} - {s.slug?.slice(0,40)}</option>
          ))}
        </select>
      </div>

      {/* Notes list */}
      <div style={{flex:1,overflow:'auto',padding:mob?'8px 8px':'10px 16px'}}>
        {filtered.length===0&&(
          <div style={{textAlign:'center',padding:'48px 20px',color:T.textDim}}>
            <div style={{fontSize:40,opacity:0.2,marginBottom:8}}>📋</div>
            <div style={{fontSize:12}}>{notes.length===0?'No notes yet - tap + Note to add':'No notes match filter'}</div>
          </div>
        )}
        {filtered.map(note=>{
          const dept = NOTE_DEPTS.find(d=>d.id===note.dept)||NOTE_DEPTS[8];
          const scene = proj.scenes?.find(s=>s.id===note.sceneId);
          return(
            <NoteCard key={note.id} note={note} dept={dept} scene={scene}
              onResolve={()=>updateNote(note.id,{resolved:!note.resolved})}
              onEdit={()=>{setEditNote(note);setShowAdd(true);}}
              onDelete={()=>deleteNote(note.id)}
              mob={mob}/>
          );
        })}
      </div>

      {/* Add / Edit modal */}
      {showAdd&&(
        <NoteModal
          note={editNote}
          scenes={proj.scenes||[]}
          onSave={(data)=>{
            if(editNote){ updateNote(editNote.id,data); setShowAdd(false); setEditNote(null); }
            else addNote(data);
          }}
          onClose={()=>{ setShowAdd(false); setEditNote(null); }}
          mob={mob}/>
      )}
    </div>
  );
}

function NoteModal({note, scenes, onSave, onClose, mob}){
  const [text, setText] = React.useState(note?.text||'');
  const [dept, setDept] = React.useState(note?.dept||'general');
  const [sceneId, setSceneId] = React.useState(note?.sceneId||'');
  const [urgent, setUrgent] = React.useState(note?.urgent||false);
  const [author, setAuthor] = React.useState(note?.author||'');
  const [imageUrl, setImageUrl] = React.useState(note?.imageUrl||'');
  const [imgLoading, setImgLoading] = React.useState(false);
  const fileRef = React.useRef(null);

  // Speech recognition
  const [listening, setListening] = React.useState(false);
  const [interimText, setInterimText] = React.useState('');
  const [voiceLang, setVoiceLang] = React.useState(()=>localStorage.getItem('sb_voice_lang')||'en-AU');
  const recogRef = React.useRef(null);
  const speechSupported = typeof window !== 'undefined' && ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window);

  React.useEffect(()=>{ localStorage.setItem('sb_voice_lang', voiceLang); },[voiceLang]);

  // Cleanup on unmount
  React.useEffect(()=>{
    return ()=>{ if(recogRef.current){ try{ recogRef.current.stop(); }catch(e){} } };
  },[]);

  function toggleListening(){
    if(listening){
      try{ recogRef.current?.stop(); }catch(e){}
      setListening(false);
      setInterimText('');
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR) return;
    const recog = new SR();
    recog.lang = voiceLang;
    recog.continuous = true;
    recog.interimResults = true;
    recog.maxAlternatives = 1;
    recogRef.current = recog;

    recog.onresult = (e)=>{
      let interim = '';
      let final = '';
      for(let i = e.resultIndex; i < e.results.length; i++){
        const t = e.results[i][0].transcript;
        if(e.results[i].isFinal){ final += t + ' '; }
        else { interim += t; }
      }
      if(final) setText(prev => (prev + (prev&&!prev.endsWith(' ')?' ':'') + final.trim() + ' ').trimStart());
      setInterimText(interim);
    };

    recog.onerror = (e)=>{
      console.warn('Speech error:', e.error);
      if(e.error === 'not-allowed'){
        alert('Microphone access denied. Please allow microphone in browser settings.');
      }
      setListening(false);
      setInterimText('');
    };

    recog.onend = ()=>{
      // Auto-restart if still in listening mode (iOS sometimes stops early)
      if(recogRef.current && listening){
        try{ recogRef.current.start(); }catch(e){ setListening(false); }
      }
    };

    try{
      recog.start();
      setListening(true);
      setInterimText('');
    } catch(e){
      console.warn('Speech start error:', e);
    }
  }

  function handleImg(e){
    const file = e.target.files[0];
    if(!file) return;
    setImgLoading(true);
    const reader = new FileReader();
    reader.onload = ev => { setImageUrl(ev.target.result); setImgLoading(false); };
    reader.readAsDataURL(file);
  }

  function handleSubmit(){
    if(listening){ try{ recogRef.current?.stop(); }catch(e){} setListening(false); }
    if(!text.trim()) return;
    onSave({text:text.trim(),dept,sceneId:sceneId||null,urgent,author:author.trim(),imageUrl});
  }

  function handleClose(){
    if(listening){ try{ recogRef.current?.stop(); }catch(e){} setListening(false); }
    onClose();
  }

  const deptObj = NOTE_DEPTS.find(d=>d.id===dept)||NOTE_DEPTS[8];

    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',zIndex:8000,

      }}>

            fontSize:16,color:T.text,flex:1}}>
            {note?'Edit Note':'New Note'}

        </div>

        <div style={{flex:1,overflow:'auto',padding:'14px 16px',display:'flex',flexDirection:'column',gap:12}}>

          {/* Dept selector */}
          <div>
            <div style={{fontFamily:"'Geist Mono',monospace",fontSize:8,color:T.textDim,

            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              {NOTE_DEPTS.map(d=>(
                <button key={d.id} onClick={()=>setDept(d.id)}
                  style={{padding:'4px 10px',borderRadius:99,fontSize:10,cursor:'pointer',
                    fontFamily:"'Geist Mono',monospace",
                    background:dept===d.id?d.color+'33':'transparent',
                    border:`1px solid ${dept===d.id?d.color:T.border}`,
                    color:dept===d.id?d.color:T.textMute}}>
                  {d.icon} {d.label}
                </button>
              ))}
            </div>
          </div>

          {/* Note text + voice input */}

              <div style={{fontFamily:"'Geist Mono',monospace",fontSize:8,color:T.textDim,letterSpacing:'0.1em'}}>NOTE *</div>
              <div style={{display:'flex',alignItems:'center',gap:5}}>
                {/* Language selector */}

            )}
            <textarea value={text} onChange={e=>setText(e.target.value)}
